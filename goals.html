<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.fontshare.com; font-src https://fonts.gstatic.com https://cdn.fontshare.com; connect-src 'self' https://gxunrnyehltpbgdodkkm.supabase.co; img-src 'self' data: blob: https:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goals &amp; OKRs — Safira</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/design-system.css">
<style>
/* ── goals.html page-specific styles ── */

/* Ambient glow behind page header */
.page-glow {
  position: absolute;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 300px;
  background: radial-gradient(ellipse, rgba(78,203,113,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: glowPulse 6s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
  50% { opacity: 0.8; transform: translateX(-50%) scale(1.1); }
}

.main-inner { position: relative; }

/* Page header row */
.page-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  position: relative;
  z-index: 2;
}

/* Add Goal button */
.btn-add-goal {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--body);
  font-weight: 600;
  font-size: 13px;
  padding: 10px 20px;
  border-radius: 2px;
  border: none;
  cursor: pointer;
  background: var(--green);
  color: #0F1923;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.btn-add-goal:hover {
  background: #3fba62;
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(78,203,113,0.25);
}
.btn-add-goal svg { width: 16px; height: 16px; }

/* Status badge */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--body);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 4px 12px;
  border-radius: 2px;
  white-space: nowrap;
  flex-shrink: 0;
}
.status-badge::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}
.status--on-track   { background: rgba(78,203,113,0.12); color: var(--green); }
.status--at-risk    { background: rgba(245,158,11,0.12);  color: var(--amber); }
.status--behind     { background: rgba(239,68,68,0.12);   color: var(--coral); }
.status--not-started { background: rgba(148,163,184,0.1); color: var(--n400); }
.status--in-progress { background: rgba(45,212,191,0.12); color: var(--teal); }
.status--upcoming   { background: rgba(148,163,184,0.08); color: var(--n400); }

/* Goals grid */
.goals-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Goal Card */
.goal-card {
  background: var(--n800);
  border: 1px solid var(--border);
  border-radius: 2px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
}
.goal-card:hover {
  border-color: rgba(255,255,255,0.12);
  box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  transform: translateY(-2px);
}
.goal-card.expanded {
  border-color: rgba(255,255,255,0.1);
  transform: translateY(0);
}

/* Status-specific hover glow */
.goal-card[data-status="on-track"]:hover { box-shadow: 0 4px 30px rgba(78,203,113,0.08), 0 4px 24px rgba(0,0,0,0.2); }
.goal-card[data-status="at-risk"]:hover { box-shadow: 0 4px 30px rgba(245,158,11,0.08), 0 4px 24px rgba(0,0,0,0.2); }
.goal-card[data-status="behind"]:hover { box-shadow: 0 4px 30px rgba(239,68,68,0.08), 0 4px 24px rgba(0,0,0,0.2); }

/* Left accent strip */
.goal-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 2px 0 0 2px;
  transition: width 0.3s ease;
}
.goal-card:hover::before { width: 4px; }
.goal-card[data-status="on-track"]::before    { background: var(--green); }
.goal-card[data-status="at-risk"]::before     { background: var(--amber); }
.goal-card[data-status="behind"]::before      { background: var(--coral); }
.goal-card[data-status="not-started"]::before { background: var(--n400); }

/* Card main area */
.goal-main {
  padding: 24px 28px 24px 32px;
  display: flex;
  align-items: flex-start;
  gap: 24px;
  cursor: pointer;
}

/* Progress ring */
.progress-ring-wrap {
  flex-shrink: 0;
  position: relative;
  width: 72px; height: 72px;
}
.progress-ring-wrap svg {
  width: 72px; height: 72px;
  transform: rotate(-90deg);
}
.progress-ring-bg {
  fill: none;
  stroke: rgba(255,255,255,0.06);
  stroke-width: 5;
}
.progress-ring-fill {
  fill: none;
  stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 188.5;
  stroke-dashoffset: 188.5;
}
.goal-card[data-status="on-track"]    .progress-ring-fill { stroke: var(--green); }
.goal-card[data-status="at-risk"]     .progress-ring-fill { stroke: var(--amber); }
.goal-card[data-status="behind"]      .progress-ring-fill { stroke: var(--coral); }
.goal-card[data-status="not-started"] .progress-ring-fill { stroke: var(--n400); }
.progress-ring-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--display);
  font-weight: 700;
  font-size: 14px;
  color: var(--n50);
  opacity: 0;
}

/* Goal info */
.goal-info {
  flex: 1;
  min-width: 0;
}
.goal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.goal-title {
  font-family: var(--display);
  font-weight: 600;
  font-size: 18px;
  color: var(--n50);
  line-height: 1.3;
  flex: 1;
}
.goal-desc {
  font-family: var(--body);
  font-size: 13px;
  color: var(--n400);
  line-height: 1.55;
  margin-bottom: 12px;
}

/* Project Manager chip below title */
.pm-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--body);
  font-size: 11px;
  color: var(--teal);
  padding: 3px 10px;
  background: rgba(45,212,191,0.08);
  border: 1px solid rgba(45,212,191,0.15);
  border-radius: 2px;
  margin-bottom: 8px;
}
.pm-chip-role {
  color: var(--n400);
  font-size: 10px;
}

.goal-footer-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.goal-updated {
  font-family: var(--body);
  font-size: 11px;
  color: var(--n400);
  opacity: 0.6;
}
.goal-view-link {
  font-family: var(--body);
  font-size: 12px;
  font-weight: 500;
  color: var(--teal);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: color 0.15s ease;
  text-decoration: none;
}
.goal-view-link:hover { color: var(--green); }
.goal-view-link svg { width: 12px; height: 12px; }

.goal-chevron {
  width: 18px; height: 18px;
  color: var(--n400);
  flex-shrink: 0;
  transition: color 0.2s ease;
  margin-top: 2px;
}
.goal-card.expanded .goal-chevron {
  color: var(--green);
}

/* Expandable details — strictly hidden when collapsed */
.goal-details {
  height: 0;
  overflow: hidden;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.goal-card.expanded .goal-details {
  visibility: visible;
  pointer-events: auto;
}
.goal-details-inner {
  padding: 0 28px 24px 32px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}
.details-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.details-section-title {
  font-family: var(--body);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--n400);
  margin-bottom: 10px;
  font-weight: 600;
}

/* Key Results checklist */
.kr-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.kr-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-family: var(--body);
  font-size: 13px;
  color: var(--n50);
  line-height: 1.4;
  cursor: pointer;
  transition: opacity 0.2s ease;
}
.kr-item:hover { opacity: 0.85; }
.kr-check {
  width: 16px; height: 16px;
  border-radius: 2px;
  border: 1.5px solid var(--n400);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
}
.kr-check.done { background: var(--green); border-color: var(--green); }
.kr-check.done svg { width: 10px; height: 10px; color: #0F1923; }
.kr-item:hover .kr-check { transform: scale(1.15); }
/* Ensure items are visible after GSAP animation completes */
.goal-card.expanded .kr-item,
.goal-card.expanded .actions-list li,
.goal-card.expanded .rec-actions-list li,
.goal-card.expanded .followup-item,
.goal-card.expanded .person-chip,
.goal-card.expanded .stakeholder-chip { opacity: 1 !important; }

/* Next actions */
.actions-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.actions-list li {
  font-family: var(--body);
  font-size: 13px;
  color: var(--n400);
  line-height: 1.4;
  padding-left: 14px;
  position: relative;
  transition: color 0.2s ease, padding-left 0.2s ease;
}
.actions-list li::before {
  content: '\2192';
  position: absolute;
  left: 0;
  color: var(--teal);
  font-size: 11px;
  top: 1px;
  transition: transform 0.2s ease;
}
.actions-list li:hover { color: var(--n50); padding-left: 18px; }
.actions-list li:hover::before { transform: translateX(2px); }

/* Recommended actions */
.rec-actions-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.rec-actions-list li {
  font-family: var(--body);
  font-size: 13px;
  color: var(--n400);
  line-height: 1.4;
  padding-left: 14px;
  position: relative;
  transition: color 0.2s ease, padding-left 0.2s ease;
}
.rec-actions-list li::before {
  content: '\25C6';
  position: absolute;
  left: 0;
  color: var(--purple);
  font-size: 8px;
  top: 4px;
  transition: transform 0.2s ease;
}
.rec-actions-list li:hover { color: var(--n50); padding-left: 18px; }
.rec-actions-list li:hover::before { transform: translateX(2px); }

/* Team & Stakeholder chips */
.people-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.person-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--body);
  font-size: 12px;
  color: var(--n50);
  padding: 5px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  transition: border-color 0.2s ease;
}
.person-chip:hover { border-color: rgba(255,255,255,0.15); }
.person-chip-role {
  color: var(--n400);
  font-size: 11px;
}
.stakeholder-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--body);
  font-size: 12px;
  color: var(--n50);
  padding: 5px 12px;
  background: rgba(167,139,250,0.06);
  border: 1px solid rgba(167,139,250,0.15);
  border-radius: 2px;
  transition: border-color 0.2s ease;
}
.stakeholder-chip:hover { border-color: rgba(167,139,250,0.3); }
.stakeholder-chip-role {
  color: var(--n400);
  font-size: 11px;
}

/* Follow-ups / Waiting for */
.followup-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.followup-item {
  font-family: var(--body);
  font-size: 13px;
  color: var(--n400);
  line-height: 1.4;
  padding-left: 18px;
  position: relative;
  transition: color 0.2s ease;
}
.followup-item::before {
  content: '\23F3';
  position: absolute;
  left: 0;
  font-size: 10px;
  top: 2px;
}
.followup-item:hover { color: var(--n50); }
.followup-owner {
  color: var(--amber);
  font-size: 11px;
  font-weight: 600;
  margin-left: 6px;
}

/* Notes in expanded card */
.goal-notes {
  font-family: var(--body);
  font-size: 13px;
  color: var(--n400);
  line-height: 1.5;
  padding: 10px 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 2px;
}
.goal-notes.empty {
  font-style: italic;
  opacity: 0.5;
}

/* Inline add buttons */
.inline-add-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--body);
  font-size: 11px;
  color: var(--teal);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  margin-top: 8px;
  transition: color 0.15s;
}
.inline-add-btn:hover { color: var(--green); }
.section-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

/* Inline input row */
.inline-input-row {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-top: 8px;
}
.inline-input-row input {
  flex: 1;
  padding: 6px 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--n50);
  font-family: var(--body);
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
}
.inline-input-row input:focus { border-color: var(--teal); }
.inline-input-row input::placeholder { color: var(--n400); opacity: 0.5; }
.inline-save-btn {
  padding: 6px 12px;
  background: var(--green);
  color: #0F1923;
  border: none;
  border-radius: 2px;
  font-family: var(--body);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.inline-save-btn:hover { background: #3fba62; }
.inline-cancel-btn {
  padding: 6px 8px;
  background: none;
  color: var(--n400);
  border: 1px solid var(--border);
  border-radius: 2px;
  font-size: 11px;
  cursor: pointer;
  transition: color 0.15s;
}
.inline-cancel-btn:hover { color: var(--n50); }

/* Notes textarea inline */
.inline-notes-area {
  margin-top: 8px;
}
.inline-notes-area textarea {
  width: 100%;
  padding: 8px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--n50);
  font-family: var(--body);
  font-size: 12px;
  outline: none;
  resize: vertical;
  min-height: 50px;
  transition: border-color 0.2s;
}
.inline-notes-area textarea:focus { border-color: var(--teal); }

/* Quarterly cards */
.q-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.q-card {
  background: var(--n800);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 16px 18px;
  cursor: pointer;
  transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
}
.q-card:hover {
  border-color: rgba(255,255,255,0.12);
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  transform: translateY(-3px);
}
.q-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 6px;
}
.q-title {
  font-family: var(--body);
  font-weight: 500;
  font-size: 13px;
  color: var(--n50);
  line-height: 1.4;
  flex: 1;
}

/* Section divider */
.section-divider {
  margin: 48px 0 32px;
  border: none;
  border-top: 1px solid var(--border);
}
.section-eyebrow {
  font-family: var(--body);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--green);
  margin-bottom: 6px;
}

/* Stat number counter initial state */
.stat-number {
  clip-path: inset(0);
}

/* ── Contact Autocomplete Dropdown ── */
.contact-ac-wrap {
  position: relative;
  flex: 1;
}
.contact-ac-wrap input {
  width: 100%;
}
.contact-ac-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  z-index: 100;
  background: var(--n800);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 2px 2px;
  max-height: 220px;
  overflow-y: auto;
  display: none;
}
.contact-ac-dropdown.open { display: block; }
.contact-ac-option {
  padding: 8px 10px;
  font-family: var(--body);
  font-size: 12px;
  color: var(--n50);
  cursor: pointer;
  transition: background 0.12s;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.contact-ac-option:hover,
.contact-ac-option.active {
  background: rgba(255,255,255,0.06);
}
.contact-ac-option .ac-company {
  font-size: 10px;
  color: var(--n400);
}
.contact-ac-loading,
.contact-ac-empty {
  padding: 8px 10px;
  font-family: var(--body);
  font-size: 11px;
  color: var(--n400);
  font-style: italic;
}

/* ── New Goal Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.modal-overlay.open { opacity: 1; }
.modal-card {
  background: var(--n800);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 32px;
  width: 90%;
  max-width: 640px;
  max-height: 85vh;
  overflow-y: auto;
  transform: translateY(20px);
  transition: transform 0.3s ease;
}
.modal-overlay.open .modal-card { transform: translateY(0); }
.modal-title {
  font-family: var(--display);
  font-weight: 700;
  font-size: 22px;
  color: var(--n50);
  margin-bottom: 24px;
}
.form-group {
  margin-bottom: 20px;
}
.form-label {
  display: block;
  font-family: var(--body);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--n400);
  margin-bottom: 8px;
  font-weight: 600;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--n50);
  font-family: var(--body);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s ease;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--green);
}
.form-textarea { resize: vertical; min-height: 60px; }
.form-select { cursor: pointer; }
.form-select option { background: var(--n800); }

/* Dynamic list inputs */
.dynamic-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.dynamic-list-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.dynamic-list-row input {
  flex: 1;
  padding: 8px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--n50);
  font-family: var(--body);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s ease;
}
.dynamic-list-row input:focus { border-color: var(--green); }
.dynamic-list-row input::placeholder { color: var(--n400); opacity: 0.5; }
.btn-remove-row {
  width: 28px; height: 28px;
  border: none; background: none;
  color: var(--coral);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  opacity: 0.5;
  transition: opacity 0.2s;
  flex-shrink: 0;
}
.btn-remove-row:hover { opacity: 1; }
.btn-add-row {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--body);
  font-size: 12px;
  color: var(--teal);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  transition: color 0.15s;
}
.btn-add-row:hover { color: var(--green); }

/* Person row (name + role) */
.person-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.person-input-row input { flex: 1; }
.person-input-row input:first-child { flex: 1.5; }

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.modal-btn {
  font-family: var(--body);
  font-weight: 600;
  font-size: 13px;
  padding: 10px 24px;
  border-radius: 2px;
  border: none;
  cursor: pointer;
  transition: all 0.15s ease;
}
.modal-btn-cancel {
  background: transparent;
  color: var(--n400);
  border: 1px solid var(--border);
}
.modal-btn-cancel:hover { border-color: var(--n400); color: var(--n50); }
.modal-btn-confirm {
  background: var(--green);
  color: #0F1923;
}
.modal-btn-confirm:hover { background: #3fba62; }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
  .page-glow { animation: none; opacity: 0.5; }
}

/* Mobile */
@media (max-width: 768px) {
  .main { margin-left: 0; padding: 24px; padding-top: 72px; }
  .goal-main { flex-direction: column; gap: 16px; padding: 20px; }
  .details-grid { grid-template-columns: 1fr; }
  .q-grid { grid-template-columns: 1fr; }
  .goal-title { font-size: 16px; }
  .page-glow { width: 300px; height: 200px; }
  .page-header-row { flex-direction: column; align-items: flex-start; gap: 12px; }
  .modal-card { width: 95%; padding: 24px; }
}
@media (max-width: 480px) {
  .q-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<main class="main">
  <div class="main-inner">

    <!-- Ambient glow -->
    <div class="page-glow"></div>

    <!-- Page Header -->
    <div class="page-header-row">
      <div class="page-header" id="pageHeader">Goals &amp; OKRs</div>
      <button class="btn-add-goal" id="btnAddGoal" onclick="openNewGoalModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Goal
      </button>
    </div>
    <p class="page-subtitle" id="pageSubtitle">2026 annual goals &middot; updated by Yousra &middot; ask Gaby anytime</p>

    <!-- Stats Bar -->

    <!-- Annual Goals -->
    <div class="section-eyebrow" id="annualEyebrow">2026 Annual Goals</div>

  </div>
</main>

<!-- New Goal Modal -->
<div class="modal-overlay" id="newGoalModal">
  <div class="modal-card">
    <div class="modal-title">New Goal</div>

    <div class="form-group">
      <label class="form-label">Title</label>
      <input type="text" class="form-input" id="ngTitle" placeholder="e.g., Launch AI Squad with 2+ Clients">
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="ngDesc" placeholder="Brief context on this goal..."></textarea>

    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-select" id="ngStatus">
        <option value="on-track">On Track</option>
        <option value="at-risk">At Risk</option>
        <option value="behind">Behind</option>
        <option value="not-started" selected>Not Started</option>

    <div class="form-group">
      <label class="form-label">Key Results</label>
      <div class="dynamic-list" id="ngKrList">
        <div class="dynamic-list-row"><input type="text" placeholder="Key result..."><button class="btn-remove-row" onclick="removeRow(this)">&times;</button></div>
      </div>
      <button class="btn-add-row" onclick="addRow('ngKrList','Key result...')">+ Add Key Result</button>

<!-- GSAP Core + ScrollTrigger -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  initSidebar('goals');
  gsap.registerPlugin(ScrollTrigger);

  var GOALS_LS_KEY = 'vsdr-goals-data';
  var DATA_VERSION = 4;
  var goalsData = null;

  // Track selected contact for follow-up autocomplete
  var _acSelectedContact = null;
  var _acDebounceTimer = null;

  // ══════════════════════════════════
  //  LOAD DATA
  // ══════════════════════════════════

  function loadGoalsData() {
    // FORCE clear stale localStorage to fix "undefined" text corruption
    localStorage.removeItem(GOALS_LS_KEY);

    fetch('goals-data.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        goalsData = data;
        saveGoalsData();
        renderAll();
      });
  }

  function saveGoalsData() {
    goalsData.version = DATA_VERSION;
    localStorage.setItem(GOALS_LS_KEY, JSON.stringify(goalsData));
  }

  // ══════════════════════════════════
  //  HELPERS
  // ══════════════════════════════════

  function esc(str) {
    var d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function calcProgress(goal) {
    var krs = goal.keyResults || [];
    if (krs.length === 0) return 0;
    var done = krs.filter(function(k) { return k.done; }).length;
    return Math.round((done / krs.length) * 100);
  }

  function statusLabel(s) {
    return s.split('-').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
  }

  var checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';
  var chevronSvg = '<svg class="goal-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
  var arrowSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

  // ══════════════════════════════════
  //  RENDER
  // ══════════════════════════════════

  function renderAll() {
    renderStats();
    renderGoals();
    renderQuarterly();
    runAnimations();
  }

  function renderStats() {
    var goals = goalsData.goals;
    var total = goals.length;
    var onTrack = goals.filter(function(g) { return g.status === 'on-track'; }).length;
    var atRisk = goals.filter(function(g) { return g.status === 'at-risk'; }).length;
    var behind = goals.filter(function(g) { return g.status === 'behind'; }).length;
    var avgProgress = total === 0 ? 0 : Math.round(goals.reduce(function(sum, g) { return sum + calcProgress(g); }, 0) / total);

    var html = '';
    html += '<div class="stat-block"><div class="stat-number" data-count="' + total + '">0</div><div class="stat-label">Total Goals</div></div>';
    html += '<div class="stat-block"><div class="stat-number" data-count="' + onTrack + '" style="color:var(--green)">0</div><div class="stat-label">On Track</div></div>';
    html += '<div class="stat-block"><div class="stat-number" data-count="' + atRisk + '" style="color:var(--amber)">0</div><div class="stat-label">At Risk</div></div>';
    html += '<div class="stat-block"><div class="stat-number" data-count="' + behind + '" style="color:var(--coral)">0</div><div class="stat-label">Behind</div></div>';
    html += '<div class="stat-block"><div class="stat-number" data-count="' + avgProgress + '" data-suffix="%">0%</div><div class="stat-label">Avg Progress</div></div>';
    document.getElementById('statsBar').innerHTML = html;
  }

  function renderGoals() {
    var html = '';
    goalsData.goals.forEach(function(g, gi) {
      var pct = calcProgress(g);
      html += '<div class="goal-card" data-status="' + esc(g.status) + '" data-goal-index="' + gi + '">';
      html += '<div class="goal-main" onclick="toggleGoal(this.parentNode)">';

      // Progress ring
      html += '<div class="progress-ring-wrap">';
      html += '<svg viewBox="0 0 72 72"><circle class="progress-ring-bg" cx="36" cy="36" r="30"/><circle class="progress-ring-fill" cx="36" cy="36" r="30"/></svg>';
      html += '<div class="progress-ring-label">' + pct + '%</div>';
      html += '</div>';

      // Info
      html += '<div class="goal-info">';
      html += '<div class="goal-header">';
      html += '<div class="goal-title">' + esc(g.title) + '</div>';
      html += '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">';
      html += '<span class="status-badge status--' + esc(g.status) + '">' + statusLabel(g.status) + '</span>';
      html += chevronSvg;
      html += '</div></div>';

      // Project Manager chip
      if (g.projectManager && g.projectManager.name) {
        html += '<div class="pm-chip">' + esc(g.projectManager.name);
        if (g.projectManager.role) html += ' <span class="pm-chip-role">' + esc(g.projectManager.role) + '</span>';
        html += '</div>';
      }

      html += '<div class="goal-desc">' + esc(g.description) + '</div>';
      html += '<div class="goal-footer-row">';
      html += '<div class="goal-updated">Last updated: ' + esc(g.lastUpdated) + '</div>';
      html += '<a href="goal.html?id=' + encodeURIComponent(g.id) + '" class="goal-view-link" onclick="event.stopPropagation()">View Project ' + arrowSvg + '</a>';
      html += '</div>';
      html += '</div></div>';

      // Details
      html += '<div class="goal-details"><div class="goal-details-inner"><div class="details-grid">';

      // Project Manager in expanded details
      if (g.projectManager && g.projectManager.name) {
        html += '<div style="grid-column:1/-1;"><div class="details-section-title">Project Manager</div>';
        html += '<div class="people-chips"><span class="person-chip">' + esc(g.projectManager.name);
        if (g.projectManager.role) html += ' <span class="person-chip-role">' + esc(g.projectManager.role) + '</span>';
        html += '</span></div></div>';
      }

      // Key Results
      html += '<div><div class="details-section-title">Key Results</div><ul class="kr-list">';
      (g.keyResults || []).forEach(function(kr, ki) {
        html += '<li class="kr-item" onclick="event.stopPropagation(); toggleKR(' + gi + ',' + ki + ')">';
        html += '<div class="kr-check' + (kr.done ? ' done' : '') + '">' + (kr.done ? checkSvg : '') + '</div>';
        html += '<span>' + esc(kr.text) + '</span></li>';
      });
      html += '</ul>';
      html += '<div id="inlineKr_' + gi + '"></div>';
      html += '<button class="inline-add-btn" onclick="event.stopPropagation(); showInlineAdd(\'kr\',' + gi + ')">+ Add Key Result</button>';
      html += '</div>';

      // Next Actions
      html += '<div><div class="details-section-title">Next Actions</div><ul class="actions-list">';
      (g.nextActions || []).forEach(function(a) {
        html += '<li>' + esc(a) + '</li>';
      });
      html += '</ul>';
      html += '<div id="inlineAction_' + gi + '"></div>';
      html += '<button class="inline-add-btn" onclick="event.stopPropagation(); showInlineAdd(\'action\',' + gi + ')">+ Add Action</button>';
      html += '</div>';

      // Recommended Actions
      html += '<div><div class="details-section-title">Recommended Actions</div>';
      if (g.recommendedActions && g.recommendedActions.length > 0) {
        html += '<ul class="rec-actions-list">';
        g.recommendedActions.forEach(function(a) {
          html += '<li>' + esc(a) + '</li>';
        });
        html += '</ul>';
      }
      html += '<div id="inlineRec_' + gi + '"></div>';
      html += '<button class="inline-add-btn" onclick="event.stopPropagation(); showInlineAdd(\'rec\',' + gi + ')">+ Add Recommendation</button>';
      html += '</div>';

      // Follow Ups / Waiting For
      html += '<div><div class="details-section-title">Follow Ups / Waiting For</div>';
      if (g.followUps && g.followUps.length > 0) {
        html += '<ul class="followup-list">';
        g.followUps.forEach(function(f) {
          html += '<li class="followup-item">' + esc(f.text);
          if (f.owner) html += '<span class="followup-owner">' + esc(f.owner) + '</span>';
          html += '</li>';
        });
        html += '</ul>';
      }
      html += '<div id="inlineFollowUp_' + gi + '"></div>';
      html += '<button class="inline-add-btn" onclick="event.stopPropagation(); showInlineAdd(\'followUp\',' + gi + ')">+ Add Follow Up</button>';
      html += '</div>';

      // Team Members
      html += '<div><div class="details-section-title">Team Members</div>';
      if (g.teamMembers && g.teamMembers.length > 0) {
        html += '<div class="people-chips">';
        g.teamMembers.forEach(function(m) {
          html += '<span class="person-chip">' + esc(m.name) + ' <span class="person-chip-role">' + esc(m.role) + '</span></span>';
        });
        html += '</div>';
      }
      html += '<div id="inlineTeam_' + gi + '"></div>';
      html += '<button class="inline-add-btn" onclick="event.stopPropagation(); showInlineAdd(\'team\',' + gi + ')">+ Add Member</button>';
      html += '</div>';

      // Stakeholders
      if (g.stakeholders && g.stakeholders.length > 0) {
        html += '<div><div class="details-section-title">Stakeholders</div>';
        html += '<div class="people-chips">';
        g.stakeholders.forEach(function(s) {
          html += '<span class="stakeholder-chip">' + esc(s.name) + ' <span class="stakeholder-chip-role">' + esc(s.role) + '</span></span>';
        });
        html += '</div></div>';
      }

      // Notes
      html += '<div style="grid-column:1/-1;"><div class="details-section-title">Notes</div>';
      var noteText = (g.notes && g.notes.trim()) ? g.notes : '';
      html += '<div class="goal-notes' + (noteText ? '' : ' empty') + '" id="noteDisplay_' + gi + '">' + (noteText ? esc(noteText) : 'No notes yet.') + '</div>';
      html += '<div id="inlineNotes_' + gi + '"></div>';
      html += '<button class="inline-add-btn" onclick="event.stopPropagation(); showInlineNotes(' + gi + ')">' + (noteText ? '+ Edit Notes' : '+ Add Notes') + '</button>';
      html += '</div>';

      html += '</div></div></div>'; // close details-grid, details-inner, details
      html += '</div>'; // close goal-card
    });
    document.getElementById('goalsGrid').innerHTML = html;
  }

  function renderQuarterly() {
    var html = '';
    (goalsData.quarterlyGoals || []).forEach(function(q) {
      html += '<div class="q-card" onclick="navigateToParentGoal(\'' + esc(q.parentGoalId) + '\')">';
      html += '<div class="q-card-top">';
      html += '<div class="q-title">' + esc(q.title) + '</div>';
      html += '<span class="status-badge status--' + esc(q.status) + '">' + statusLabel(q.status) + '</span>';
      html += '</div></div>';
    });
    document.getElementById('qGrid').innerHTML = html;
  }

  function navigateToParentGoal(parentGoalId) {
    if (parentGoalId) {
      window.location.href = 'goal.html?id=' + encodeURIComponent(parentGoalId);
    }
  }

  // ══════════════════════════════════
  //  TOGGLE KEY RESULT (CHECKBOX)
  // ══════════════════════════════════

  function toggleKR(goalIdx, krIdx) {
    var goal = goalsData.goals[goalIdx];
    var kr = goal.keyResults[krIdx];
    kr.done = !kr.done;

    // Update the today string
    var now = new Date();
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    goal.lastUpdated = months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();

    saveGoalsData();

    // Update just this card's UI without full re-render
    var card = document.querySelector('.goal-card[data-goal-index="' + goalIdx + '"]');
    if (!card) return;

    var newPct = calcProgress(goal);

    // Update KR checkbox
    var krItems = card.querySelectorAll('.kr-item');
    var krEl = krItems[krIdx];
    if (krEl) {
      var check = krEl.querySelector('.kr-check');
      if (kr.done) {
        check.classList.add('done');
        check.innerHTML = checkSvg;
      } else {
        check.classList.remove('done');
        check.innerHTML = '';
      }
    }

    // Animate progress ring
    var fill = card.querySelector('.progress-ring-fill');
    var label = card.querySelector('.progress-ring-label');
    var circumference = 188.5;
    var offset = circumference - (newPct / 100) * circumference;

    gsap.to(fill, { strokeDashoffset: offset, duration: 0.6, ease: 'power2.out' });
    label.textContent = newPct + '%';

    // Update stats bar
    renderStats();
    animateStatCounters();
  }

  // ══════════════════════════════════
  //  GOAL EXPAND / COLLAPSE (GSAP)
  // ══════════════════════════════════

  function toggleGoal(card) {
    var wasExpanded = card.classList.contains('expanded');
    var details = card.querySelector('.goal-details');
    var chevron = card.querySelector('.goal-chevron');

    // Close all other cards
    document.querySelectorAll('.goal-card.expanded').forEach(function(c) {
      if (c !== card) {
        c.classList.remove('expanded');
        var d = c.querySelector('.goal-details');
        var ch = c.querySelector('.goal-chevron');
        gsap.to(d, { height: 0, opacity: 0, duration: 0.35, ease: 'power2.inOut' });
        gsap.to(ch, { rotation: 0, duration: 0.3, ease: 'power2.out' });
      }
    });

    if (wasExpanded) {
      card.classList.remove('expanded');
      gsap.to(details, { height: 0, opacity: 0, duration: 0.35, ease: 'power2.inOut' });
      gsap.to(chevron, { rotation: 0, duration: 0.3, ease: 'power2.out' });
    } else {
      card.classList.add('expanded');
      gsap.set(details, { height: 'auto', opacity: 1 });
      var naturalHeight = details.offsetHeight;
      gsap.set(details, { height: 0, opacity: 0 });

      gsap.to(details, {
        height: naturalHeight,
        opacity: 1,
        duration: 0.45,
        ease: 'power2.out',
        onComplete: function() { gsap.set(details, { height: 'auto' }); }
      });
      gsap.to(chevron, { rotation: 180, duration: 0.3, ease: 'power2.out' });

      var krItems = details.querySelectorAll('.kr-item');
      var actionItems = details.querySelectorAll('.actions-list li');
      var recItems = details.querySelectorAll('.rec-actions-list li');
      var followItems = details.querySelectorAll('.followup-item');
      var chips = details.querySelectorAll('.person-chip, .stakeholder-chip');

      gsap.fromTo(krItems, { x: -15, opacity: 0 }, { x: 0, opacity: 1, stagger: 0.05, duration: 0.3, ease: 'power2.out', delay: 0.15, clearProps: 'opacity,transform' });
      gsap.fromTo(actionItems, { x: -15, opacity: 0 }, { x: 0, opacity: 1, stagger: 0.05, duration: 0.3, ease: 'power2.out', delay: 0.2, clearProps: 'opacity,transform' });
      gsap.fromTo(recItems, { x: -15, opacity: 0 }, { x: 0, opacity: 1, stagger: 0.05, duration: 0.3, ease: 'power2.out', delay: 0.25, clearProps: 'opacity,transform' });
      gsap.fromTo(followItems, { x: -15, opacity: 0 }, { x: 0, opacity: 1, stagger: 0.05, duration: 0.3, ease: 'power2.out', delay: 0.28, clearProps: 'opacity,transform' });
      gsap.fromTo(chips, { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, stagger: 0.04, duration: 0.25, ease: 'back.out(1.4)', delay: 0.3, clearProps: 'opacity,transform' });
    }
  }

  // ══════════════════════════════════
  //  ANIMATIONS
  // ══════════════════════════════════

  function animateStatCounters() {
    document.querySelectorAll('.stat-number[data-count]').forEach(function(el) {
      var target = parseInt(el.getAttribute('data-count'));
      var suffix = el.getAttribute('data-suffix') || '';
      var obj = { val: parseInt(el.textContent) || 0 };
      gsap.to(obj, {
        val: target,
        duration: 0.8,
        ease: 'power2.out',
        onUpdate: function() { el.textContent = Math.round(obj.val) + suffix; }
      });
    });
  }

  function runAnimations() {
    var master = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Header + subtitle
    master
      .from('#pageHeader', { y: 40, opacity: 0, duration: 0.7 })
      .from('#btnAddGoal', { x: 20, opacity: 0, duration: 0.4 }, '-=0.4')
      .from('#pageSubtitle', { y: 20, opacity: 0, duration: 0.5 }, '-=0.4');

    // Stats bar
    master.from('#statsBar .stat-block', { y: 30, opacity: 0, stagger: 0.08, duration: 0.5 }, '-=0.2');

    // Count-up
    document.querySelectorAll('.stat-number[data-count]').forEach(function(el) {
      var target = parseInt(el.getAttribute('data-count'));
      var suffix = el.getAttribute('data-suffix') || '';
      var obj = { val: 0 };
      master.to(obj, {
        val: target,
        duration: 1.2,
        ease: 'power2.out',
        onUpdate: function() { el.textContent = Math.round(obj.val) + suffix; }
      }, '-=1.0');
    });

    // Section eyebrow
    master.from('#annualEyebrow', { x: -30, opacity: 0, duration: 0.4 }, '-=0.8');

    // Goal cards
    master.from('.goal-card', { y: 50, opacity: 0, stagger: 0.12, duration: 0.6, ease: 'power3.out' }, '-=0.5');

    // Progress rings
    document.querySelectorAll('.goal-card').forEach(function(card) {
      var gi = parseInt(card.getAttribute('data-goal-index'));
      var pct = calcProgress(goalsData.goals[gi]);
      var fill = card.querySelector('.progress-ring-fill');
      var label = card.querySelector('.progress-ring-label');
      if (!fill) return;
      var circumference = 188.5;
      var offset = circumference - (pct / 100) * circumference;

      master.to(fill, { strokeDashoffset: offset, duration: 1.2, ease: 'power2.out' }, '-=1.0');
      master.to(label, { opacity: 1, duration: 0.4, ease: 'power2.out' }, '-=0.8');
    });

    // Q2 section — scroll triggered
    gsap.from('#q2Divider', {
      scaleX: 0, transformOrigin: 'left center', duration: 0.6, ease: 'power2.out',
      scrollTrigger: { trigger: '#q2Divider', start: 'top 85%' }
    });
    gsap.from('#q2Eyebrow', {
      x: -30, opacity: 0, duration: 0.5, ease: 'power3.out',
      scrollTrigger: { trigger: '#q2Eyebrow', start: 'top 85%' }
    });
    gsap.from('#q2Header', {
      y: 30, opacity: 0, duration: 0.5, ease: 'power3.out',
      scrollTrigger: { trigger: '#q2Header', start: 'top 85%' }
    });
    gsap.from('.q-card', {
      y: 40, opacity: 0, stagger: 0.1, duration: 0.5, ease: 'power3.out',
      scrollTrigger: { trigger: '#qGrid', start: 'top 85%' }
    });
  }

  // ══════════════════════════════════
  //  SUPABASE CONTACT AUTOCOMPLETE
  // ══════════════════════════════════

  function searchContacts(query) {
    var encoded = encodeURIComponent(query);
    return sbGet('contacts', 'select=id,first_name,last_name,company&or=(first_name.ilike.*' + encoded + '*,last_name.ilike.*' + encoded + '*,company.ilike.*' + encoded + '*)&limit=8');
  }

  function setupContactAutocomplete(inputEl, dropdownEl) {
    _acSelectedContact = null;

    inputEl.addEventListener('input', function() {
      var val = inputEl.value.trim();
      if (val.length < 2) {
        dropdownEl.classList.remove('open');
        dropdownEl.innerHTML = '';
        _acSelectedContact = null;
        return;
      }

      // Debounce 300ms
      clearTimeout(_acDebounceTimer);
      _acDebounceTimer = setTimeout(function() {
        dropdownEl.innerHTML = '<div class="contact-ac-loading">Searching...</div>';
        dropdownEl.classList.add('open');

        searchContacts(val).then(function(results) {
          if (!results || results.length === 0) {
            dropdownEl.innerHTML = '<div class="contact-ac-empty">No matches. Name will be added as new contact.</div>';
            dropdownEl.classList.add('open');
            _acSelectedContact = null;
            return;
          }
          var html = '';
          results.forEach(function(c) {
            var displayName = (c.first_name || '') + ' ' + (c.last_name || '');
            displayName = displayName.trim();
            var companyStr = c.company ? c.company : '';
            html += '<div class="contact-ac-option" data-contact-id="' + c.id + '" data-name="' + esc(displayName) + '">';
            html += '<span>' + esc(displayName) + '</span>';
            if (companyStr) html += '<span class="ac-company">' + esc(companyStr) + '</span>';
            html += '</div>';
          });
          dropdownEl.innerHTML = html;
          dropdownEl.classList.add('open');

          // Attach click handlers
          dropdownEl.querySelectorAll('.contact-ac-option').forEach(function(opt) {
            opt.addEventListener('click', function(e) {
              e.stopPropagation();
              inputEl.value = opt.getAttribute('data-name');
              _acSelectedContact = { id: parseInt(opt.getAttribute('data-contact-id')), name: opt.getAttribute('data-name') };
              dropdownEl.classList.remove('open');
              dropdownEl.innerHTML = '';
            });
          });
        }).catch(function() {
          dropdownEl.innerHTML = '<div class="contact-ac-empty">Search failed. Type a name manually.</div>';
          dropdownEl.classList.add('open');
        });
      }, 300);
    });

    // Close dropdown on outside click
    function closeAcDropdown(e) {
      if (!inputEl.contains(e.target) && !dropdownEl.contains(e.target)) {
        dropdownEl.classList.remove('open');
      }
    }
    document.addEventListener('click', closeAcDropdown);

    // Store cleanup reference
    inputEl._acCleanup = function() {
      document.removeEventListener('click', closeAcDropdown);
    };
  }

  function autoInsertContact(ownerName) {
    // Split into first_name / last_name
    var parts = ownerName.trim().split(/\s+/);
    var firstName = parts[0] || ownerName.trim();
    var lastName = parts.length > 1 ? parts.slice(1).join(' ') : '';

    return sbInsert('contacts', {
      first_name: firstName,
      last_name: lastName,
      notes: 'Added from Goals follow-up'
    }, { returnData: true }).then(function(result) {
      if (result && result.length > 0) return result[0];
      if (result && result.id) return result;
      return null;
    }).catch(function(err) {
      console.error('Failed to auto-insert contact:', err);
      return null;
    });
  }

  // ══════════════════════════════════
  //  INLINE ADD FUNCTIONS
  // ══════════════════════════════════

  function showInlineAdd(type, gi) {
    var containerId = 'inline' + type.charAt(0).toUpperCase() + type.slice(1) + '_' + gi;
    var container = document.getElementById(containerId);
    if (!container || container.querySelector('.inline-input-row')) return; // already open

    var html = '<div class="inline-input-row" onclick="event.stopPropagation()">';
    if (type === 'team') {
      html += '<input type="text" placeholder="Name" id="inlineName_' + type + '_' + gi + '">';
      html += '<input type="text" placeholder="Role" id="inlineRole_' + type + '_' + gi + '">';
    } else if (type === 'followUp') {
      html += '<input type="text" placeholder="Waiting for..." id="inlineText_' + type + '_' + gi + '" style="flex:2">';
      html += '<div class="contact-ac-wrap" style="flex:1">';
      html += '<input type="text" placeholder="Owner" id="inlineOwner_' + type + '_' + gi + '" autocomplete="off">';
      html += '<div class="contact-ac-dropdown" id="acDropdown_' + gi + '"></div>';
      html += '</div>';
    } else {
      var placeholders = { kr: 'New key result...', action: 'New action...', rec: 'New recommendation...' };
      html += '<input type="text" placeholder="' + (placeholders[type] || 'Add item...') + '" id="inlineText_' + type + '_' + gi + '">';
    }
    html += '<button class="inline-save-btn" onclick="event.stopPropagation(); saveInlineAdd(\'' + type + '\',' + gi + ')">Add</button>';
    html += '<button class="inline-cancel-btn" onclick="event.stopPropagation(); cancelInlineAdd(\'' + type + '\',' + gi + ')">&times;</button>';
    html += '</div>';
    container.innerHTML = html;

    var firstInput = container.querySelector('input');
    if (firstInput) firstInput.focus();

    // Set up autocomplete for follow-up owner field
    if (type === 'followUp') {
      var ownerInput = document.getElementById('inlineOwner_' + type + '_' + gi);
      var dropdown = document.getElementById('acDropdown_' + gi);
      if (ownerInput && dropdown) {
        setupContactAutocomplete(ownerInput, dropdown);
      }
    }

    // Allow Enter to save
    container.querySelectorAll('input').forEach(function(inp) {
      inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          // Don't submit if the autocomplete dropdown is open — let them pick
          var dd = container.querySelector('.contact-ac-dropdown.open');
          if (dd) { dd.classList.remove('open'); return; }
          e.preventDefault();
          saveInlineAdd(type, gi);
        }
        if (e.key === 'Escape') { e.preventDefault(); cancelInlineAdd(type, gi); }
      });
    });
  }

  function cancelInlineAdd(type, gi) {
    var containerId = 'inline' + type.charAt(0).toUpperCase() + type.slice(1) + '_' + gi;
    var container = document.getElementById(containerId);
    if (container) {
      // Clean up autocomplete listener if present
      var ownerInput = container.querySelector('input[id^="inlineOwner_"]');
      if (ownerInput && ownerInput._acCleanup) ownerInput._acCleanup();
      container.innerHTML = '';
    }
    _acSelectedContact = null;
  }

  function saveInlineAdd(type, gi) {
    var goal = goalsData.goals[gi];

    if (type === 'kr') {
      var text = document.getElementById('inlineText_kr_' + gi).value.trim();
      if (!text) return;
      if (!goal.keyResults) goal.keyResults = [];
      goal.keyResults.push({ text: text, done: false });
    } else if (type === 'action') {
      var text = document.getElementById('inlineText_action_' + gi).value.trim();
      if (!text) return;
      if (!goal.nextActions) goal.nextActions = [];
      goal.nextActions.push(text);
    } else if (type === 'rec') {
      var text = document.getElementById('inlineText_rec_' + gi).value.trim();
      if (!text) return;
      if (!goal.recommendedActions) goal.recommendedActions = [];
      goal.recommendedActions.push(text);
    } else if (type === 'followUp') {
      var text = document.getElementById('inlineText_followUp_' + gi).value.trim();
      var ownerInput = document.getElementById('inlineOwner_followUp_' + gi);
      var ownerName = ownerInput ? ownerInput.value.trim() : '';
      if (!text) return;
      if (!goal.followUps) goal.followUps = [];

      var followUpEntry = { text: text, owner: ownerName };

      if (_acSelectedContact && _acSelectedContact.id) {
        // User selected an existing contact
        followUpEntry.contactId = _acSelectedContact.id;
        goal.followUps.push(followUpEntry);
        _acSelectedContact = null;
        finishInlineSave(gi, type);
      } else if (ownerName) {
        // User typed a new name — auto-insert into Supabase
        goal.followUps.push(followUpEntry);
        var fuIdx = goal.followUps.length - 1;
        autoInsertContact(ownerName).then(function(contact) {
          if (contact && contact.id) {
            goal.followUps[fuIdx].contactId = contact.id;
            saveGoalsData();
          }
        });
        _acSelectedContact = null;
        finishInlineSave(gi, type);
      } else {
        // No owner specified
        goal.followUps.push(followUpEntry);
        _acSelectedContact = null;
        finishInlineSave(gi, type);
      }
      return; // finishInlineSave handles the rest
    } else if (type === 'team') {
      var name = document.getElementById('inlineName_team_' + gi).value.trim();
      var role = document.getElementById('inlineRole_team_' + gi).value.trim();
      if (!name) return;
      if (!goal.teamMembers) goal.teamMembers = [];
      goal.teamMembers.push({ name: name, role: role });
    }

    finishInlineSave(gi, type);
  }

  function finishInlineSave(gi, type) {
    var goal = goalsData.goals[gi];
    updateTimestamp(goal);
    saveGoalsData();

    // Remember expanded state, re-render, and re-expand
    var wasExpanded = document.querySelector('.goal-card[data-goal-index="' + gi + '"]');
    var isExpanded = wasExpanded && wasExpanded.classList.contains('expanded');
    renderGoals();
    renderStats();
    animateStatCounters();

    // Re-expand the card without animation
    if (isExpanded) {
      var card = document.querySelector('.goal-card[data-goal-index="' + gi + '"]');
      if (card) {
        card.classList.add('expanded');
        var details = card.querySelector('.goal-details');
        var chevron = card.querySelector('.goal-chevron');
        gsap.set(details, { height: 'auto', opacity: 1 });
        gsap.set(chevron, { rotation: 180 });

        // Re-animate progress ring
        var pct = calcProgress(goalsData.goals[gi]);
        var fill = card.querySelector('.progress-ring-fill');
        var label = card.querySelector('.progress-ring-label');
        if (fill) {
          var circumference = 188.5;
          var offset = circumference - (pct / 100) * circumference;
          gsap.set(fill, { strokeDashoffset: offset });
        }
        if (label) gsap.set(label, { opacity: 1 });
      }
    }
  }

  function showInlineNotes(gi) {
    var container = document.getElementById('inlineNotes_' + gi);
    if (!container || container.querySelector('.inline-notes-area')) return;

    var goal = goalsData.goals[gi];
    var currentNotes = goal.notes || '';

    var html = '<div class="inline-notes-area" onclick="event.stopPropagation()">';
    html += '<textarea id="inlineNotesText_' + gi + '" placeholder="Add notes...">' + esc(currentNotes) + '</textarea>';
    html += '<div style="display:flex;gap:6px;margin-top:6px;">';
    html += '<button class="inline-save-btn" onclick="event.stopPropagation(); saveInlineNotes(' + gi + ')">Save</button>';
    html += '<button class="inline-cancel-btn" onclick="event.stopPropagation(); cancelInlineNotes(' + gi + ')">Cancel</button>';
    html += '</div></div>';
    container.innerHTML = html;
    document.getElementById('inlineNotesText_' + gi).focus();
  }

  function cancelInlineNotes(gi) {
    var container = document.getElementById('inlineNotes_' + gi);
    if (container) container.innerHTML = '';
  }

  function saveInlineNotes(gi) {
    var goal = goalsData.goals[gi];
    var text = document.getElementById('inlineNotesText_' + gi).value.trim();
    goal.notes = text;
    updateTimestamp(goal);
    saveGoalsData();

    // Update display
    var display = document.getElementById('noteDisplay_' + gi);
    if (display) {
      display.textContent = text || 'No notes yet.';
      display.className = 'goal-notes' + (text ? '' : ' empty');
    }
    cancelInlineNotes(gi);
  }

  function updateTimestamp(goal) {
    var now = new Date();
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    goal.lastUpdated = months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
  }

  // ══════════════════════════════════
  //  NEW GOAL MODAL
  // ══════════════════════════════════

  function openNewGoalModal() {
    // Reset form
    document.getElementById('ngTitle').value = '';
    document.getElementById('ngDesc').value = '';
    document.getElementById('ngStatus').value = 'not-started';
    resetDynamicList('ngKrList', 'Key result...');
    resetDynamicList('ngActionsList', 'Action item...');
    resetDynamicList('ngRecList', 'Recommended action...');
    resetPersonList('ngTeamList');
    resetPersonList('ngStakeList');
    resetFollowUpList('ngFollowUpList');
    document.getElementById('ngNotes').value = '';

    var modal = document.getElementById('newGoalModal');
    modal.style.display = 'flex';
    requestAnimationFrame(function() { modal.classList.add('open'); });
  }

  function closeModal(id) {
    var modal = document.getElementById(id);
    modal.classList.remove('open');
    setTimeout(function() { modal.style.display = 'none'; }, 300);
  }

  // Close on overlay click
  document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeModal(overlay.id);
    });
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-overlay.open').forEach(function(m) { closeModal(m.id); });
    }
  });

  // Dynamic list helpers
  function addRow(listId, placeholder) {
    var list = document.getElementById(listId);
    var row = document.createElement('div');
    row.className = 'dynamic-list-row';
    row.innerHTML = '<input type="text" placeholder="' + placeholder + '"><button class="btn-remove-row" onclick="removeRow(this)">&times;</button>';
    list.appendChild(row);
    row.querySelector('input').focus();
  }

  function addPersonRow(listId) {
    var list = document.getElementById(listId);
    var row = document.createElement('div');
    row.className = 'person-input-row';
    row.innerHTML = '<input type="text" placeholder="Name"><input type="text" placeholder="Role"><button class="btn-remove-row" onclick="removeRow(this)">&times;</button>';
    list.appendChild(row);
    row.querySelector('input').focus();
  }

  function addFollowUpRow(listId) {
    var list = document.getElementById(listId);
    var row = document.createElement('div');
    row.className = 'person-input-row';
    row.innerHTML = '<input type="text" placeholder="Waiting for..." style="flex:2"><input type="text" placeholder="Owner" style="flex:1"><button class="btn-remove-row" onclick="removeRow(this)">&times;</button>';
    list.appendChild(row);
    row.querySelector('input').focus();
  }

  function resetFollowUpList(listId) {
    var list = document.getElementById(listId);
    list.innerHTML = '<div class="person-input-row"><input type="text" placeholder="Waiting for..." style="flex:2"><input type="text" placeholder="Owner" style="flex:1"><button class="btn-remove-row" onclick="removeRow(this)">&times;</button></div>';
  }

  function getFollowUpListValues(listId) {
    var vals = [];
    document.getElementById(listId).querySelectorAll('.person-input-row').forEach(function(row) {
      var inputs = row.querySelectorAll('input');
      var text = inputs[0] ? inputs[0].value.trim() : '';
      var owner = inputs[1] ? inputs[1].value.trim() : '';
      if (text) vals.push({ text: text, owner: owner });
    });
    return vals;
  }

  function removeRow(btn) {
    var row = btn.parentNode;
    var list = row.parentNode;
    if (list.children.length > 1) {
      row.remove();
    } else {
      // Don't remove last row, just clear it
      row.querySelectorAll('input').forEach(function(i) { i.value = ''; });
    }
  }

  function resetDynamicList(listId, placeholder) {
    var list = document.getElementById(listId);
    list.innerHTML = '<div class="dynamic-list-row"><input type="text" placeholder="' + placeholder + '"><button class="btn-remove-row" onclick="removeRow(this)">&times;</button></div>';
  }

  function resetPersonList(listId) {
    var list = document.getElementById(listId);
    list.innerHTML = '<div class="person-input-row"><input type="text" placeholder="Name"><input type="text" placeholder="Role"><button class="btn-remove-row" onclick="removeRow(this)">&times;</button></div>';
  }

  function getListValues(listId) {
    var vals = [];
    document.getElementById(listId).querySelectorAll('.dynamic-list-row input, .person-input-row input:first-child').forEach(function(input) {
      // For simple lists (single input rows)
      var row = input.closest('.dynamic-list-row');
      if (row && row.querySelectorAll('input').length === 1) {
        var v = input.value.trim();
        if (v) vals.push(v);
      }
    });
    return vals;
  }

  function getSimpleListValues(listId) {
    var vals = [];
    document.getElementById(listId).querySelectorAll('.dynamic-list-row').forEach(function(row) {
      var input = row.querySelector('input');
      if (input) {
        var v = input.value.trim();
        if (v) vals.push(v);
      }
    });
    return vals;
  }

  function getPersonListValues(listId) {
    var vals = [];
    document.getElementById(listId).querySelectorAll('.person-input-row').forEach(function(row) {
      var inputs = row.querySelectorAll('input');
      var name = inputs[0] ? inputs[0].value.trim() : '';
      var role = inputs[1] ? inputs[1].value.trim() : '';
      if (name) vals.push({ name: name, role: role });
    });
    return vals;
  }

  function submitNewGoal() {
    var title = document.getElementById('ngTitle').value.trim();
    if (!title) {
      document.getElementById('ngTitle').style.borderColor = 'var(--coral)';
      document.getElementById('ngTitle').focus();
      return;
    }

    var now = new Date();
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    var newGoal = {
      id: title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''),
      title: title,
      description: document.getElementById('ngDesc').value.trim(),
      status: document.getElementById('ngStatus').value,
      lastUpdated: months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear(),
      keyResults: getSimpleListValues('ngKrList').map(function(t) { return { text: t, done: false }; }),
      nextActions: getSimpleListValues('ngActionsList'),
      recommendedActions: getSimpleListValues('ngRecList'),
      teamMembers: getPersonListValues('ngTeamList'),
      stakeholders: getPersonListValues('ngStakeList'),
      followUps: getFollowUpListValues('ngFollowUpList'),
      notes: document.getElementById('ngNotes').value.trim()
    };

    goalsData.goals.push(newGoal);
    saveGoalsData();
    closeModal('newGoalModal');

    // Re-render with animation for new card
    renderAll();
  }

  // ══════════════════════════════════
  //  INIT
  // ══════════════════════════════════

  loadGoalsData();
</script>
