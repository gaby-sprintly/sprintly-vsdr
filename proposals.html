<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal Lab — VSDR</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green: #4ECB71;
  --charcoal: #0F1923;
  --teal: #2DD4BF;
  --amber: #F59E0B;
  --coral: #EF4444;
  --gold: #FBBF24;
  --n50: #F8FAFC;
  --n400: #94A3B8;
  --n800: #1E293B;
  --surface: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.06);
  --sidebar-w: 240px;
  --display: 'Space Grotesk', sans-serif;
  --body: 'General Sans', sans-serif;
}

html { background: var(--charcoal); }
body { font-family: var(--body); background: var(--charcoal); color: var(--n50); min-height: 100vh; display: flex; }
a { text-decoration: none; color: inherit; }

/* SIDEBAR */
.sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--charcoal); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; padding: 32px 0 24px; }
.sidebar-brand { padding: 0 24px; margin-bottom: 8px; }
.sidebar-logo { font-family: var(--display); font-weight: 700; font-size: 22px; color: #fff; display: flex; align-items: center; gap: 10px; }
.pulse-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1.0; } }
.sidebar-sub { font-family: var(--body); font-size: 11px; color: var(--n400); letter-spacing: 2px; text-transform: uppercase; padding: 0 24px; margin-top: 4px; }
.sidebar-nav { margin-top: 40px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 24px; font-family: var(--body); font-weight: 500; font-size: 14px; color: var(--n400); text-decoration: none; border-left: 3px solid transparent; transition: color 0.15s, background 0.15s, border-color 0.15s; }
.nav-item:hover { color: #fff; }
.nav-item.active { color: #fff; border-left-color: var(--green); background: rgba(78,203,113,0.08); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.sidebar-version { padding: 0 27px; font-family: var(--body); font-size: 12px; color: var(--n400); opacity: 0.5; }
.nav-group { display: flex; flex-direction: column; }
.nav-sub { padding-left: 44px !important; font-size: 0.85em; opacity: 0.7; display: flex; align-items: center; gap: 8px; padding: 8px 24px 8px 44px; color: var(--n400); transition: all 0.2s ease; }
.nav-sub:hover, .nav-sub.active { opacity: 1; color: var(--green); }
.nav-sub svg { flex-shrink: 0; }

/* HAMBURGER */
.hamburger { display: none; position: fixed; top: 16px; left: 16px; z-index: 200; background: var(--n800); border: 1px solid var(--border); border-radius: 2px; width: 40px; height: 40px; cursor: pointer; align-items: center; justify-content: center; }
.hamburger svg { width: 20px; height: 20px; color: var(--n50); }
.sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; }
.sidebar-close { display: none; position: absolute; top: 16px; right: 16px; background: none; border: none; cursor: pointer; color: var(--n400); }
.sidebar-close svg { width: 20px; height: 20px; }

/* MAIN */
.main { margin-left: var(--sidebar-w); flex: 1; padding: 48px; max-width: calc(1200px + 96px); }
.page-header { font-family: var(--display); font-weight: 700; font-size: 36px; color: var(--n50); margin-bottom: 8px; }
.page-subtitle { font-family: var(--body); font-size: 16px; color: var(--n400); margin-bottom: 32px; }

/* STATS */
.stats-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 32px; }
.stat-block { background: var(--n800); border: 1px solid var(--border); border-radius: 2px; padding: 20px 24px; flex: 1; min-width: 100px; }
.stat-number { font-family: var(--display); font-weight: 700; font-size: 28px; color: var(--n50); line-height: 1; }
.stat-label { font-family: var(--body); font-weight: 400; font-size: 11px; color: var(--n400); text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }
.stat-loading { width: 48px; height: 28px; background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 2px; }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

/* FILTER PILLS */
.filter-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
.pill { padding: 7px 16px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--n400); font-family: var(--body); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.pill:hover { color: #fff; border-color: rgba(255,255,255,0.15); }
.pill.active { background: var(--green); border-color: var(--green); color: #0F1923; font-weight: 600; }

/* PROPOSAL GRID */
.proposals-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
@media (max-width: 900px) { .proposals-grid { grid-template-columns: 1fr; } }

.proposal-card { background: var(--n800); border: 1px solid var(--border); border-radius: 4px; padding: 24px; display: flex; flex-direction: column; gap: 12px; transition: border-color 0.15s, transform 0.15s; }
.proposal-card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-1px); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.proposal-index-badge { font-family: var(--display); font-size: 11px; font-weight: 600; color: var(--n400); background: rgba(255,255,255,0.04); border: 1px solid var(--border); padding: 3px 8px; border-radius: 2px; white-space: nowrap; }
.status-badge { padding: 4px 10px; border-radius: 2px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.status-draft { background: rgba(148,163,184,0.15); color: var(--n400); }
.status-in_review { background: rgba(245,158,11,0.15); color: var(--amber); }
.status-approved { background: rgba(78,203,113,0.15); color: var(--green); }
.status-sent { background: rgba(45,212,191,0.15); color: var(--teal); }
.status-archived { background: rgba(148,163,184,0.08); color: rgba(148,163,184,0.5); }

.proposal-title { font-family: var(--display); font-weight: 700; font-size: 18px; color: var(--n50); line-height: 1.3; }
.proposal-client { font-size: 14px; color: var(--n400); }
.proposal-desc { font-size: 13px; color: var(--n400); line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proposal-date { font-size: 12px; color: rgba(148,163,184,0.6); }

.section-progress { display: flex; flex-direction: column; gap: 6px; }
.progress-label { font-size: 12px; color: var(--n400); }
.progress-bar-wrap { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s ease; }

.card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
.btn-open { padding: 8px 18px; background: transparent; border: 1px solid var(--border); border-radius: 2px; color: var(--n50); font-family: var(--body); font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.15s; }
.btn-open:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); }

/* HEADER ROW */
.header-row { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 0; }
.btn-new { padding: 10px 20px; background: var(--green); border: none; border-radius: 2px; color: #0F1923; font-family: var(--body); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; display: flex; align-items: center; gap: 8px; }
.btn-new:hover { opacity: 0.9; }
.btn-sync { padding: 10px 16px; background: transparent; border: 1px solid var(--border); border-radius: 2px; color: var(--n400); font-family: var(--body); font-size: 13px; cursor: pointer; transition: all 0.15s; }
.btn-sync:hover { color: #fff; border-color: rgba(255,255,255,0.15); }
.header-actions { display: flex; gap: 10px; align-items: center; }

/* SKELETON CARDS */
.skeleton-card { background: var(--n800); border: 1px solid var(--border); border-radius: 4px; padding: 24px; }
.skel { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 2px; }
.skel-title { height: 22px; width: 70%; margin-bottom: 12px; }
.skel-text { height: 14px; width: 100%; margin-bottom: 8px; }
.skel-text-sm { height: 14px; width: 50%; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; padding: 24px; }
.modal-overlay.open { display: flex; }
.modal-card { background: #162030; border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; padding: 32px; width: 100%; max-width: 480px; }
.modal-title { font-family: var(--display); font-size: 20px; font-weight: 700; color: var(--n50); margin-bottom: 24px; }
.form-group { margin-bottom: 20px; }
.form-label { font-size: 13px; font-weight: 500; color: var(--n400); margin-bottom: 8px; display: block; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 2px; color: var(--n50); font-family: var(--body); font-size: 14px; outline: none; transition: border-color 0.15s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--green); }
.form-input::placeholder, .form-textarea::placeholder { color: rgba(148,163,184,0.5); }
.form-select option { background: #162030; }
.form-textarea { resize: vertical; min-height: 80px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px; }
.btn-cancel { background: transparent; border: 1px solid rgba(255,255,255,0.06); color: var(--n400); font-family: var(--body); font-size: 14px; padding: 10px 20px; border-radius: 2px; cursor: pointer; }
.btn-generate { background: var(--green); border: none; color: #0F1923; font-family: var(--body); font-size: 14px; font-weight: 600; padding: 10px 24px; border-radius: 2px; cursor: pointer; transition: opacity 0.15s; }
.btn-generate:hover { opacity: 0.9; }
.btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

/* TOAST */
.toast { position: fixed; bottom: 32px; right: 32px; background: var(--n800); border: 1px solid var(--border); border-radius: 4px; padding: 14px 20px; font-size: 14px; color: var(--n50); z-index: 1000; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; display: flex; align-items: center; gap: 10px; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--coral); }

/* EMPTY STATE */
.empty-state { grid-column: 1 / -1; text-align: center; padding: 64px 32px; color: var(--n400); }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-title { font-family: var(--display); font-size: 20px; color: var(--n50); margin-bottom: 8px; }

/* THEME */
.theme-btn { background: transparent; border: 1px solid var(--border); border-radius: 2px; color: var(--n400); font-family: var(--body); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 8px 12px; width: 100%; }
.theme-btn:hover { color: #fff; }

html[data-theme="light"] {
  --green: #2EA84E; --charcoal: #F8FAFC; --teal: #0D9488; --amber: #D97706; --coral: #DC2626;
  --n50: #0F172A; --n400: #64748B; --n800: #FFFFFF; --surface: rgba(0,0,0,0.02); --border: rgba(0,0,0,0.08);
}
html[data-theme="light"] body { background: #F1F5F9; color: #0F172A; }
html[data-theme="light"] .sidebar { background: #FFFFFF; border-right-color: rgba(0,0,0,0.08); }
html[data-theme="light"] .sidebar-logo, html[data-theme="light"] .page-header { color: #0F172A; }
html[data-theme="light"] .nav-item:hover { color: #0F172A; }
html[data-theme="light"] .nav-item.active { color: #0F172A; background: rgba(46,168,78,0.06); }
html[data-theme="light"] .proposal-card, html[data-theme="light"] .stat-block { background: #FFFFFF; border-color: rgba(0,0,0,0.08); }
html[data-theme="light"] .modal-card { background: rgba(255,255,255,0.97); border-color: rgba(0,0,0,0.1); }
html[data-theme="light"] .form-input, html[data-theme="light"] .form-select, html[data-theme="light"] .form-textarea { background: #FFFFFF; border-color: rgba(0,0,0,0.12); color: #0F172A; }
html[data-theme="light"] .form-select option { background: #FFFFFF; }
html[data-theme="light"] .hamburger { background: #FFFFFF; border-color: rgba(0,0,0,0.08); }
html[data-theme="light"] .toast { background: #FFFFFF; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { left: -100%; transition: left 0.3s ease; }
  .sidebar.open { left: 0; }
  .sidebar-backdrop.open { display: block; }
  .sidebar-close { display: flex; }
  .hamburger { display: flex; }
  .main { margin-left: 0; padding: 24px 16px; padding-top: 72px; }
  .proposals-grid { grid-template-columns: 1fr; }
  .stats-bar .stat-block { min-width: 80px; }
  .header-row { flex-direction: column; }
}
</style>
</head>

      <p class="page-subtitle">Create, review, and manage client proposals.</p>
    </div>
    <div class="header-actions">
      <button class="btn-sync" onclick="loadProposals()">⟳ Sync</button>
      <button class="btn-new" onclick="openNewModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:16px;height:16px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Proposal

// ── LOCALSTORAGE HELPERS ──
function lsGetProposals() {
  try { const raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : null; } catch { return null; }
}
function lsSaveProposals(proposals) { localStorage.setItem(LS_KEY, JSON.stringify(proposals)); }

function generateIndex(proposals) {
  const year = new Date().getFullYear();
  const nums = (proposals || []).map(p => { const m = (p.proposal_index || '').match(/SP-\d+-(\d+)/); return m ? parseInt(m[1]) : 0; });
  const max = nums.length ? Math.max(...nums) : 0;
  return `SP-${year}-${String(max + 1).padStart(3, '0')}`;
}

// ── SUPABASE FALLBACK (read-only, for future sync) ──
async function sbFetchProposals() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/vsdr_proposals?select=*&order=created_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' }
    });
    if (!res.ok) return [];
    return (await res.json()) || [];
  } catch { return []; }
}

function normalizeFromSupabase(row) {
  let c = {};
  try { c = typeof row.content === 'string' ? JSON.parse(row.content) : (row.content || {}); } catch {}
  return {
    id: row.id, project_id: row.project_id || c.slug || '',
    title: row.title || 'Untitled', client_name: c.client_name || '', client_contact: c.client_contact || '',
    proposal_type: c.proposal_type || 'full', proposal_index: c.proposal_index || '', slug: c.slug || '',
    description: c.description || '', status: row.status || 'draft', share_token: c.share_token || null,
    sections: c.sections || [], comments: c.comments || [], metadata: c.metadata || {},
    created_at: row.created_at || new Date().toISOString(), updated_at: row.updated_at || new Date().toISOString()
  };
}

let allProposals = [];
let activeFilter = 'all';

function statusBadge(status) {
  const map = { draft: 'Draft', in_review: 'In Review', approved: 'Approved', sent: 'Sent', archived: 'Archived' };
  return `<span class="status-badge status-${status}">${map[status] || status}</span>`;
}

function sectionProgress(sections) {
  if (!sections || !sections.length) return { approved: 0, total: 0 };
  const approved = sections.filter(s => s.status === 'approved').length;
  return { approved, total: sections.length };
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try { return new Date(dateStr).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); } catch { return ''; }
}

function renderCard(row) {
  const { approved, total } = sectionProgress(row.sections);
  const pct = total > 0 ? Math.round((approved / total) * 100) : 0;
  const idx = row.proposal_index || `SP-${new Date(row.created_at).getFullYear()}-001`;
  return `
  <div class="proposal-card" data-status="${row.status}">
    <div class="card-top">
      <span class="proposal-index-badge">${idx}</span>
      ${statusBadge(row.status)}
    </div>
    <div class="proposal-title">${row.title || 'Untitled Proposal'}</div>
    <div class="proposal-client">👤 ${row.client_name || '\u2014'}</div>
    <div class="proposal-desc">${row.description || 'No description provided.'}</div>
    <div class="proposal-date">${formatDate(row.created_at)}</div>
    <div class="section-progress">
      <div class="progress-label">${approved}/${total} sections approved</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card-footer">
      <span></span>
      <a href="proposal.html?id=${row.id}" class="btn-open">Open \u2192</a>
    </div>
  </div>`;
}

function renderGrid(proposals) {
  const grid = document.getElementById('proposalsGrid');
  if (!proposals.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📄</div><div class="empty-title">No proposals found</div><p>Create your first proposal to get started.</p></div>`;
    return;
  }
  grid.innerHTML = proposals.map(renderCard).join('');
}

function updateStats(proposals) {
  document.getElementById('statTotal').textContent = proposals.length;
  document.getElementById('statDraft').textContent = proposals.filter(p => p.status === 'draft').length;
  document.getElementById('statInReview').textContent = proposals.filter(p => p.status === 'in_review').length;
  document.getElementById('statApproved').textContent = proposals.filter(p => p.status === 'approved').length;
  document.getElementById('statSent').textContent = proposals.filter(p => p.status === 'sent').length;
}

function applyFilter() {
  const filtered = activeFilter === 'all' ? allProposals : allProposals.filter(p => p.status === activeFilter);
  renderGrid(filtered);
}

async function loadProposals() {
  // Primary: localStorage
  let proposals = lsGetProposals();
  if (!proposals || proposals.length === 0) {
    // Fallback: Supabase (may return empty due to RLS — that's OK)
    const sbData = await sbFetchProposals();
    if (sbData && sbData.length > 0) {
      proposals = sbData.map(normalizeFromSupabase);
      lsSaveProposals(proposals);
    } else {
      // Both empty — seed with NovaTech sample proposal
      proposals = [SEED_PROPOSAL];
      lsSaveProposals(proposals);
    }
  }
  allProposals = proposals;
  updateStats(allProposals);
  applyFilter();
}

// Filter pills
document.getElementById('filterPills').addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn) return;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  applyFilter();
});

// New proposal modal
function openNewModal() {
  document.getElementById('newModal').classList.add('open');
  document.getElementById('inputClientName').focus();
}
function closeNewModal() {
  document.getElementById('newModal').classList.remove('open');
  document.getElementById('inputClientName').value = '';
  document.getElementById('inputDescription').value = '';
}
document.getElementById('newModal').addEventListener('click', e => {
  if (e.target === document.getElementById('newModal')) closeNewModal();
});

function createProposal() {
  const clientName = document.getElementById('inputClientName').value.trim();
  const proposalType = document.getElementById('inputProposalType').value;
  const description = document.getElementById('inputDescription').value.trim();
  if (!clientName) { showToast('Please enter a client name', 'error'); return; }

  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  btn.textContent = 'Creating...';

  const proposals = lsGetProposals() || [];
  const proposalIndex = generateIndex(proposals);
  const slug = clientName.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '-' + Date.now();
  const id = crypto.randomUUID();
  const now = new Date().toISOString();

  const newProposal = {
    id, project_id: slug,
    title: `${proposalType} \u2014 ${clientName}`,
    client_name: clientName, client_contact: '', proposal_type: proposalType,
    proposal_index: proposalIndex, slug, description, status: 'draft', share_token: null,
    sections: [], comments: [], metadata: { created_by: 'gaby', version: 1 },
    created_at: now, updated_at: now
  };

  proposals.unshift(newProposal);
  lsSaveProposals(proposals);

  closeNewModal();
  showToast('✅ Proposal created!', 'success');
  btn.disabled = false;
  btn.textContent = 'Generate';
  setTimeout(() => { window.location.href = `proposal.html?id=${id}`; }, 800);
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Mobile sidebar
const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');
const backdrop = document.getElementById('backdrop');
const sidebarClose = document.getElementById('sidebarClose');
hamburger.addEventListener('click', () => { sidebar.classList.add('open'); backdrop.classList.add('open'); });
sidebarClose.addEventListener('click', () => { sidebar.classList.remove('open'); backdrop.classList.remove('open'); });
backdrop.addEventListener('click', () => { sidebar.classList.remove('open'); backdrop.classList.remove('open'); });

// Theme
(function() {
  var saved = localStorage.getItem('vsdr-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeBtn(saved);
  var btn = document.getElementById('themeToggle');
  if (btn) btn.addEventListener('click', function() {
    var cur = document.documentElement.getAttribute('data-theme') || 'dark';
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('vsdr-theme', next);
    updateThemeBtn(next);
  });
  function updateThemeBtn(theme) {
    var btn = document.getElementById('themeToggle');
    if (!btn) return;
    btn.querySelector('.theme-icon').textContent = theme === 'light' ? '🌙' : '☀️';
    btn.querySelector('.theme-label').textContent = theme === 'light' ? 'Dark Mode' : 'Light Mode';
  }
})();

loadProposals();
</script>
