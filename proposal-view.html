<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.fontshare.com; font-src https://fonts.gstatic.com https://cdn.fontshare.com; connect-src 'self' https://gxunrnyehltpbgdodkkm.supabase.co; img-src 'self' data: blob: https:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal — Sprintly Partners</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/proposal-print.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green: #4ECB71; --charcoal: #0F1923; --teal: #2DD4BF; --amber: #F59E0B;
  --coral: #EF4444; --purple: #A78BFA; --gold: #FBBF24;
  --n50: #F8FAFC; --n400: #94A3B8; --n800: #1E293B;
  --border: rgba(0,0,0,0.08);
  --display: 'Space Grotesk', sans-serif;
  --body: 'General Sans', sans-serif;
}

html, body { background: #F8FAFC; color: #0F172A; font-family: var(--body); -webkit-font-smoothing: antialiased; }

/* ── Download Bar ── */
.download-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 12px 32px; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.06); }
.bar-brand { font-family: var(--display); font-weight: 700; font-size: 16px; color: #0F172A; display: flex; align-items: center; gap: 8px; }
.bar-brand span { color: var(--green); }
.bar-actions { display: flex; gap: 10px; }
.btn-download { padding: 8px 20px; background: var(--green); border: none; border-radius: 4px; color: #0F1923; font-family: var(--body); font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn-download:hover { opacity: 0.9; }

/* ── Loading ── */
.loading-screen { position: fixed; inset: 0; background: #0F1923; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; transition: opacity 0.4s, visibility 0.4s; }
.loading-screen.hidden { opacity: 0; visibility: hidden; }
.loading-logo { font-family: var(--display); font-weight: 700; font-size: 28px; color: #fff; margin-bottom: 24px; }
.loading-logo span { color: var(--green); }
.loading-bar { width: 200px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
.loading-fill { height: 100%; width: 0; background: var(--green); border-radius: 2px; animation: loadFill 1.2s ease-out forwards; }
@keyframes loadFill { to { width: 100%; } }

/* ── Proposal Container ── */
.proposal { max-width: 900px; margin: 80px auto 60px; padding: 0 24px; opacity: 0; transition: opacity 0.5s; }
.proposal.visible { opacity: 1; }

/* ── Cover Page ── */
.cover-page { background: linear-gradient(135deg, #0F1923 0%, #162030 50%, #1a2942 100%); border-radius: 12px; padding: 80px 60px; min-height: 500px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; margin-bottom: 48px; }
.cover-brand { margin-bottom: 48px; }
.cover-logo { font-family: var(--display); font-weight: 700; font-size: 14px; color: var(--green); letter-spacing: 4px; text-transform: uppercase; }
.cover-logo span { color: #94A3B8; font-weight: 400; margin-left: 4px; }
.cover-title { font-family: var(--display); font-weight: 700; font-size: 48px; color: #fff; line-height: 1.15; margin-bottom: 16px; max-width: 650px; }
.cover-subtitle { font-size: 20px; color: #94A3B8; margin-bottom: 40px; }
.cover-meta { display: flex; gap: 40px; flex-wrap: wrap; }
.cover-meta-item { display: flex; flex-direction: column; gap: 4px; }
.cover-meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #64748B; }
.cover-meta-item span:last-child { font-size: 15px; color: #F8FAFC; font-weight: 500; }
.cover-accent-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--green), var(--teal), var(--amber)); }

/* ── Table of Contents ── */
.toc { margin-bottom: 48px; padding: 32px; background: #fff; border-radius: 8px; border: 1px solid rgba(0,0,0,0.06); }
.toc-title { font-family: var(--display); font-size: 20px; font-weight: 700; color: #0F172A; margin-bottom: 20px; }
.toc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.toc-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 6px; transition: background 0.15s; cursor: pointer; text-decoration: none; color: inherit; }
.toc-item:hover { background: rgba(78,203,113,0.06); }
.toc-num { font-family: var(--display); font-weight: 700; font-size: 14px; color: var(--green); width: 28px; }
.toc-label { font-size: 14px; font-weight: 500; color: #334155; }

/* ── Section ── */
.proposal-section { margin-bottom: 48px; text-align: left; }
.sec-divider-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(0,0,0,0.08), rgba(78,203,113,0.2), rgba(0,0,0,0.08), transparent); margin: 32px 0; }
.section-heading { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
.section-num { font-family: var(--display); font-weight: 700; font-size: 14px; color: var(--green); background: rgba(78,203,113,0.1); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.section-title { font-family: var(--display); font-weight: 700; font-size: 28px; color: #0F172A; }

/* ── Rendered Sections (light mode overrides) ── */
.sec-text p { font-size: 16px; line-height: 1.9; color: #334155; margin-bottom: 16px; text-align: left; }
.sec-text p:last-child { margin-bottom: 0; }
.sec-callout-inline { border-left: 3px solid var(--amber); padding: 16px 20px; margin: 24px 0; background: rgba(245,158,11,0.06); border-radius: 0 4px 4px 0; }
.sec-callout-inline p { font-style: italic; color: #334155; margin: 0; }
.sec-callout-inline cite { color: #64748B; }

.sec-table-wrap { border-radius: 8px; border: 1px solid rgba(0,0,0,0.08); overflow: hidden; }
.sec-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.sec-table th { padding: 14px 18px; background: #F8FAFC; text-align: left; font-weight: 600; color: #0F172A; border-bottom: 1px solid rgba(0,0,0,0.08); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
.sec-table td { padding: 12px 18px; border-bottom: 1px solid rgba(0,0,0,0.04); color: #475569; }
.sec-table tr:last-child td { border-bottom: none; }
.sec-table tr:hover td { background: rgba(78,203,113,0.03); }
.sec-table .rec-col { background: rgba(78,203,113,0.08); }
.sec-table th.rec-col { color: #16a34a; }
.rec-badge { font-size: 9px; background: var(--green); color: #fff; padding: 2px 6px; border-radius: 2px; margin-left: 6px; }
.sec-pricing .price-row td { font-weight: 700; font-size: 16px; color: #0F172A; font-family: var(--display); }

.sec-metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
.metric-card { background: #fff; border: 1px solid rgba(0,0,0,0.06); border-radius: 8px; padding: 24px; border-top: 3px solid var(--accent, var(--green)); }
.metric-icon { color: var(--accent, var(--green)); margin-bottom: 12px; }
.metric-icon svg { width: 28px; height: 28px; }
.metric-value { font-family: var(--display); font-weight: 700; font-size: 36px; color: #0F172A; line-height: 1; margin-bottom: 4px; }
.metric-label { font-size: 13px; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: 0.5px; }
.metric-sub { font-size: 12px; color: #94A3B8; margin-top: 8px; line-height: 1.5; }

.sec-roi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 20px; }
.roi-card { background: #fff; border: 1px solid rgba(0,0,0,0.06); border-radius: 8px; padding: 20px; text-align: center; }
.roi-label { font-size: 12px; color: #64748B; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.roi-value { font-family: var(--display); font-weight: 700; font-size: 28px; color: var(--green); }
.roi-conservative .roi-value { color: #64748B; }
.roi-stretch .roi-value { color: var(--amber); }

.sec-gantt { padding: 20px 0; }
.gantt-header { display: flex; padding: 0 0 12px; border-bottom: 1px solid rgba(0,0,0,0.06); margin-bottom: 12px; }
.gantt-header span { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748B; }
.gantt-header span:first-child { width: 140px; flex-shrink: 0; }
.gantt-header span:last-child { flex: 1; }
.gantt-row { display: flex; align-items: center; padding: 8px 0; }
.gantt-label { width: 140px; flex-shrink: 0; font-size: 14px; font-weight: 500; color: #0F172A; }
.gantt-track { flex: 1; height: 36px; background: rgba(0,0,0,0.03); border-radius: 6px; position: relative; overflow: hidden; }
.gantt-bar { position: absolute; top: 3px; bottom: 3px; border-radius: 4px; display: flex; align-items: center; justify-content: center; min-width: 40px; }
.gantt-bar-label { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.7); white-space: nowrap; }
.gantt-markers { display: flex; position: relative; margin-top: 8px; padding-left: 140px; height: 20px; }
.gantt-marker { position: absolute; font-size: 10px; color: #94A3B8; transform: translateX(-50%); }

.sec-callout { border-left: 4px solid var(--amber); padding: 28px 32px; background: rgba(245,158,11,0.04); border-radius: 0 8px 8px 0; position: relative; }
.callout-mark { font-family: Georgia, serif; font-size: 72px; color: rgba(245,158,11,0.15); position: absolute; top: -12px; left: 16px; line-height: 1; }
.sec-callout p { font-size: 20px; font-style: italic; line-height: 1.7; color: #334155; margin: 0; position: relative; z-index: 1; text-align: left; }
.sec-callout cite { display: block; margin-top: 16px; font-size: 15px; color: #64748B; font-style: normal; position: relative; z-index: 1; }

.sec-image img { width: 100%; height: auto; border-radius: 8px; }
.sec-image figcaption { font-size: 13px; color: #94A3B8; margin-top: 8px; text-align: center; }
.sec-image-empty { display: none; }

.sec-divider { padding: 24px 0; }
.divider-line { height: 2px; background: linear-gradient(90deg, transparent, rgba(0,0,0,0.06), rgba(78,203,113,0.2), rgba(0,0,0,0.06), transparent); }
.sec-empty { display: none; }

/* ── Footer ── */
.proposal-footer { text-align: center; padding: 40px 0 60px; color: #94A3B8; font-size: 13px; border-top: 1px solid rgba(0,0,0,0.06); margin-top: 32px; }
.proposal-footer strong { color: #0F172A; font-weight: 600; }

/* ── Error ── */
.error-state { text-align: center; padding: 120px 24px; }
.error-icon { font-size: 64px; margin-bottom: 24px; }
.error-title { font-family: var(--display); font-size: 28px; font-weight: 700; color: #0F172A; margin-bottom: 12px; }
.error-msg { font-size: 16px; color: #64748B; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .cover-page { padding: 48px 24px; min-height: 360px; }
  .cover-title { font-size: 32px; }
  .cover-subtitle { font-size: 16px; }
  .toc-grid { grid-template-columns: 1fr; }
  .section-title { font-size: 22px; }
  .proposal { margin-top: 70px; }
  .download-bar { padding: 10px 16px; }
  .sec-metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .sec-roi-grid { grid-template-columns: 1fr; }
  .gantt-label { width: 100px; font-size: 12px; }
}

@media (max-width: 480px) {
  .sec-metrics-grid { grid-template-columns: 1fr; }
  .cover-meta { flex-direction: column; gap: 16px; }
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">SPRINTLY<span>PARTNERS</span></div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<!-- Download Bar -->
<div class="download-bar" id="downloadBar">
  <div class="bar-brand">SPRINTLY<span>PARTNERS</span></div>
  <div class="bar-actions">
    <button class="btn-download" onclick="downloadPDF()">Download PDF</button>
  </div>
</div>

<!-- Proposal Content -->
<div class="proposal" id="proposalContent"></div>

<script src="js/supabase-client.js"></script>
<script src="js/proposal-data.js"></script>
<script src="js/proposal-renderers.js"></script>
<script>
const params = new URLSearchParams(location.search);
const token = params.get('token');
const id = params.get('id');

async function init() {
  let proposal = null;

  try {
    if (token) {
      proposal = await fetchProposalByToken(token);
    } else if (id) {
      proposal = await fetchProposal(id);
    }
  } catch (e) {
    console.error('Load failed:', e);
  }

  // Hide loading
  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('hidden');
  }, 1200);

  if (!proposal) {
    document.getElementById('proposalContent').innerHTML =
      '<div class="error-state">' +
        '<div class="error-icon">🔒</div>' +
        '<div class="error-title">Proposal Not Found</div>' +
        '<div class="error-msg">This link may be invalid or expired. Please contact the sender for a new link.</div>' +
      '</div>';
    document.getElementById('proposalContent').classList.add('visible');
    return;
  }

  document.title = (proposal.title || 'Proposal') + ' — Sprintly Partners';
  renderProposal(proposal);

  setTimeout(() => {
    document.getElementById('proposalContent').classList.add('visible');
  }, 1400);

  // Auto-export if requested
  if (params.get('autoexport') === '1') {
    setTimeout(downloadPDF, 2000);
  }
}

function renderProposal(proposal) {
  const sections = proposal.sections || [];
  let html = '';

  // Cover page (if first section is cover type)
  const coverSection = sections.find(s => s.content_type === 'cover');
  if (coverSection) {
    html += renderCoverPage(proposal, coverSection);
  } else {
    // Auto-generate cover
    html += renderCoverPage(proposal, { content_json: { tagline: proposal.title, subtitle: 'Prepared for ' + (proposal.client_name || 'Client') } });
  }

  // Table of Contents
  const contentSections = sections.filter(s => s.content_type !== 'cover' && s.content_type !== 'divider');
  if (contentSections.length > 1) {
    html += '<div class="toc"><div class="toc-title">Contents</div><div class="toc-grid">';
    contentSections.forEach((s, i) => {
      html += '<a class="toc-item" href="#section-' + s.id + '">' +
        '<span class="toc-num">' + String(i + 1).padStart(2, '0') + '</span>' +
        '<span class="toc-label">' + escHtml(s.title || 'Untitled') + '</span></a>';
    });
    html += '</div></div>';
  }

  // Sections
  let secNum = 0;
  sections.forEach(s => {
    if (s.content_type === 'cover') return; // already rendered

    if (s.content_type === 'divider') {
      html += '<div class="sec-divider-line"></div>';
      return;
    }

    secNum++;
    html += '<div class="proposal-section" id="section-' + s.id + '">';
    html += '<div class="section-heading">';
    html += '<div class="section-num">' + String(secNum).padStart(2, '0') + '</div>';
    html += '<h2 class="section-title">' + escHtml(s.title || '') + '</h2>';
    html += '</div>';
    html += renderSectionContent(s, proposal);
    html += '</div>';
  });

  // Footer
  html += '<div class="proposal-footer">';
  html += '<p>Prepared by <strong>Sprintly Partners</strong></p>';
  html += '<p style="margin-top:4px">' + (proposal.proposal_index || '') + '</p>';
  html += '</div>';

  document.getElementById('proposalContent').innerHTML = html;
}

function escHtml(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

async function downloadPDF() {
  const bar = document.getElementById('downloadBar');
  bar.style.display = 'none';

  const content = document.getElementById('proposalContent');
  try {
    await html2pdf().set({
      margin: [10, 10],
      filename: (document.title.replace(' — Sprintly Partners', '') || 'proposal') + '.pdf',
      image: { type: 'jpeg', quality: 0.95 },
      html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    }).from(content).save();
  } catch (e) {
    console.error('PDF export failed:', e);
  } finally {
    bar.style.display = '';
  }
}

init();
</script>
</body>
</html>
