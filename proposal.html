<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Proposal Editor — VSDR</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --green: #4ECB71; --charcoal: #0F1923; --teal: #2DD4BF; --amber: #F59E0B;
  --coral: #EF4444; --gold: #FBBF24; --n50: #F8FAFC; --n400: #94A3B8; --n800: #1E293B;
  --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.06);
  --sidebar-w: 240px; --sec-nav-w: 220px;
  --display: 'Space Grotesk', sans-serif; --body: 'General Sans', sans-serif;
}
html { background: var(--charcoal); }
body { font-family: var(--body); background: var(--charcoal); color: var(--n50); min-height: 100vh; display: flex; }
a { text-decoration: none; color: inherit; }

/* ── SIDEBAR ── */
.sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--charcoal); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; padding: 32px 0 24px; }
.sidebar-brand { padding: 0 24px; margin-bottom: 8px; }
.sidebar-logo { font-family: var(--display); font-weight: 700; font-size: 22px; color: #fff; display: flex; align-items: center; gap: 10px; }
.pulse-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(0.8);opacity:0.6}50%{transform:scale(1.2);opacity:1} }
.sidebar-sub { font-family: var(--body); font-size: 11px; color: var(--n400); letter-spacing: 2px; text-transform: uppercase; padding: 0 24px; margin-top: 4px; }
.sidebar-nav { margin-top: 40px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 24px; font-family: var(--body); font-weight: 500; font-size: 14px; color: var(--n400); text-decoration: none; border-left: 3px solid transparent; transition: color 0.15s, background 0.15s, border-color 0.15s; }
.nav-item:hover { color: #fff; }
.nav-item.active { color: #fff; border-left-color: var(--green); background: rgba(78,203,113,0.08); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.sidebar-version { padding: 0 27px; font-family: var(--body); font-size: 12px; color: var(--n400); opacity: 0.5; }
.nav-group { display: flex; flex-direction: column; }
.nav-sub { font-size: 0.85em; opacity: 0.7; display: flex; align-items: center; gap: 8px; padding: 8px 24px 8px 44px; color: var(--n400); transition: all 0.2s ease; }
.nav-sub:hover,.nav-sub.active { opacity: 1; color: var(--green); }
.hamburger { display: none; position: fixed; top: 16px; left: 16px; z-index: 200; background: var(--n800); border: 1px solid var(--border); border-radius: 2px; width: 40px; height: 40px; cursor: pointer; align-items: center; justify-content: center; }
.hamburger svg { width: 20px; height: 20px; color: var(--n50); }
.sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 90; }
.sidebar-close { display: none; position: absolute; top: 16px; right: 16px; background: none; border: none; cursor: pointer; color: var(--n400); }
.sidebar-close svg { width: 20px; height: 20px; }
.theme-btn { background: transparent; border: 1px solid var(--border); border-radius: 2px; color: var(--n400); font-family: var(--body); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 8px 12px; width: 100%; }
.theme-btn:hover { color: #fff; }

/* ── LAYOUT ── */
.page-wrap { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ── TOP BAR ── */
.top-bar { display: flex; align-items: center; gap: 16px; padding: 16px 32px; border-bottom: 1px solid var(--border); background: rgba(15,25,35,0.95); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 50; flex-wrap: wrap; }
.back-btn { display: flex; align-items: center; gap: 6px; color: var(--n400); font-size: 13px; cursor: pointer; text-decoration: none; transition: color 0.15s; flex-shrink: 0; }
.back-btn:hover { color: #fff; }
.back-btn svg { width: 16px; height: 16px; }
.top-bar-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.proposal-title-edit { font-family: var(--display); font-weight: 700; font-size: 18px; color: var(--n50); cursor: pointer; padding: 4px 8px; border-radius: 2px; border: 1px solid transparent; transition: border-color 0.15s; min-width: 120px; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proposal-title-edit:focus { outline: none; border-color: var(--teal); white-space: normal; overflow: visible; }
.proposal-title-edit:hover { background: rgba(255,255,255,0.04); }
.client-chip { font-size: 12px; color: var(--n400); background: rgba(255,255,255,0.04); border: 1px solid var(--border); padding: 4px 10px; border-radius: 2px; white-space: nowrap; }
.status-badge { padding: 4px 10px; border-radius: 2px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.status-draft { background: rgba(148,163,184,0.15); color: var(--n400); }
.status-in_review { background: rgba(245,158,11,0.15); color: var(--amber); }
.status-approved { background: rgba(78,203,113,0.15); color: var(--green); }
.status-sent { background: rgba(45,212,191,0.15); color: var(--teal); }
.status-archived { background: rgba(148,163,184,0.08); color: rgba(148,163,184,0.5); }
.save-indicator { font-size: 12px; color: var(--green); opacity: 0; transition: opacity 0.3s; margin-left: auto; white-space: nowrap; flex-shrink: 0; }
.save-indicator.visible { opacity: 1; }
.top-bar-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.btn-action { padding: 8px 14px; border-radius: 2px; font-family: var(--body); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn-submit { background: transparent; border: 1px solid var(--amber); color: var(--amber); }
.btn-submit:hover { background: rgba(245,158,11,0.1); }
.btn-approve { background: var(--green); border: 1px solid var(--green); color: #0F1923; font-weight: 600; }
.btn-approve:hover { opacity: 0.9; }
.btn-export { background: transparent; border: 1px solid var(--border); color: var(--n400); }
.btn-export:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
.btn-share { background: transparent; border: 1px solid var(--teal); color: var(--teal); }
.btn-share:hover { background: rgba(45,212,191,0.1); }
.last-saved { font-size: 11px; color: var(--n400); white-space: nowrap; }

/* ── EDITOR LAYOUT ── */
.editor-body { display: flex; flex: 1; }

/* ── SECTION NAV ── */
.sec-nav { width: var(--sec-nav-w); border-right: 1px solid var(--border); padding: 24px 0; display: flex; flex-direction: column; position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto; flex-shrink: 0; }
.sec-nav-title { font-size: 11px; color: var(--n400); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; padding: 0 20px; margin-bottom: 12px; }
.sec-nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 20px; cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; }
.sec-nav-item:hover { background: rgba(255,255,255,0.04); }
.sec-nav-item.active { border-left-color: var(--green); background: rgba(78,203,113,0.06); }
.sec-nav-item .sec-icon { font-size: 14px; flex-shrink: 0; }
.sec-nav-item .sec-name { font-size: 12px; color: var(--n400); line-height: 1.4; flex: 1; }
.sec-nav-item.active .sec-name { color: var(--n50); }
.sec-nav-add { margin: 12px 20px 0; padding: 8px 12px; background: transparent; border: 1px dashed rgba(255,255,255,0.1); border-radius: 2px; color: var(--n400); font-family: var(--body); font-size: 13px; cursor: pointer; transition: all 0.15s; width: calc(100% - 40px); text-align: center; }
.sec-nav-add:hover { border-color: var(--green); color: var(--green); }

/* ── SECTIONS CONTENT ── */
.sections-area { flex: 1; padding: 32px; max-width: 900px; display: flex; flex-direction: column; gap: 24px; }

/* ── SECTION CARD ── */
.section-card { background: var(--n800); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: border-color 0.15s; }
.section-card:target, .section-card.focused { border-color: rgba(45,212,191,0.3); }
.sec-card-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.sec-number { font-family: var(--display); font-size: 12px; font-weight: 600; color: var(--n400); background: rgba(255,255,255,0.04); border: 1px solid var(--border); padding: 2px 8px; border-radius: 2px; flex-shrink: 0; }
.sec-title-edit { font-family: var(--display); font-weight: 600; font-size: 16px; color: var(--n50); cursor: pointer; padding: 4px 8px; border-radius: 2px; border: 1px solid transparent; flex: 1; background: transparent; transition: border-color 0.15s; }
.sec-title-edit:focus { outline: none; border-color: var(--teal); }
.sec-title-edit:hover { background: rgba(255,255,255,0.04); }
.sec-status-icon { font-size: 16px; }
.sec-header-actions { display: flex; gap: 6px; margin-left: auto; }
.btn-sec { padding: 5px 10px; border-radius: 2px; font-family: var(--body); font-size: 12px; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); background: transparent; color: var(--n400); }
.btn-sec:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
.btn-sec-approve { border-color: rgba(78,203,113,0.4); color: var(--green); }
.btn-sec-approve:hover { background: rgba(78,203,113,0.1); }
.btn-sec-request { border-color: rgba(245,158,11,0.4); color: var(--amber); }
.btn-sec-request:hover { background: rgba(245,158,11,0.1); }

/* ── SECTION CONTENT AREA ── */
.sec-content { padding: 20px; }
.sec-text-para { font-size: 15px; line-height: 1.8; color: var(--n50); padding: 6px; border-radius: 2px; cursor: text; border: 1px solid transparent; transition: border-color 0.15s, background 0.15s; min-height: 1.8em; white-space: pre-wrap; word-break: break-word; }
.sec-text-para:hover { background: rgba(255,255,255,0.02); }
.sec-text-para[contenteditable="true"] { border-color: var(--teal); background: rgba(45,212,191,0.04); outline: none; }
.sec-table-wrap { overflow-x: auto; }
.sec-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.sec-table th, .sec-table td { border: 1px solid rgba(255,255,255,0.08); padding: 10px 14px; text-align: left; }
.sec-table th { background: rgba(255,255,255,0.04); color: var(--n400); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.sec-table td { color: var(--n50); cursor: text; }
.sec-table td:focus { outline: none; background: rgba(45,212,191,0.06); }
.sec-divider { height: 2px; background: linear-gradient(90deg, var(--green), transparent); margin: 8px 0; border-radius: 1px; }
.sec-image { width: 100%; border-radius: 4px; margin-top: 12px; display: block; }
.drop-zone { border: 2px dashed rgba(255,255,255,0.1); border-radius: 4px; padding: 24px; text-align: center; color: var(--n400); font-size: 13px; cursor: pointer; transition: all 0.2s; margin-top: 12px; }
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--green); color: var(--green); background: rgba(78,203,113,0.04); }
.drop-zone input { display: none; }

/* ── COMMENTS ── */
.sec-comments { padding: 0 20px 20px; border-top: 1px solid var(--border); margin-top: 0; padding-top: 16px; }
.comments-toggle { font-size: 12px; color: var(--n400); cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.comments-toggle:hover { color: var(--n50); }
.comment-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }
.comment-item { display: flex; gap: 10px; }
.comment-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; background: rgba(78,203,113,0.2); color: var(--green); }
.comment-body { flex: 1; }
.comment-meta { font-size: 11px; color: var(--n400); margin-bottom: 3px; }
.comment-text { font-size: 13px; line-height: 1.5; color: var(--n50); }
.comment-input-row { display: flex; gap: 8px; }
.comment-input { flex: 1; padding: 8px 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 2px; color: var(--n50); font-family: var(--body); font-size: 13px; outline: none; }
.comment-input:focus { border-color: var(--teal); }
.comment-input::placeholder { color: rgba(148,163,184,0.5); }
.btn-post { padding: 8px 14px; background: var(--teal); border: none; border-radius: 2px; color: #0F1923; font-family: var(--body); font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-post:hover { opacity: 0.9; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 32px; right: 32px; background: var(--n800); border: 1px solid var(--border); border-radius: 4px; padding: 14px 20px; font-size: 14px; color: var(--n50); z-index: 1000; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; max-width: 320px; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--coral); }
.toast.info { border-left: 3px solid var(--teal); }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; padding: 24px; }
.modal-overlay.open { display: flex; }
.modal-card { background: #162030; border: 1px solid rgba(255,255,255,0.06); border-radius: 4px; padding: 32px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-family: var(--display); font-size: 20px; font-weight: 700; color: var(--n50); margin-bottom: 24px; }
.form-group { margin-bottom: 18px; }
.form-label { font-size: 13px; font-weight: 500; color: var(--n400); margin-bottom: 7px; display: block; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 9px 13px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 2px; color: var(--n50); font-family: var(--body); font-size: 14px; outline: none; transition: border-color 0.15s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--green); }
.form-input::placeholder, .form-textarea::placeholder { color: rgba(148,163,184,0.5); }
.form-select option { background: #162030; }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px; }
.btn-cancel { background: transparent; border: 1px solid rgba(255,255,255,0.06); color: var(--n400); font-family: var(--body); font-size: 14px; padding: 10px 20px; border-radius: 2px; cursor: pointer; }
.btn-add { background: var(--green); border: none; color: #0F1923; font-family: var(--body); font-size: 14px; font-weight: 600; padding: 10px 24px; border-radius: 2px; cursor: pointer; }
.btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── LOADING ── */
.loading-wrap { padding: 64px; text-align: center; color: var(--n400); }
.skel { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 2px; }
@keyframes shimmer { 0%{background-position:-200% 0}100%{background-position:200% 0} }

/* ── THEME LIGHT ── */
html[data-theme="light"] { --green: #2EA84E; --charcoal: #F8FAFC; --teal: #0D9488; --amber: #D97706; --coral: #DC2626; --n50: #0F172A; --n400: #64748B; --n800: #FFFFFF; --surface: rgba(0,0,0,0.02); --border: rgba(0,0,0,0.08); }
html[data-theme="light"] body { background: #F1F5F9; color: #0F172A; }
html[data-theme="light"] .sidebar { background: #FFFFFF; border-right-color: rgba(0,0,0,0.08); }
html[data-theme="light"] .sidebar-logo,.page-header { color: #0F172A; }
html[data-theme="light"] .nav-item:hover { color: #0F172A; }
html[data-theme="light"] .nav-item.active { color: #0F172A; background: rgba(46,168,78,0.06); }
html[data-theme="light"] .section-card,.modal-card,.top-bar { background: #FFFFFF; border-color: rgba(0,0,0,0.08); }
html[data-theme="light"] .top-bar { background: rgba(248,250,252,0.95); }
html[data-theme="light"] .form-input,.form-select,.form-textarea,.comment-input { background: #FFFFFF; border-color: rgba(0,0,0,0.12); color: #0F172A; }
html[data-theme="light"] .hamburger { background: #FFFFFF; border-color: rgba(0,0,0,0.08); }
html[data-theme="light"] .toast { background: #FFFFFF; }
html[data-theme="light"] .sec-text-para { color: #0F172A; }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) { .sec-nav { display: none; } }
@media (max-width: 768px) {
  .sidebar { left: -100%; transition: left 0.3s ease; }
  .sidebar.open { left: 0; }
  .sidebar-backdrop.open { display: block; }
  .sidebar-close { display: flex; }
  .hamburger { display: flex; }
  .page-wrap { margin-left: 0; }
  .sections-area { padding: 16px; }
  .top-bar { padding: 12px 16px; padding-left: 60px; gap: 8px; }
  .proposal-title-edit { max-width: 150px; font-size: 15px; }
  .top-bar-actions { width: 100%; }
}

/* ── PDF EXPORT ── */
.pdf-mode .sec-header-actions, .pdf-mode .sec-comments, .pdf-mode .sec-nav, .pdf-mode .sidebar, .pdf-mode .top-bar-actions, .pdf-mode .sec-nav-add, .pdf-mode .drop-zone { display: none !important; }
.pdf-mode .page-wrap { margin-left: 0; }
.pdf-mode .sections-area { max-width: 100%; padding: 32px 48px; }
.pdf-mode .section-card { border: none; background: transparent; }
.pdf-mode .sec-card-header { border-bottom: 2px solid #e2e8f0; }
</style>
</head>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://gxunrnyehltpbgdodkkm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fipkXCnAvAV-om1bXwAfYA_4b3KRu0v';
const LS_KEY = 'vsdr-proposals';

const params = new URLSearchParams(window.location.search);
const PROPOSAL_ID = params.get('id');
let proposal = null;
let saveTimer = null;

// ── LOCALSTORAGE HELPERS ──
function lsGetProposals() {
  try { const raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : []; } catch { return []; }
}
function lsSaveProposals(proposals) { localStorage.setItem(LS_KEY, JSON.stringify(proposals)); }

function lsGetProposal(id) {
  return lsGetProposals().find(p => p.id === id) || null;
}

function lsSaveProposal(updated) {
  const proposals = lsGetProposals();
  const idx = proposals.findIndex(p => p.id === updated.id);
  if (idx !== -1) { proposals[idx] = updated; } else { proposals.unshift(updated); }
  lsSaveProposals(proposals);
}

// proposal is the full flat object (no separate content field)
// For compat with old rendering code we alias content = proposal
function getContent() { return proposal; }

async function loadProposal() {
  if (!PROPOSAL_ID) { showToast('No proposal ID in URL', 'error'); return; }
  // Primary: localStorage
  let found = lsGetProposal(PROPOSAL_ID);
  if (!found) {
    // Fallback: try Supabase (may return empty due to RLS)
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/vsdr_proposals?id=eq.${encodeURIComponent(PROPOSAL_ID)}&select=*`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      if (res.ok) {
        const data = await res.json();
        if (data && data.length) {
          let c = {};
          try { c = typeof data[0].content === 'string' ? JSON.parse(data[0].content) : (data[0].content || {}); } catch {}
          found = {
            id: data[0].id, project_id: data[0].project_id || c.slug || '',
            title: data[0].title || 'Untitled', client_name: c.client_name || '', client_contact: c.client_contact || '',
            proposal_type: c.proposal_type || 'full', proposal_index: c.proposal_index || '', slug: c.slug || '',
            description: c.description || '', status: data[0].status || 'draft', share_token: c.share_token || null,
            sections: c.sections || [], comments: c.comments || [], metadata: c.metadata || {},
            created_at: data[0].created_at || new Date().toISOString(), updated_at: data[0].updated_at || new Date().toISOString()
          };
          lsSaveProposal(found);
        }
      }
    } catch {}
  }
  if (!found) { showToast('Proposal not found', 'error'); document.getElementById('sectionsArea').innerHTML = `<div class="loading-wrap" style="color:var(--coral)">Proposal not found. <a href="proposals.html" style="color:var(--teal)">Back to proposals</a></div>`; return; }
  proposal = found;
  if (!proposal.sections) proposal.sections = [];
  if (!proposal.comments) proposal.comments = [];
  renderTopBar();
  renderSections();
  renderSecNav();
}

function renderTopBar() {
  const idx = proposal.proposal_index || `SP-${new Date(proposal.created_at).getFullYear()}-001`;
  document.getElementById('topProposalIndex').textContent = idx;
  const titleEl = document.getElementById('topTitle');
  titleEl.textContent = proposal.title || 'Untitled';
  titleEl.contentEditable = 'true';
  titleEl.addEventListener('blur', () => {
    const newTitle = titleEl.textContent.trim();
    if (newTitle && newTitle !== proposal.title) {
      proposal.title = newTitle;
      document.title = `${newTitle} — VSDR`;
      saveProposal();
    }
  });
  document.getElementById('topClient').textContent = proposal.client_name || '—';
  const statusEl = document.getElementById('topStatus');
  const statusMap = { draft: 'Draft', in_review: 'In Review', approved: 'Approved', sent: 'Sent', archived: 'Archived' };
  statusEl.textContent = (statusMap[proposal.status] || proposal.status) + ' ▾';
  statusEl.className = `status-badge status-${proposal.status}`;
  document.title = `${proposal.title || 'Proposal'} — VSDR`;
  updateLastSaved();
}

function updateLastSaved() {
  const el = document.getElementById('lastSaved');
  if (proposal && proposal.updated_at) {
    const d = new Date(proposal.updated_at);
    el.textContent = `Last saved ${d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}`;
  }
}

function sectionStatusIcon(status) {
  const map = { pending: '⏳', edited: '✏️', commented: '💬', approved: '✅' };
  return map[status] || '⏳';
}

function renderSecNav() {
  const list = document.getElementById('secNavList');
  list.innerHTML = '';
  const afterSel = document.getElementById('newSecAfter');
  if (afterSel) {
    afterSel.innerHTML = '<option value="-1">At the beginning</option>';
    proposal.sections.forEach((s, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `After: ${s.title || `Section ${i+1}`}`;
      afterSel.appendChild(opt);
    });
  }
  proposal.sections.forEach((sec, i) => {
    const item = document.createElement('div');
    item.className = 'sec-nav-item';
    item.dataset.index = i;
    item.innerHTML = `<span class="sec-icon">${sectionStatusIcon(sec.status)}</span><span class="sec-name">${sec.title || `Section ${i+1}`}</span>`;
    item.addEventListener('click', () => {
      const el = document.getElementById(`sec-${sec.id}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    list.appendChild(item);
  });
}

function renderSections() {
  const area = document.getElementById('sectionsArea');
  if (!proposal.sections.length) {
    area.innerHTML = `<div style="text-align:center;padding:64px 32px;color:var(--n400);">
      <div style="font-size:48px;margin-bottom:16px;">📄</div>
      <div style="font-family:var(--display);font-size:20px;color:var(--n50);margin-bottom:8px;">No sections yet</div>
      <p>Add your first section to start building this proposal.</p>
      <button onclick="openAddSection()" style="margin-top:20px;padding:10px 20px;background:var(--green);border:none;border-radius:2px;color:#0F1923;font-family:var(--body);font-weight:600;font-size:14px;cursor:pointer;">+ Add First Section</button>
    </div>`;
    return;
  }
  area.innerHTML = proposal.sections.map((sec, i) => renderSectionCard(sec, i)).join('');
  // Bind events after render
  proposal.sections.forEach((sec, i) => bindSectionEvents(sec, i));
}

function renderSectionCard(sec, i) {
  const secComments = (proposal.comments || []).filter(c => c.section_id === sec.id);
  return `
  <div class="section-card" id="sec-${sec.id}" data-sec-id="${sec.id}">
    <div class="sec-card-header">
      <span class="sec-number">${i+1}</span>
      <div class="sec-title-edit" contenteditable="true" data-sec-id="${sec.id}" data-field="title"
        onblur="onSecTitleBlur(this)">${escapeHtml(sec.title || '')}</div>
      <span class="sec-status-icon" id="secIcon-${sec.id}">${sectionStatusIcon(sec.status)}</span>
      <div class="sec-header-actions">
        <button class="btn-sec btn-sec-approve" onclick="approveSection('${sec.id}')">✅ Approve</button>
        <button class="btn-sec btn-sec-request" onclick="requestChanges('${sec.id}')">⚠ Request Changes</button>
      </div>
    </div>
    <div class="sec-content" id="secContent-${sec.id}">
      ${renderSectionContent(sec)}
    </div>
    <div class="sec-comments" id="secComments-${sec.id}">
      <div class="comments-toggle" onclick="toggleComments('${sec.id}')">
        💬 ${secComments.length} comment${secComments.length !== 1 ? 's' : ''} <span style="margin-left:4px;opacity:0.5;font-size:10px;">▼</span>
      </div>
      <div id="commentThread-${sec.id}" style="display:none;">
        <div class="comment-list" id="commentList-${sec.id}">
          ${secComments.map(c => renderComment(c)).join('')}
        </div>
        <div class="comment-input-row">
          <input type="text" class="comment-input" id="commentInput-${sec.id}" placeholder="Add a comment..." onkeydown="if(event.key==='Enter')postComment('${sec.id}')" />
          <button class="btn-post" onclick="postComment('${sec.id}')">Post</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderSectionContent(sec) {
  if (sec.content_type === 'divider') {
    return `<div class="sec-divider"></div>`;
  }
  if (sec.content_type === 'table') {
    const td = sec.table_data;
    if (!td || !td.headers) return '<p style="color:var(--n400);font-size:13px;">Empty table. Click to add data.</p>';
    const headers = td.headers || [];
    const rows = td.rows || [];
    return `<div class="sec-table-wrap"><table class="sec-table">
      <thead><tr>${headers.map((h,ci) => `<th contenteditable="true" data-sec-id="${sec.id}" data-row="-1" data-col="${ci}" onblur="onTableCellBlur(this)" onkeydown="tableTabNav(event,this)">${escapeHtml(h)}</th>`).join('')}</tr></thead>
      <tbody>${rows.map((row, ri) => `<tr>${row.map((cell, ci) => `<td contenteditable="true" data-sec-id="${sec.id}" data-row="${ri}" data-col="${ci}" onblur="onTableCellBlur(this)" onkeydown="tableTabNav(event,this)">${escapeHtml(cell)}</td>`).join('')}</tr>`).join('')}</tbody>
    </table></div>`;
  }
  if (sec.content_type === 'image') {
    const img = sec.image_url ? `<img src="${escapeHtml(sec.image_url)}" class="sec-image" alt="Section image" />` : '';
    return `${img}
    <div class="drop-zone" id="dropZone-${sec.id}" onclick="triggerFileInput('${sec.id}')">
      <input type="file" id="fileInput-${sec.id}" accept="image/*" style="display:none" onchange="handleImageUpload(event,'${sec.id}')" />
      📷 Drag image here or click to upload
    </div>`;
  }
  // text
  const paragraphs = (sec.content || '').split('\n\n').filter(Boolean);
  if (!paragraphs.length) paragraphs.push('');
  return paragraphs.map((p, pi) =>
    `<div class="sec-text-para" contenteditable="false" data-sec-id="${sec.id}" data-para="${pi}"
      onclick="enableEdit(this)" onblur="onParaBlur(this,'${sec.id}')">${escapeHtml(p)}</div>`
  ).join('');
}

function renderComment(c) {
  const initials = c.author === 'Yousra' ? 'Y' : (c.author === 'Gaby' ? 'G' : c.author.charAt(0).toUpperCase());
  const time = c.created_at ? new Date(c.created_at).toLocaleString('en-GB', { day:'numeric',month:'short',hour:'2-digit',minute:'2-digit' }) : '';
  return `<div class="comment-item">
    <div class="comment-avatar">${initials}</div>
    <div class="comment-body">
      <div class="comment-meta">${escapeHtml(c.author)} · ${time}</div>
      <div class="comment-text">${escapeHtml(c.text)}</div>
    </div>
  </div>`;
}

function bindSectionEvents(sec, i) {
  // Drop zones for images
  const dz = document.getElementById(`dropZone-${sec.id}`);
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => {
      e.preventDefault(); dz.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) loadImageFile(file, sec.id);
    });
  }
}

function enableEdit(el) {
  el.contentEditable = 'true';
  el.focus();
}

function onParaBlur(el, secId) {
  el.contentEditable = 'false';
  const sec = proposal.sections.find(s => s.id === secId);
  if (!sec) return;
  // Collect all paragraphs for this section
  const paras = document.querySelectorAll(`[data-sec-id="${secId}"].sec-text-para`);
  const text = Array.from(paras).map(p => p.textContent).join('\n\n');
  if (text !== sec.content) {
    sec.content = text;
    sec.status = sec.status === 'pending' ? 'edited' : sec.status;
    updateSecIcon(secId, sec.status);
    debouncedSave();
  }
}

function onSecTitleBlur(el) {
  const secId = el.dataset.secId;
  const sec = proposal.sections.find(s => s.id === secId);
  if (!sec) return;
  const newTitle = el.textContent.trim();
  if (newTitle !== sec.title) {
    sec.title = newTitle;
    renderSecNav();
    debouncedSave();
  }
}

function onTableCellBlur(el) {
  const secId = el.dataset.secId;
  const row = parseInt(el.dataset.row);
  const col = parseInt(el.dataset.col);
  const sec = proposal.sections.find(s => s.id === secId);
  if (!sec || !sec.table_data) return;
  if (row === -1) {
    sec.table_data.headers[col] = el.textContent;
  } else {
    if (!sec.table_data.rows[row]) sec.table_data.rows[row] = [];
    sec.table_data.rows[row][col] = el.textContent;
  }
  sec.status = sec.status === 'pending' ? 'edited' : sec.status;
  updateSecIcon(secId, sec.status);
  debouncedSave();
}

function tableTabNav(e, el) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const secId = el.dataset.secId;
    const row = parseInt(el.dataset.row);
    const col = parseInt(el.dataset.col);
    const sec = proposal.sections.find(s => s.id === secId);
    if (!sec || !sec.table_data) return;
    const cols = sec.table_data.headers.length;
    const rows = sec.table_data.rows.length;
    let nextRow = row, nextCol = col + 1;
    if (nextCol >= cols) { nextCol = 0; nextRow = row + 1; }
    if (nextRow > rows - 1) return;
    const next = document.querySelector(`[data-sec-id="${secId}"][data-row="${nextRow}"][data-col="${nextCol}"]`);
    if (next) next.focus();
  }
}

function triggerFileInput(secId) {
  const fi = document.getElementById(`fileInput-${secId}`);
  if (fi) fi.click();
}

function handleImageUpload(event, secId) {
  const file = event.target.files[0];
  if (file) loadImageFile(file, secId);
}

function loadImageFile(file, secId) {
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    const sec = proposal.sections.find(s => s.id === secId);
    if (!sec) return;
    sec.image_url = dataUrl;
    // Re-render just this section content
    const contentEl = document.getElementById(`secContent-${secId}`);
    if (contentEl) {
      contentEl.innerHTML = renderSectionContent(sec);
      bindSectionEvents(sec, proposal.sections.indexOf(sec));
    }
    debouncedSave();
    showToast('Image uploaded!', 'success');
  };
  reader.readAsDataURL(file);
}

function updateSecIcon(secId, status) {
  const el = document.getElementById(`secIcon-${secId}`);
  if (el) el.textContent = sectionStatusIcon(status);
  renderSecNav();
}

function toggleComments(secId) {
  const thread = document.getElementById(`commentThread-${secId}`);
  if (thread) thread.style.display = thread.style.display === 'none' ? 'block' : 'none';
}

function postComment(secId) {
  const input = document.getElementById(`commentInput-${secId}`);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const comment = { id: crypto.randomUUID(), section_id: secId, author: 'Yousra', text, created_at: new Date().toISOString() };
  if (!proposal.comments) proposal.comments = [];
  proposal.comments.push(comment);
  const sec = proposal.sections.find(s => s.id === secId);
  if (sec) { sec.status = 'commented'; updateSecIcon(secId, 'commented'); }
  // Re-render comment list
  const list = document.getElementById(`commentList-${secId}`);
  if (list) list.innerHTML = proposal.comments.filter(c => c.section_id === secId).map(renderComment).join('');
  // Update toggle count
  const toggle = document.querySelector(`#secComments-${secId} .comments-toggle`);
  if (toggle) {
    const cnt = proposal.comments.filter(c => c.section_id === secId).length;
    toggle.innerHTML = `💬 ${cnt} comment${cnt !== 1 ? 's' : ''} <span style="margin-left:4px;opacity:0.5;font-size:10px;">▼</span>`;
  }
  input.value = '';
  debouncedSave();
}

function approveSection(secId) {
  const sec = proposal.sections.find(s => s.id === secId);
  if (!sec) return;
  sec.status = 'approved';
  updateSecIcon(secId, 'approved');
  debouncedSave();
  showToast('Section approved ✅', 'success');
}

function requestChanges(secId) {
  const sec = proposal.sections.find(s => s.id === secId);
  if (!sec) return;
  sec.status = 'edited';
  updateSecIcon(secId, 'edited');
  debouncedSave();
  showToast('Changes requested ⚠', 'info');
}

// ── Status dropdown ──
function toggleStatusDropdown(e) {
  e.stopPropagation();
  const dd = document.getElementById('statusDropdown');
  dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
}

document.addEventListener('click', function(e) {
  const wrapper = document.getElementById('statusWrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    const dd = document.getElementById('statusDropdown');
    if (dd) dd.style.display = 'none';
  }
});

function changeStatus(newStatus) {
  document.getElementById('statusDropdown').style.display = 'none';
  if (!proposal) return;
  proposal.status = newStatus;
  saveProposal();
  renderTopBar();
  showToast('Status updated to ' + newStatus.replace('_', ' ') + ' ✓', 'success');
}

function submitForReview() {
  proposal.status = 'in_review';
  saveProposal();
  renderTopBar();
  showToast('Submitted for review!', 'success');
}

function approveFinal() {
  const unapproved = proposal.sections.filter(s => s.status !== 'approved');
  if (unapproved.length) {
    showToast(`⚠ ${unapproved.length} section(s) not yet approved: ${unapproved.map(s => s.title).join(', ')}`, 'error');
    return;
  }
  proposal.approved_at = new Date().toISOString();
  proposal.status = 'approved';
  saveProposal();
  renderTopBar();
  showToast('Proposal approved! 🎉', 'success');
}

async function exportPDF() {
  showToast('Generating PDF...', 'info');
  document.body.classList.add('pdf-mode');
  const el = document.getElementById('sectionsArea');
  const opt = {
    margin: [12, 16],
    filename: `${proposal.title || 'proposal'}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };
  try {
    await html2pdf().set(opt).from(el).save();
    showToast('PDF exported!', 'success');
  } catch (e) {
    showToast('PDF export error: ' + e.message, 'error');
  } finally {
    document.body.classList.remove('pdf-mode');
  }
}

function shareLink() {
  const token = crypto.randomUUID();
  proposal.share_token = token;
  saveProposal();
  const url = `${window.location.origin}${window.location.pathname.replace('proposal.html','proposal-view.html')}?token=${token}`;
  try {
    navigator.clipboard.writeText(url).then(() => showToast('Link copied! 🔗', 'success'));
  } catch {
    prompt('Copy this link:', url);
  }
}

function debouncedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveProposal, 1500);
}

function saveProposal() {
  if (!proposal) return;
  proposal.updated_at = new Date().toISOString();
  const proposals = lsGetProposals();
  const idx = proposals.findIndex(p => p.id === proposal.id);
  if (idx !== -1) { proposals[idx] = proposal; } else { proposals.unshift(proposal); }
  lsSaveProposals(proposals);
  showSaved();
  updateLastSaved();
}

function showSaved() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 2000);
}

// Add Section Modal
function openAddSection() {
  renderSecNav(); // refresh insert position dropdown
  document.getElementById('addSectionModal').classList.add('open');
  document.getElementById('newSecTitle').focus();
}
function closeAddSection() {
  document.getElementById('addSectionModal').classList.remove('open');
  document.getElementById('newSecTitle').value = '';
  document.getElementById('newSecContent').value = '';
}
document.getElementById('addSectionModal').addEventListener('click', e => {
  if (e.target === document.getElementById('addSectionModal')) closeAddSection();
});

function onSecTypeChange() {
  const t = document.getElementById('newSecType').value;
  document.getElementById('newSecTextGroup').style.display = t === 'text' ? '' : 'none';
  document.getElementById('newSecTableGroup').style.display = t === 'table' ? '' : 'none';
}

async function addSection() {
  const title = document.getElementById('newSecTitle').value.trim();
  const type = document.getElementById('newSecType').value;
  const initialContent = document.getElementById('newSecContent').value.trim();
  const afterIdx = parseInt(document.getElementById('newSecAfter').value);
  if (!title && type !== 'divider') { showToast('Please enter a section title', 'error'); return; }

  let table_data = null;
  if (type === 'table') {
    const rows = parseInt(document.getElementById('newSecRows').value) || 3;
    const cols = parseInt(document.getElementById('newSecCols').value) || 3;
    table_data = {
      headers: Array(cols).fill('').map((_, i) => `Column ${i+1}`),
      rows: Array(rows).fill(null).map(() => Array(cols).fill(''))
    };
  }

  const newSec = {
    id: crypto.randomUUID(),
    sort_order: afterIdx + 2,
    title: title || 'Divider',
    content_type: type,
    content: initialContent,
    table_data,
    image_url: null,
    status: 'pending',
    original_content: initialContent
  };

  // Insert at position
  proposal.sections.splice(afterIdx + 1, 0, newSec);
  // Re-number sort_order
  proposal.sections.forEach((s, i) => s.sort_order = i + 1);

  closeAddSection();
  renderSections();
  renderSecNav();
  await saveProposal();
  showToast('Section added!', 'success');
  // Scroll to new section
  setTimeout(() => {
    const el = document.getElementById(`sec-${newSec.id}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
}

// Mobile sidebar
const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');
const backdrop = document.getElementById('backdrop');
const sidebarClose = document.getElementById('sidebarClose');
hamburger.addEventListener('click', () => { sidebar.classList.add('open'); backdrop.classList.add('open'); });
sidebarClose.addEventListener('click', () => { sidebar.classList.remove('open'); backdrop.classList.remove('open'); });
backdrop.addEventListener('click', () => { sidebar.classList.remove('open'); backdrop.classList.remove('open'); });

// Theme
(function() {
  var saved = localStorage.getItem('vsdr-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeBtn(saved);
  var btn = document.getElementById('themeToggle');
  if (btn) btn.addEventListener('click', function() {
    var cur = document.documentElement.getAttribute('data-theme') || 'dark';
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('vsdr-theme', next);
    updateThemeBtn(next);
  });
  function updateThemeBtn(theme) {
    var btn = document.getElementById('themeToggle');
    if (!btn) return;
    btn.querySelector('.theme-icon').textContent = theme === 'light' ? '🌙' : '☀️';
    btn.querySelector('.theme-label').textContent = theme === 'light' ? 'Dark Mode' : 'Light Mode';
  }
})();

loadProposal();
</script>
