<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal Editor — VSDR</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/design-system.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
/* ── Editor Layout ── */
body { display: flex; }
.main { padding: 0; display: flex; flex-direction: column; min-height: 100vh; }

/* Top Bar */
.top-bar { display: flex; align-items: center; gap: 12px; padding: 16px 32px; border-bottom: 1px solid var(--border); background: var(--charcoal); position: sticky; top: 0; z-index: 50; flex-wrap: wrap; }
.btn-back { background: none; border: 1px solid var(--border); border-radius: 2px; color: var(--n400); cursor: pointer; padding: 6px 12px; font-size: 13px; transition: all 0.15s; display: flex; align-items: center; gap: 6px; text-decoration: none; }
.btn-back:hover { color: #fff; border-color: rgba(255,255,255,0.15); }
.btn-back svg { width: 16px; height: 16px; }
.top-index { font-family: var(--display); font-size: 11px; font-weight: 600; color: var(--n400); background: rgba(255,255,255,0.04); border: 1px solid var(--border); padding: 4px 10px; border-radius: 2px; }
.top-title { font-family: var(--display); font-weight: 700; font-size: 20px; color: var(--n50); flex: 1; min-width: 150px; border: none; background: none; outline: none; }
.top-title:focus { border-bottom: 2px solid var(--green); }
.top-client { font-size: 13px; color: var(--n400); background: rgba(255,255,255,0.04); padding: 4px 12px; border-radius: 100px; border: 1px solid var(--border); }
.top-status select { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--n50); font-family: var(--body); font-size: 13px; padding: 6px 10px; border-radius: 2px; outline: none; cursor: pointer; }
.top-status select option { background: #162030; }
.top-actions { display: flex; gap: 8px; align-items: center; }
.save-indicator { font-size: 12px; color: var(--green); opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
.save-indicator.show { opacity: 1; }
.save-indicator.offline { color: var(--amber); }

/* Editor body */
.editor-body { display: flex; flex: 1; overflow: hidden; }

/* Section Navigator */
.sec-nav { width: 220px; flex-shrink: 0; border-right: 1px solid var(--border); background: var(--charcoal); overflow-y: auto; padding: 16px 0; position: sticky; top: 60px; height: calc(100vh - 60px); }
.sec-nav-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--n400); padding: 0 16px 12px; }
.sec-nav-list { list-style: none; }
.sec-nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; font-size: 13px; color: var(--n400); cursor: pointer; transition: all 0.15s; border-left: 2px solid transparent; }
.sec-nav-item:hover { color: var(--n50); background: rgba(255,255,255,0.03); }
.sec-nav-item.active { color: var(--green); border-left-color: var(--green); background: rgba(78,203,113,0.06); }
.sec-nav-status { font-size: 10px; }
.sec-nav-add { display: flex; align-items: center; gap: 8px; padding: 12px 16px; font-size: 13px; color: var(--green); cursor: pointer; border-top: 1px solid var(--border); margin-top: 8px; transition: all 0.15s; }
.sec-nav-add:hover { background: rgba(78,203,113,0.06); }

/* Editor Content */
.editor-content { flex: 1; padding: 32px; overflow-y: auto; max-width: 900px; margin: 0 auto; width: 100%; }

/* Section Card */
.section-card { background: var(--n800); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 24px; overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s; }
.section-card.flash { border-color: var(--green); box-shadow: 0 0 20px rgba(78,203,113,0.1); }
.section-card.change-requested { border-left: 3px solid var(--amber); }
.section-card.approved { border-left: 3px solid var(--green); }

/* Section Header */
.sec-header { display: flex; align-items: center; gap: 10px; padding: 16px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.sec-number { font-family: var(--display); font-size: 11px; font-weight: 700; color: var(--n400); background: rgba(255,255,255,0.04); border: 1px solid var(--border); padding: 2px 8px; border-radius: 2px; }
.sec-type-pill { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 2px; background: rgba(167,139,250,0.15); color: var(--purple); }
.sec-title-input { font-family: var(--display); font-weight: 600; font-size: 16px; color: var(--n50); background: none; border: none; outline: none; flex: 1; min-width: 100px; }
.sec-title-input:focus { border-bottom: 1px solid var(--green); }
.sec-status-icon { font-size: 14px; }
.sec-actions { display: flex; gap: 6px; margin-left: auto; }
.sec-action-btn { background: none; border: 1px solid var(--border); border-radius: 2px; color: var(--n400); font-size: 11px; padding: 4px 10px; cursor: pointer; transition: all 0.15s; font-family: var(--body); }
.sec-action-btn:hover { color: var(--n50); border-color: rgba(255,255,255,0.15); }
.sec-action-btn.approve { border-color: rgba(78,203,113,0.3); color: var(--green); }
.sec-action-btn.approve:hover { background: rgba(78,203,113,0.1); }
.sec-action-btn.delete { border-color: rgba(239,68,68,0.2); color: var(--coral); }
.sec-action-btn.delete:hover { background: rgba(239,68,68,0.1); }

/* Section Body */
.sec-body { padding: 20px; }

/* Editable text */
.sec-editable { outline: none; min-height: 60px; font-size: 15px; line-height: 1.8; color: var(--n50); cursor: text; white-space: pre-wrap; }
.sec-editable:empty::before { content: 'Click to edit...'; color: var(--n400); font-style: italic; }
.sec-editable:focus { background: rgba(255,255,255,0.02); border-radius: 4px; padding: 12px; margin: -12px; }

/* Editable table */
.sec-table-edit { width: 100%; border-collapse: collapse; }
.sec-table-edit th, .sec-table-edit td { padding: 10px 14px; border: 1px solid var(--border); font-size: 14px; color: var(--n50); }
.sec-table-edit th { background: rgba(255,255,255,0.04); font-weight: 600; font-size: 13px; }
.sec-table-edit td { cursor: text; }
.sec-table-edit td:focus { outline: 2px solid var(--green); outline-offset: -2px; background: rgba(78,203,113,0.05); }
.sec-table-edit .rec-col { background: rgba(78,203,113,0.06); }

/* JSON editor for metrics/timeline */
.json-editor-toggle { font-size: 12px; color: var(--teal); cursor: pointer; margin-top: 12px; display: inline-flex; align-items: center; gap: 4px; }
.json-editor-toggle:hover { text-decoration: underline; }
.json-editor { display: none; margin-top: 12px; }
.json-editor.open { display: block; }
.json-editor textarea { width: 100%; min-height: 200px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 4px; color: var(--green); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; padding: 16px; outline: none; resize: vertical; }
.json-editor textarea:focus { border-color: var(--green); }
.json-editor-actions { display: flex; gap: 8px; margin-top: 8px; }

/* Image upload zone */
.image-upload-zone { border: 2px dashed var(--border); border-radius: 4px; padding: 32px; text-align: center; color: var(--n400); cursor: pointer; transition: all 0.2s; }
.image-upload-zone:hover { border-color: var(--green); color: var(--n50); }
.image-upload-zone.dragover { border-color: var(--green); background: rgba(78,203,113,0.05); }
.image-preview { max-width: 100%; border-radius: 4px; margin-bottom: 12px; }
.image-actions { display: flex; gap: 8px; margin-top: 8px; }

/* ── Chat per Section ── */
.sec-chat { border-top: 1px solid var(--border); }
.chat-toggle { display: flex; align-items: center; gap: 8px; padding: 10px 20px; width: 100%; background: none; border: none; cursor: pointer; color: var(--n400); font-size: 13px; font-family: var(--body); transition: all 0.15s; text-align: left; }
.chat-toggle:hover { color: var(--n50); background: rgba(255,255,255,0.02); }
.chat-count { font-size: 12px; }
.chat-status-dot { width: 6px; height: 6px; border-radius: 50%; }
.chat-status-dot.has-open { background: var(--amber); }
.chat-status-dot.all-resolved { background: var(--green); }

.chat-thread { display: none; padding: 0 20px 16px; }
.chat-thread.open { display: block; }

.chat-messages { max-height: 300px; overflow-y: auto; margin-bottom: 12px; }
.chat-msg { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.chat-msg:last-child { border-bottom: none; }
.chat-author { font-size: 12px; font-weight: 600; color: var(--n50); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.chat-time { font-weight: 400; color: var(--n400); font-size: 11px; }
.chat-bubble { font-size: 14px; line-height: 1.6; color: var(--n400); padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 4px; }
.chat-msg-gaby .chat-bubble { background: rgba(78,203,113,0.06); border-left: 2px solid var(--green); }
.chat-resolved-badge { font-size: 10px; color: var(--green); background: rgba(78,203,113,0.15); padding: 2px 8px; border-radius: 2px; margin-top: 6px; display: inline-block; }

.chat-input-row { display: flex; gap: 8px; }
.chat-input { flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 4px; color: var(--n50); font-family: var(--body); font-size: 14px; outline: none; }
.chat-input:focus { border-color: var(--green); }
.chat-input::placeholder { color: rgba(148,163,184,0.5); }
.chat-send-btn { padding: 10px 16px; background: var(--green); border: none; border-radius: 4px; color: #0F1923; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
.chat-send-btn:hover { opacity: 0.9; }
.chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Add Section Modal */
.add-sec-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.add-sec-option { padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; text-align: center; transition: all 0.15s; }
.add-sec-option:hover { border-color: var(--green); background: rgba(78,203,113,0.05); }
.add-sec-icon { font-size: 24px; margin-bottom: 6px; }
.add-sec-label { font-size: 13px; font-weight: 600; color: var(--n50); }
.add-sec-desc { font-size: 11px; color: var(--n400); margin-top: 2px; }

.modal-card.sm { max-width: 400px; }

@media (max-width: 1024px) {
  .sec-nav { display: none; }
}
@media (max-width: 768px) {
  .top-bar { padding: 12px 16px; gap: 8px; }
  .top-title { font-size: 16px; }
  .editor-content { padding: 16px; }
  .add-sec-grid { grid-template-columns: repeat(2, 1fr); }
  .sec-header { padding: 12px 16px; }
  .sec-body { padding: 16px; }
}
</style>
</head>
<body>

<main class="main">
  <!-- Top Bar -->
  <div class="top-bar">
    <a href="proposals.html" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
    <span class="top-index" id="topIndex">...</span>
    <input class="top-title" id="topTitle" value="Loading..." />
    <span class="top-client" id="topClient">—</span>
    <div class="top-status">
      <select id="topStatus" onchange="changeProposalStatus(this.value)">
        <option value="draft">Draft</option>
        <option value="in_review">In Review</option>
        <option value="approved">Approved</option>
        <option value="sent">Sent</option>
        <option value="archived">Archived</option>
      </select>
    </div>
    <div class="top-actions">
      <span class="save-indicator" id="saveIndicator">Saved ✓</span>
      <button class="btn-sync" onclick="refreshProposal()">&#8635; Refresh</button>
      <button class="btn-secondary" onclick="exportPDF()" style="font-size:12px">PDF</button>
      <button class="btn-primary" onclick="generateShareLink()" style="font-size:12px;padding:8px 14px">Share</button>
    </div>
  </div>

  <div class="editor-body">
    <!-- Section Navigator -->
    <div class="sec-nav">
      <div class="sec-nav-title">Sections</div>
      <ul class="sec-nav-list" id="secNavList"></ul>
      <div class="sec-nav-add" onclick="openAddSectionModal()">+ Add Section</div>
    </div>

    <!-- Editor Content -->
    <div class="editor-content" id="editorContent">
      <div style="text-align:center;padding:80px 0;color:var(--n400)">Loading proposal...</div>
    </div>
  </div>
</main>

<!-- Add Section Modal -->
<div class="modal-overlay" id="addSectionModal">
  <div class="modal-card" style="max-width:560px">
    <h3 class="modal-title">Add Section</h3>
    <div class="add-sec-grid" id="addSecGrid"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeAddSectionModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Delete Section Confirm -->
<div class="modal-overlay" id="delSecModal">
  <div class="modal-card sm">
    <h3 class="modal-title">Delete Section</h3>
    <p style="color:var(--n400);font-size:14px;line-height:1.6">Are you sure you want to delete this section? This cannot be undone.</p>
    <div class="modal-actions" style="margin-top:20px">
      <button class="btn-secondary" onclick="closeDelSecModal()">Cancel</button>
      <button class="btn-danger" id="btnDelSec" onclick="confirmDeleteSection()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="pdfContainer" style="display:none"></div>

<script src="js/supabase-client.js"></script>
<script src="js/proposal-data.js"></script>
<script src="js/proposal-renderers.js"></script>
<script src="js/sidebar.js"></script>
<script>
initSidebar('proposals');

let proposal = null;
let sections = [];
let changeRequests = [];
let saveQueue = new Map();
let saveTimeout = null;
let delSectionId = null;

const proposalId = new URLSearchParams(location.search).get('id');
if (!proposalId) { window.location.href = 'proposals.html'; }

// ════════════════════════
// Data loading
// ════════════════════════

async function loadProposal() {
  try {
    const data = await fetchProposal(proposalId);
    if (!data) { showToast('Proposal not found', 'error'); return; }
    proposal = data;
    sections = data.sections || [];
    changeRequests = data.change_requests || [];
    renderAll();
  } catch (e) {
    console.error('Load failed:', e);
    showToast('Failed to load: ' + e.message, 'error');
  }
}

async function refreshProposal() {
  showToast('Refreshing...', 'success');
  await loadProposal();
  document.querySelectorAll('.section-card').forEach(el => {
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 1500);
  });
}

// ════════════════════════
// Rendering
// ════════════════════════

function renderAll() {
  renderTopBar();
  renderSecNav();
  renderSections();
}

function renderTopBar() {
  document.getElementById('topIndex').textContent = proposal.proposal_index || '';
  document.getElementById('topTitle').value = proposal.title || 'Untitled';
  document.getElementById('topClient').textContent = proposal.client_name || '—';
  document.getElementById('topStatus').value = proposal.status || 'draft';
  document.title = (proposal.title || 'Proposal') + ' — VSDR';
}

const STATUS_ICONS = { pending: '⏳', edited: '✏️', change_requested: '🔴', approved: '✅' };

function renderSecNav() {
  document.getElementById('secNavList').innerHTML = sections.map((s, i) =>
    '<li class="sec-nav-item" data-id="' + s.id + '" onclick="scrollToSection(\'' + s.id + '\')">' +
      '<span class="sec-nav-status">' + (STATUS_ICONS[s.status] || '⏳') + '</span>' +
      '<span>' + (i + 1) + '. ' + escH(s.title || 'Untitled') + '</span>' +
    '</li>'
  ).join('');
}

function renderSections() {
  const container = document.getElementById('editorContent');
  if (!sections.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">No sections yet</div><p style="color:var(--n400)">Add a section to start building your proposal.</p><button class="btn-primary" onclick="openAddSectionModal()" style="margin-top:16px">+ Add Section</button></div>';
    return;
  }
  container.innerHTML = sections.map((s, i) => renderSectionCard(s, i)).join('');
}

function renderSectionCard(section, index) {
  const sectionCRs = changeRequests.filter(cr => cr.section_id === section.id);
  const openCRs = sectionCRs.filter(cr => cr.status === 'open' || cr.status === 'in_progress');
  const statusCls = section.status === 'approved' ? ' approved' : section.status === 'change_requested' ? ' change-requested' : '';

  let bodyHtml = '';
  if (section.content_type === 'text' || section.content_type === 'callout') {
    bodyHtml = renderEditableText(section);
  } else if (section.content_type === 'table' || section.content_type === 'pricing') {
    bodyHtml = renderEditableTable(section);
  } else if (section.content_type === 'image') {
    bodyHtml = renderEditableImage(section);
  } else if (section.content_type === 'cover') {
    bodyHtml = renderSectionContent(section, proposal);
  } else if (section.content_type === 'divider') {
    bodyHtml = renderDivider();
  } else {
    bodyHtml = renderSectionContent(section, proposal) + renderJsonEditor(section);
  }

  return '<div class="section-card' + statusCls + '" id="sec-' + section.id + '" data-id="' + section.id + '">' +
    '<div class="sec-header">' +
      '<span class="sec-number">' + String(index + 1).padStart(2, '0') + '</span>' +
      '<span class="sec-type-pill">' + escH(section.content_type) + '</span>' +
      '<input class="sec-title-input" value="' + escAttr(section.title || '') + '" onchange="saveSectionTitle(\'' + section.id + '\', this.value)" />' +
      '<span class="sec-status-icon">' + (STATUS_ICONS[section.status] || '⏳') + '</span>' +
      '<div class="sec-actions">' +
        (section.status !== 'approved' ? '<button class="sec-action-btn approve" onclick="approveSection(\'' + section.id + '\')">Approve</button>' : '') +
        '<button class="sec-action-btn delete" onclick="openDelSecModal(\'' + section.id + '\')">Delete</button>' +
      '</div>' +
    '</div>' +
    '<div class="sec-body">' + bodyHtml + '</div>' +
    renderChatArea(section, sectionCRs, openCRs) +
  '</div>';
}

function renderEditableText(section) {
  return '<div class="sec-editable" contenteditable="true" data-section-id="' + section.id + '" data-field="content" onblur="handleTextBlur(this)">' +
    escH(section.content || '').replace(/\n/g, '<br>') + '</div>';
}

function renderEditableTable(section) {
  const td = section.table_data || section.content_json || {};
  const headers = td.headers || [];
  const rows = td.rows || [];
  const rec = td.recommended || '';
  const recIdx = rec ? headers.indexOf(rec) : -1;

  let html = '<div class="sec-table-wrap"><table class="sec-table-edit" data-section-id="' + section.id + '">';
  if (headers.length) {
    html += '<thead><tr>';
    headers.forEach((h, i) => { html += '<th' + (i === recIdx ? ' class="rec-col"' : '') + ' contenteditable="true">' + escH(h) + '</th>'; });
    html += '</tr></thead>';
  }
  html += '<tbody>';
  rows.forEach(row => {
    html += '<tr>';
    (Array.isArray(row) ? row : [row]).forEach((cell, ci) => {
      html += '<td' + (ci === recIdx ? ' class="rec-col"' : '') + ' contenteditable="true">' + escH(cell) + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function renderEditableImage(section) {
  if (section.image_url) {
    return '<img src="' + section.image_url + '" class="image-preview" alt="' + escAttr(section.title) + '">' +
      '<div class="image-actions">' +
        '<button class="btn-secondary" style="font-size:12px" onclick="triggerImageUpload(\'' + section.id + '\')">Replace</button>' +
        '<button class="btn-danger" style="font-size:12px" onclick="removeImage(\'' + section.id + '\')">Remove</button>' +
      '</div>' +
      '<input type="file" accept="image/*" style="display:none" id="imgInput-' + section.id + '" onchange="handleImageUpload(\'' + section.id + '\', this)">';
  }
  return '<div class="image-upload-zone" onclick="triggerImageUpload(\'' + section.id + '\')" ondragover="event.preventDefault();this.classList.add(\'dragover\')" ondragleave="this.classList.remove(\'dragover\')" ondrop="handleImageDrop(\'' + section.id + '\', event)">' +
    '<div style="font-size:32px;margin-bottom:8px;opacity:0.5">🖼️</div><div>Drag & drop an image or click to upload</div></div>' +
    '<input type="file" accept="image/*" style="display:none" id="imgInput-' + section.id + '" onchange="handleImageUpload(\'' + section.id + '\', this)">';
}

function renderJsonEditor(section) {
  const data = section.metrics_data || section.timeline_data || section.table_data || section.content_json || {};
  return '<div class="json-editor-toggle" onclick="toggleJsonEditor(\'' + section.id + '\')">⚙ Edit data</div>' +
    '<div class="json-editor" id="jsonEditor-' + section.id + '">' +
      '<textarea id="jsonTa-' + section.id + '">' + escH(JSON.stringify(data, null, 2)) + '</textarea>' +
      '<div class="json-editor-actions">' +
        '<button class="btn-primary" style="font-size:12px;padding:6px 14px" onclick="saveJsonData(\'' + section.id + '\', \'' + section.content_type + '\')">Apply</button>' +
        '<button class="btn-secondary" style="font-size:12px" onclick="toggleJsonEditor(\'' + section.id + '\')">Cancel</button>' +
      '</div></div>';
}

function renderChatArea(section, crs, openCRs) {
  const count = crs.length;
  const hasOpen = openCRs.length > 0;
  const dotCls = count === 0 ? '' : (hasOpen ? 'has-open' : 'all-resolved');

  let msgsHtml = crs.map(cr => {
    const isGaby = (cr.author || '').toLowerCase() === 'gaby';
    const time = cr.created_at ? new Date(cr.created_at).toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
    let h = '<div class="chat-msg' + (isGaby ? ' chat-msg-gaby' : '') + '">' +
      '<div class="chat-author">' + escH(cr.author) + ' <span class="chat-time">' + time + '</span></div>' +
      '<div class="chat-bubble">' + escH(cr.message) + '</div>';
    if (cr.status === 'resolved') {
      h += '<span class="chat-resolved-badge">Resolved</span>';
      if (cr.response) h += '<div class="chat-bubble" style="margin-top:6px;font-size:13px;color:var(--green)">' + escH(cr.response) + '</div>';
    }
    return h + '</div>';
  }).join('');

  return '<div class="sec-chat">' +
    '<button class="chat-toggle" onclick="toggleChat(\'' + section.id + '\')">' +
      '<span>💬</span><span class="chat-count">' + count + ' message' + (count !== 1 ? 's' : '') + '</span>' +
      (dotCls ? '<span class="chat-status-dot ' + dotCls + '"></span>' : '') +
    '</button>' +
    '<div class="chat-thread" id="chat-' + section.id + '">' +
      '<div class="chat-messages">' + msgsHtml + '</div>' +
      '<div class="chat-input-row">' +
        '<input class="chat-input" id="chatIn-' + section.id + '" placeholder="Tell Gaby what to change..." onkeydown="if(event.key===\'Enter\')sendCR(\'' + section.id + '\')" />' +
        '<button class="chat-send-btn" onclick="sendCR(\'' + section.id + '\')">Send</button>' +
      '</div></div></div>';
}

// ════════════════════════
// Interactions
// ════════════════════════

function escH(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function escAttr(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;') : ''; }

function scrollToSection(id) {
  const el = document.getElementById('sec-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleChat(sectionId) {
  document.getElementById('chat-' + sectionId).classList.toggle('open');
}

function toggleJsonEditor(sectionId) {
  document.getElementById('jsonEditor-' + sectionId).classList.toggle('open');
}

// ── Title save ──
document.getElementById('topTitle').addEventListener('change', async function() {
  if (!proposal) return;
  try {
    await updateProposal(proposal.id, { title: this.value });
    proposal.title = this.value;
    showSaved();
  } catch (e) { showToast('Save failed', 'error'); }
});

async function saveSectionTitle(sectionId, value) {
  try {
    await updateSection(sectionId, { title: value });
    const sec = sections.find(s => s.id === sectionId);
    if (sec) sec.title = value;
    renderSecNav();
    showSaved();
  } catch (e) { showToast('Save failed', 'error'); }
}

// ── Text editing ──
function handleTextBlur(el) {
  queueSave(el.dataset.sectionId, { content: el.innerText });
}

// ── Table editing ──
document.addEventListener('blur', function(e) {
  const table = e.target.closest('.sec-table-edit');
  if (!table || !e.target.matches('th, td')) return;
  saveTableData(table.dataset.sectionId, table);
}, true);

function saveTableData(sectionId, tableEl) {
  const headers = []; const rows = [];
  tableEl.querySelectorAll('thead th').forEach(th => headers.push(th.textContent.trim()));
  tableEl.querySelectorAll('tbody tr').forEach(tr => {
    const row = []; tr.querySelectorAll('td').forEach(td => row.push(td.textContent.trim())); rows.push(row);
  });
  const sec = sections.find(s => s.id === sectionId);
  const existing = sec ? (sec.table_data || sec.content_json || {}) : {};
  const td = { headers, rows, recommended: existing.recommended || '' };
  queueSave(sectionId, { table_data: td, content_json: td });
}

// ── JSON data save ──
async function saveJsonData(sectionId, contentType) {
  const ta = document.getElementById('jsonTa-' + sectionId);
  if (!ta) return;
  try {
    const data = JSON.parse(ta.value);
    const fields = { content_json: data };
    if (contentType === 'metrics') fields.metrics_data = data;
    else if (contentType === 'timeline') fields.timeline_data = data;
    else if (contentType === 'table' || contentType === 'pricing') fields.table_data = data;
    await updateSection(sectionId, fields);
    const sec = sections.find(s => s.id === sectionId);
    if (sec) Object.assign(sec, fields);
    toggleJsonEditor(sectionId);
    renderSections();
    showSaved();
  } catch (e) { showToast('Invalid JSON: ' + e.message, 'error'); }
}

// ── Image handling ──
function triggerImageUpload(sectionId) {
  document.getElementById('imgInput-' + sectionId).click();
}

function handleImageUpload(sectionId, input) {
  if (input.files[0]) readImageFile(input.files[0], sectionId);
}

function handleImageDrop(sectionId, event) {
  event.preventDefault();
  const file = event.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) readImageFile(file, sectionId);
}

function readImageFile(file, sectionId) {
  const reader = new FileReader();
  reader.onload = function(e) {
    queueSave(sectionId, { image_url: e.target.result });
    const sec = sections.find(s => s.id === sectionId);
    if (sec) sec.image_url = e.target.result;
    renderSections();
  };
  reader.readAsDataURL(file);
}

function removeImage(sectionId) {
  queueSave(sectionId, { image_url: null });
  const sec = sections.find(s => s.id === sectionId);
  if (sec) sec.image_url = null;
  renderSections();
}

// ── Section status ──
async function approveSection(sectionId) {
  try {
    await updateSection(sectionId, { status: 'approved' });
    const sec = sections.find(s => s.id === sectionId);
    if (sec) sec.status = 'approved';
    renderSections(); renderSecNav();
    showToast('Section approved', 'success');
  } catch (e) { showToast('Failed to approve', 'error'); }
}

async function changeProposalStatus(newStatus) {
  try {
    await updateProposal(proposal.id, { status: newStatus });
    proposal.status = newStatus;
    showSaved();
  } catch (e) { showToast('Status change failed', 'error'); }
}

// ── Change Requests ──
async function sendCR(sectionId) {
  const input = document.getElementById('chatIn-' + sectionId);
  const msg = input.value.trim();
  if (!msg) return;
  input.disabled = true;
  try {
    const cr = await createChangeRequest(sectionId, proposal.id, msg, 'Yousra');
    changeRequests.push(cr);
    const sec = sections.find(s => s.id === sectionId);
    if (sec) sec.status = 'change_requested';
    input.value = '';
    renderSections(); renderSecNav();
    showToast('Change request sent to Gaby', 'success');
  } catch (e) { showToast('Failed to send: ' + e.message, 'error'); }
  finally { input.disabled = false; }
}

// ── Add Section ──
function openAddSectionModal() {
  document.getElementById('addSecGrid').innerHTML = SECTION_TYPES.map(t =>
    '<div class="add-sec-option" onclick="addSection(\'' + t.type + '\')">' +
      '<div class="add-sec-icon">' + t.icon + '</div>' +
      '<div class="add-sec-label">' + t.label + '</div>' +
      '<div class="add-sec-desc">' + t.desc + '</div></div>'
  ).join('');
  document.getElementById('addSectionModal').classList.add('open');
}
function closeAddSectionModal() { document.getElementById('addSectionModal').classList.remove('open'); }
document.getElementById('addSectionModal').addEventListener('click', e => { if (e.target.id === 'addSectionModal') closeAddSectionModal(); });

async function addSection(contentType) {
  closeAddSectionModal();
  const typeInfo = SECTION_TYPES.find(t => t.type === contentType) || {};
  try {
    const sec = await createSection(proposal.id, {
      sort_order: sections.length + 1,
      title: typeInfo.label || contentType,
      content_type: contentType,
      content: contentType === 'text' || contentType === 'callout' ? '' : null,
      content_json: {},
      status: 'pending'
    });
    if (sec) { sections.push(sec); renderSections(); renderSecNav(); scrollToSection(sec.id); showToast('Section added', 'success'); }
  } catch (e) { showToast('Failed to add section', 'error'); }
}

// ── Delete Section ──
function openDelSecModal(id) { delSectionId = id; document.getElementById('delSecModal').classList.add('open'); }
function closeDelSecModal() { delSectionId = null; document.getElementById('delSecModal').classList.remove('open'); }
document.getElementById('delSecModal').addEventListener('click', e => { if (e.target.id === 'delSecModal') closeDelSecModal(); });

async function confirmDeleteSection() {
  if (!delSectionId) return;
  try {
    await deleteSection(delSectionId);
    sections = sections.filter(s => s.id !== delSectionId);
    changeRequests = changeRequests.filter(cr => cr.section_id !== delSectionId);
    closeDelSecModal(); renderSections(); renderSecNav();
    showToast('Section deleted', 'success');
  } catch (e) { showToast('Delete failed', 'error'); }
}

// ── Auto-save ──
function queueSave(sectionId, fields) {
  saveQueue.set(sectionId, { ...(saveQueue.get(sectionId) || {}), ...fields });
  showSaving();
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(flushSaveQueue, 2000);
}

async function flushSaveQueue() {
  for (const [sectionId, fields] of saveQueue) {
    try {
      await updateSection(sectionId, fields);
      const sec = sections.find(s => s.id === sectionId);
      if (sec) Object.assign(sec, fields);
    } catch (e) { console.error('Auto-save failed:', e); showSavedOffline(); return; }
  }
  saveQueue.clear();
  showSaved();
}

function showSaved() { const el = document.getElementById('saveIndicator'); el.textContent = 'Saved ✓'; el.className = 'save-indicator show'; setTimeout(() => el.classList.remove('show'), 2000); }
function showSaving() { const el = document.getElementById('saveIndicator'); el.textContent = 'Saving...'; el.className = 'save-indicator show'; }
function showSavedOffline() { const el = document.getElementById('saveIndicator'); el.textContent = 'Offline — saved locally'; el.className = 'save-indicator show offline'; }

// ── PDF Export ──
async function exportPDF() {
  showToast('Generating PDF...', 'success');
  const container = document.getElementById('pdfContainer');
  let html = '<div style="font-family:General Sans,Helvetica Neue,Arial,sans-serif;color:#0F172A;max-width:800px;margin:0 auto;">';
  sections.forEach(sec => {
    if (sec.content_type === 'cover') {
      html += '<div style="page-break-after:always">' + renderSectionContent(sec, proposal) + '</div>';
    } else if (sec.content_type === 'divider') {
      html += renderDivider();
    } else {
      html += '<div style="margin-bottom:32px;page-break-inside:avoid;">';
      if (sec.title) html += '<h2 style="font-family:Space Grotesk,sans-serif;font-size:24px;font-weight:700;margin-bottom:16px;color:#0F172A;border-bottom:2px solid #4ECB71;padding-bottom:8px;">' + escH(sec.title) + '</h2>';
      html += renderSectionContent(sec, proposal) + '</div>';
    }
  });
  html += '</div>';
  container.innerHTML = html;
  container.style.display = 'block';
  try {
    await html2pdf().set({ margin: [15, 15], filename: (proposal.slug || 'proposal') + '.pdf', image: { type: 'jpeg', quality: 0.95 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }, pagebreak: { mode: ['avoid-all', 'css', 'legacy'] } }).from(container).save();
    showToast('PDF exported!', 'success');
  } catch (e) { showToast('PDF export failed', 'error'); }
  finally { container.style.display = 'none'; }
}

// ── Share Link ──
async function generateShareLink() {
  try {
    let token = proposal.share_token;
    if (!token) { token = crypto.randomUUID(); await updateProposal(proposal.id, { share_token: token }); proposal.share_token = token; }
    const url = location.origin + '/proposal-view.html?token=' + token;
    await navigator.clipboard.writeText(url);
    showToast('Share link copied!', 'success');
  } catch (e) { showToast('Failed to generate share link', 'error'); }
}

// ── Toast ──
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success') + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Init ──
loadProposal();
</script>
