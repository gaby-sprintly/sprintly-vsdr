<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal Editor — VSDR</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/design-system.css">
<style>
body { display: flex; }
.main { padding: 0; display: flex; flex-direction: column; min-height: 100vh; }

/* ══ TOP BAR — always dark ══ */
.top-bar { display: flex; align-items: center; gap: 12px; padding: 14px 28px; border-bottom: 1px solid rgba(255,255,255,0.06); background: #0F1923; position: sticky; top: 0; z-index: 50; flex-wrap: wrap; }
.btn-back { background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: #94A3B8; cursor: pointer; padding: 6px 14px; font-size: 13px; transition: all 0.15s; display: flex; align-items: center; gap: 6px; text-decoration: none; font-family: var(--body); }
.btn-back:hover { color: #fff; border-color: rgba(255,255,255,0.25); }
.btn-back svg { width: 14px; height: 14px; }
.top-index { font-family: var(--display); font-size: 11px; font-weight: 600; color: #64748B; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 4px; }
.top-title { font-family: var(--display); font-weight: 700; font-size: 18px; color: #F8FAFC; flex: 1; min-width: 120px; border: none; background: none; outline: none; }
.top-title:focus { border-bottom: 2px solid #4ECB71; }
.top-client { font-size: 12px; color: #94A3B8; background: rgba(255,255,255,0.04); padding: 4px 12px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.08); }
.top-status select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #F8FAFC; font-family: var(--body); font-size: 12px; padding: 6px 10px; border-radius: 4px; outline: none; cursor: pointer; }
.top-status select option { background: #162030; }
.top-actions { display: flex; gap: 8px; align-items: center; margin-left: auto; }
.save-ind { font-size: 11px; color: #4ECB71; opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
.save-ind.show { opacity: 1; }
.save-ind.offline { color: #F59E0B; }
.top-btn { padding: 7px 14px; border-radius: 4px; font-size: 12px; font-weight: 600; font-family: var(--body); cursor: pointer; transition: all 0.15s; border: 1px solid rgba(255,255,255,0.1); background: none; color: #94A3B8; }
.top-btn:hover { color: #F8FAFC; border-color: rgba(255,255,255,0.25); }
.top-btn.primary { background: #4ECB71; border-color: #4ECB71; color: #0F1923; }
.top-btn.primary:hover { opacity: 0.9; }

/* ══ EDITOR BODY ══ */
.editor-body { display: flex; flex: 1; position: relative; }

/* Left nav */
.sec-nav { width: 200px; flex-shrink: 0; border-right: 1px solid var(--border); background: var(--charcoal); overflow-y: auto; padding: 16px 0; position: sticky; top: 56px; height: calc(100vh - 56px); }
.sec-nav-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #64748B; padding: 0 16px 12px; font-weight: 600; }
.sec-nav-list { list-style: none; }
.sec-nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 16px; font-size: 12px; color: #94A3B8; cursor: pointer; transition: all 0.15s; border-left: 2px solid transparent; }
.sec-nav-item:hover { color: #F8FAFC; background: rgba(255,255,255,0.03); }
.sec-nav-item.active { color: #4ECB71; border-left-color: #4ECB71; background: rgba(78,203,113,0.06); }
.sec-nav-add { display: flex; align-items: center; gap: 8px; padding: 12px 16px; font-size: 12px; color: #4ECB71; cursor: pointer; border-top: 1px solid rgba(255,255,255,0.06); margin-top: 8px; transition: all 0.15s; font-weight: 600; }
.sec-nav-add:hover { background: rgba(78,203,113,0.06); }

/* ══ WYSIWYG PREVIEW — uses exact client-view CSS ══ */
.editor-preview { flex: 1; overflow-y: auto; background: #F8FAFC; transition: margin-right 0.3s; }
.editor-preview.panel-open { margin-right: 420px; }
.preview-inner { max-width: 900px; margin: 0 auto; padding: 32px 24px 80px; }

/* Section wrapper (clickable) */
.sec-wrap { position: relative; cursor: pointer; border-radius: 8px; transition: box-shadow 0.2s; margin-bottom: 8px; }
.sec-wrap:hover { box-shadow: 0 0 0 2px rgba(78,203,113,0.4); }
.sec-wrap.active { box-shadow: 0 0 0 2px #4ECB71; }

/* Status strip at bottom of section */
.sec-strip { height: 3px; border-radius: 0 0 8px 8px; }
.sec-strip.pending { background: #94A3B8; opacity: 0.3; }
.sec-strip.approved { background: #4ECB71; }
.sec-strip.change_requested { background: #F59E0B; }
.sec-strip.edited { background: #A78BFA; }

/* ── Client-view section CSS (copied exactly from proposal-view.html) ── */
.cover-page { background: linear-gradient(135deg, #0F1923 0%, #162030 50%, #1a2942 100%); border-radius: 12px; padding: 80px 60px; min-height: 500px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; margin-bottom: 48px; }
.cover-brand { margin-bottom: 48px; }
.cover-logo { font-family: var(--display); font-weight: 700; font-size: 14px; color: #4ECB71; letter-spacing: 4px; text-transform: uppercase; }
.cover-logo span { color: #94A3B8; font-weight: 400; margin-left: 4px; }
.cover-title { font-family: var(--display); font-weight: 700; font-size: 48px; color: #fff; line-height: 1.15; margin-bottom: 16px; max-width: 650px; }
.cover-subtitle { font-size: 20px; color: #94A3B8; margin-bottom: 40px; }
.cover-meta { display: flex; gap: 40px; flex-wrap: wrap; }
.cover-meta-item { display: flex; flex-direction: column; gap: 4px; }
.cover-meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #64748B; }
.cover-meta-item span:last-child { font-size: 15px; color: #F8FAFC; font-weight: 500; }
.cover-accent-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #4ECB71, #2DD4BF, #F59E0B); }

.section-heading { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
.section-num { font-family: var(--display); font-weight: 700; font-size: 14px; color: #4ECB71; background: rgba(78,203,113,0.1); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.section-title-text { font-family: var(--display); font-weight: 700; font-size: 28px; color: #0F172A; }

.sec-text p { font-size: 16px; line-height: 1.9; color: #334155; margin-bottom: 16px; }
.sec-text p:last-child { margin-bottom: 0; }
.sec-callout-inline { border-left: 3px solid #F59E0B; padding: 16px 20px; margin: 24px 0; background: rgba(245,158,11,0.06); border-radius: 0 4px 4px 0; }
.sec-callout-inline p { font-style: italic; color: #334155; margin: 0; }
.sec-callout-inline cite { color: #64748B; }
.sec-table-wrap { border-radius: 8px; border: 1px solid rgba(0,0,0,0.08); overflow: hidden; }
.sec-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.sec-table th { padding: 14px 18px; background: #F8FAFC; text-align: left; font-weight: 600; color: #0F172A; border-bottom: 1px solid rgba(0,0,0,0.08); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
.sec-table td { padding: 12px 18px; border-bottom: 1px solid rgba(0,0,0,0.04); color: #475569; }
.sec-table tr:last-child td { border-bottom: none; }
.sec-table .rec-col { background: rgba(78,203,113,0.08); }
.sec-table th.rec-col { color: #16a34a; }
.rec-badge { font-size: 9px; background: #4ECB71; color: #fff; padding: 2px 6px; border-radius: 2px; margin-left: 6px; }
.sec-pricing .price-row td { font-weight: 700; font-size: 16px; color: #0F172A; font-family: var(--display); }
.sec-metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
.metric-card { background: #fff; border: 1px solid rgba(0,0,0,0.06); border-radius: 8px; padding: 24px; border-top: 3px solid var(--accent, #4ECB71); }
.metric-icon { color: var(--accent, #4ECB71); margin-bottom: 12px; }
.metric-icon svg { width: 28px; height: 28px; }
.metric-value { font-family: var(--display); font-weight: 700; font-size: 36px; color: #0F172A; line-height: 1; margin-bottom: 4px; }
.metric-label { font-size: 13px; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: 0.5px; }
.metric-sub { font-size: 12px; color: #94A3B8; margin-top: 8px; line-height: 1.5; }
.sec-roi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 20px; }
.roi-card { background: #fff; border: 1px solid rgba(0,0,0,0.06); border-radius: 8px; padding: 20px; text-align: center; }
.roi-label { font-size: 12px; color: #64748B; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.roi-value { font-family: var(--display); font-weight: 700; font-size: 28px; color: #4ECB71; }
.roi-conservative .roi-value { color: #64748B; }
.roi-stretch .roi-value { color: #F59E0B; }
.sec-gantt { padding: 20px 0; }
.gantt-header { display: flex; padding: 0 0 12px; border-bottom: 1px solid rgba(0,0,0,0.06); margin-bottom: 12px; }
.gantt-header span { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748B; }
.gantt-header span:first-child { width: 140px; flex-shrink: 0; }
.gantt-header span:last-child { flex: 1; }
.gantt-row { display: flex; align-items: center; padding: 8px 0; }
.gantt-label { width: 140px; flex-shrink: 0; font-size: 14px; font-weight: 500; color: #0F172A; }
.gantt-track { flex: 1; height: 36px; background: rgba(0,0,0,0.03); border-radius: 6px; position: relative; overflow: hidden; }
.gantt-bar { position: absolute; top: 3px; bottom: 3px; border-radius: 4px; display: flex; align-items: center; justify-content: center; min-width: 40px; }
.gantt-bar-label { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.7); white-space: nowrap; }
.gantt-markers { display: flex; position: relative; margin-top: 8px; padding-left: 140px; height: 20px; }
.gantt-marker { position: absolute; font-size: 10px; color: #94A3B8; transform: translateX(-50%); }
.sec-callout { border-left: 4px solid #F59E0B; padding: 28px 32px; background: rgba(245,158,11,0.04); border-radius: 0 8px 8px 0; position: relative; }
.callout-mark { font-family: Georgia, serif; font-size: 72px; color: rgba(245,158,11,0.15); position: absolute; top: -12px; left: 16px; line-height: 1; }
.sec-callout p { font-size: 20px; font-style: italic; line-height: 1.7; color: #334155; margin: 0; position: relative; z-index: 1; }
.sec-callout cite { display: block; margin-top: 16px; font-size: 15px; color: #64748B; font-style: normal; position: relative; z-index: 1; }
.sec-image img { width: 100%; height: auto; border-radius: 8px; }
.sec-image figcaption { font-size: 13px; color: #94A3B8; margin-top: 8px; text-align: center; }
.sec-image-empty { border: 2px dashed rgba(0,0,0,0.1); border-radius: 8px; padding: 48px; text-align: center; color: #94A3B8; }
.sec-divider { padding: 24px 0; }
.divider-line { height: 2px; background: linear-gradient(90deg, transparent, rgba(0,0,0,0.06), rgba(78,203,113,0.2), rgba(0,0,0,0.06), transparent); }
.sec-empty { padding: 24px; text-align: center; color: #94A3B8; font-style: italic; }

/* ══ RIGHT SIDE PANEL ══ */
.side-panel { position: fixed; top: 56px; right: 0; width: 420px; height: calc(100vh - 56px); background: #0F1923; border-left: 1px solid rgba(255,255,255,0.06); z-index: 40; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
.side-panel.open { transform: translateX(0); }
.sp-header { padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.sp-title { font-family: var(--display); font-size: 16px; font-weight: 700; color: #F8FAFC; }
.sp-close { background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: #94A3B8; cursor: pointer; padding: 4px 12px; font-size: 12px; font-family: var(--body); }
.sp-close:hover { color: #fff; }
.sp-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.sp-section { margin-bottom: 20px; }
.sp-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748B; margin-bottom: 8px; font-weight: 600; display: block; }
.sp-input { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; color: #F8FAFC; font-family: var(--body); font-size: 14px; outline: none; }
.sp-input:focus { border-color: #4ECB71; }
.sp-textarea { width: 100%; min-height: 180px; padding: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; color: #F8FAFC; font-family: var(--body); font-size: 14px; outline: none; resize: vertical; line-height: 1.7; }
.sp-textarea:focus { border-color: #4ECB71; }
.sp-json { width: 100%; min-height: 200px; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; color: #4ECB71; font-family: 'SF Mono','Fira Code',monospace; font-size: 13px; outline: none; resize: vertical; }
.sp-json:focus { border-color: #4ECB71; }
.sp-actions { display: flex; gap: 8px; margin-top: 12px; }
.sp-btn { padding: 8px 16px; border-radius: 4px; font-size: 12px; font-weight: 600; font-family: var(--body); cursor: pointer; transition: all 0.15s; border: none; }
.sp-btn.save { background: #4ECB71; color: #0F1923; }
.sp-btn.save:hover { opacity: 0.9; }
.sp-btn.approve { background: none; border: 1px solid rgba(78,203,113,0.3); color: #4ECB71; }
.sp-btn.approve:hover { background: rgba(78,203,113,0.1); }
.sp-btn.delete { background: none; border: 1px solid rgba(239,68,68,0.2); color: #EF4444; }
.sp-btn.delete:hover { background: rgba(239,68,68,0.1); }
.sp-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 20px 0; }

/* Chat in panel */
.sp-chat-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748B; margin-bottom: 12px; font-weight: 600; }
.sp-chat-msgs { max-height: 250px; overflow-y: auto; margin-bottom: 12px; }
.sp-msg { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.sp-msg:last-child { border-bottom: none; }
.sp-msg-author { font-size: 11px; font-weight: 600; color: #F8FAFC; margin-bottom: 3px; }
.sp-msg-time { font-weight: 400; color: #64748B; margin-left: 8px; }
.sp-msg-text { font-size: 13px; color: #94A3B8; padding: 6px 10px; background: rgba(255,255,255,0.03); border-radius: 4px; line-height: 1.5; }
.sp-msg.gaby .sp-msg-text { background: rgba(78,203,113,0.06); border-left: 2px solid #4ECB71; }
.sp-msg-resolved { font-size: 10px; color: #4ECB71; background: rgba(78,203,113,0.15); padding: 2px 8px; border-radius: 2px; margin-top: 4px; display: inline-block; }
.sp-chat-input { display: flex; gap: 8px; }
.sp-chat-input input { flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 4px; color: #F8FAFC; font-family: var(--body); font-size: 13px; outline: none; }
.sp-chat-input input:focus { border-color: #4ECB71; }
.sp-chat-input input::placeholder { color: rgba(148,163,184,0.5); }
.sp-chat-input button { padding: 10px 16px; background: #4ECB71; border: none; border-radius: 4px; color: #0F1923; font-weight: 600; font-size: 12px; cursor: pointer; }

/* Image upload in panel */
.sp-img-zone { border: 2px dashed rgba(255,255,255,0.1); border-radius: 4px; padding: 24px; text-align: center; color: #94A3B8; cursor: pointer; transition: all 0.2s; }
.sp-img-zone:hover { border-color: #4ECB71; color: #F8FAFC; }

/* Table edit in panel */
.sp-table-edit { width: 100%; border-collapse: collapse; }
.sp-table-edit th, .sp-table-edit td { padding: 8px 12px; border: 1px solid rgba(255,255,255,0.08); font-size: 13px; color: #F8FAFC; }
.sp-table-edit th { background: rgba(255,255,255,0.04); font-weight: 600; }
.sp-table-edit td:focus { outline: 2px solid #4ECB71; outline-offset: -2px; }

/* Modals */
.add-sec-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.add-sec-option { padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; text-align: center; transition: all 0.15s; }
.add-sec-option:hover { border-color: var(--green); background: rgba(78,203,113,0.05); }
.add-sec-option.selected { border-color: #4ECB71; background: rgba(78,203,113,0.1); box-shadow: inset 0 0 0 2px rgba(78,203,113,0.3); }
.add-sec-option.selected::after { content: '✓'; position: absolute; top: 6px; right: 8px; color: #4ECB71; font-size: 14px; font-weight: 700; }
.add-sec-option { position: relative; }
.add-sec-icon { font-size: 24px; margin-bottom: 6px; }
.add-sec-label { font-size: 13px; font-weight: 600; color: var(--n50); }
.add-sec-desc { font-size: 11px; color: var(--n400); margin-top: 2px; }

/* Drag and drop */
.sec-wrap { cursor: grab; }
.sec-wrap.dragging { opacity: 0.3; cursor: grabbing; }
.drop-indicator { height: 3px; background: #4ECB71; margin: 2px 0; border-radius: 2px; transition: opacity 0.15s; }

@media (max-width: 1024px) { .sec-nav { display: none; } }
@media (max-width: 768px) {
  .top-bar { padding: 10px 16px; gap: 6px; }
  .top-title { font-size: 15px; }
  .side-panel { width: 100%; }
  .editor-preview.panel-open { margin-right: 0; }
  .add-sec-grid { grid-template-columns: repeat(2, 1fr); }
  .cover-page { padding: 40px 24px; min-height: 300px; }
  .cover-title { font-size: 32px; }
  .section-title-text { font-size: 22px; }
  .sec-metrics-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<main class="main">
  <div class="top-bar">
    <a href="proposals.html" class="btn-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg> Back</a>
    <span class="top-index" id="topIndex">...</span>
    <input class="top-title" id="topTitle" value="Loading..." />
    <span class="top-client" id="topClient"></span>
    <div class="top-status"><select id="topStatus" onchange="changeStatus(this.value)"><option value="draft">Draft</option><option value="in_review">In Review</option><option value="approved">Approved</option><option value="sent">Sent</option><option value="archived">Archived</option></select></div>
    <div class="top-actions">
      <span class="save-ind" id="saveInd">Saved ✓</span>
      <button class="top-btn" onclick="refreshProposal()">↻ Refresh</button>
      <button class="top-btn" onclick="exportPDF()">Export PDF</button>
      <button class="top-btn primary" onclick="generateShareLink()">Share Link</button>
    </div>
  </div>

  <div class="editor-body">
    <div class="sec-nav">
      <div class="sec-nav-title">Sections</div>
      <ul class="sec-nav-list" id="secNavList"></ul>
      <div class="sec-nav-add" onclick="openAddModal()">+ Add Section</div>
    </div>
    <div class="editor-preview" id="editorPreview">
      <div class="preview-inner" id="previewInner" style="text-align:center;padding:80px 0;color:#94A3B8">Loading...</div>
    </div>
  </div>
</main>

<!-- Right Side Panel -->
<div class="side-panel" id="sidePanel">
  <div class="sp-header">
    <span class="sp-title" id="spTitle">Edit Section</span>
    <button class="sp-close" onclick="closePanel()">Close ✕</button>
  </div>
  <div class="sp-body" id="spBody"></div>
</div>

<!-- Add Section Modal (multi-select) -->
<div class="modal-overlay" id="addModal">
  <div class="modal-card" style="max-width:600px">
    <h3 class="modal-title">Add Sections</h3>
    <p style="color:#64748B;font-size:13px;margin-bottom:16px">Select one or more section types to add.</p>
    <div class="add-sec-grid" id="addGrid"></div>
    <div class="add-selected" id="addSelected" style="display:none;margin-top:16px;padding:12px 16px;background:rgba(78,203,113,0.06);border:1px solid rgba(78,203,113,0.2);border-radius:4px;font-size:13px;color:#4ECB71"></div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn-secondary" onclick="closeAddModal()">Cancel</button>
      <button class="sp-btn save" id="btnAddSecs" onclick="addSelectedSections()" style="display:none">Add Selected</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/supabase-client.js"></script>
<script src="js/proposal-data.js"></script>
<script src="js/proposal-renderers.js"></script>
<script src="js/sidebar.js"></script>
<script>
initSidebar('proposals');

var P = null, secs = [], crs = [], comments = [], activeSecId = null;
var saveQ = new Map(), saveTmr = null;
var proposalId = new URLSearchParams(location.search).get('id');
if (!proposalId) location.href = 'proposals.html';

// ═══ Data ═══
async function load() {
  try {
    var d = await fetchProposal(proposalId);
    if (!d) { showToast('Proposal not found','error'); return; }
    P = d; secs = d.sections || []; crs = d.change_requests || [];
    try { comments = await fetchComments(proposalId) || []; } catch(e) { comments = []; }
    renderAll();
  } catch(e) { console.error(e); showToast('Load failed','error'); }
}
async function refreshProposal() {
  showToast('Refreshing...','success'); await load();
}

// ═══ Render ═══
function renderAll() { renderTopBar(); renderNav(); renderPreview(); }

function renderTopBar() {
  document.getElementById('topIndex').textContent = P.proposal_index || '';
  document.getElementById('topTitle').value = P.title || 'Untitled';
  document.getElementById('topClient').textContent = P.client_name || '';
  document.getElementById('topStatus').value = P.status || 'draft';
  document.title = (P.title || 'Proposal') + ' — VSDR';
}

var SI = { pending:'⏳', edited:'✏️', change_requested:'🔴', approved:'✅' };

function renderNav() {
  document.getElementById('secNavList').innerHTML = secs.map(function(s,i) {
    return '<li class="sec-nav-item' + (s.id===activeSecId?' active':'') + '" onclick="selectSection(\''+s.id+'\')">' +
      '<span style="font-size:10px">'+(SI[s.status]||'⏳')+'</span>' +
      '<span>'+(i+1)+'. '+esc(s.title||'Untitled')+'</span></li>';
  }).join('');
}

function renderPreview() {
  var h = '', num = 0;
  secs.forEach(function(s) {
    h += '<div class="sec-wrap'+(s.id===activeSecId?' active':'')+'" data-id="'+s.id+'" draggable="true" onclick="selectSection(\''+s.id+'\')" ondragstart="dragStart(event,\''+s.id+'\')" ondragend="dragEnd(event)" ondragover="dragOver(event)" ondrop="dropSec(event,\''+s.id+'\')">';
    if (s.content_type === 'cover') {
      h += renderSectionContent(s, P);
    } else if (s.content_type === 'divider') {
      h += '<div style="padding:16px 0">' + renderDivider() + '</div>';
    } else {
      num++;
      h += '<div style="padding:28px 24px">';
      h += '<div class="section-heading"><div class="section-num">'+String(num).padStart(2,'0')+'</div>';
      h += '<h2 class="section-title-text">'+esc(s.title||'')+'</h2></div>';
      h += renderSectionContent(s, P);
      h += '</div>';
    }
    h += '<div class="sec-strip '+s.status+'"></div></div>';
  });
  if (!secs.length) h = '<div style="text-align:center;padding:80px 0"><div style="font-size:48px;opacity:0.3">📝</div><p style="color:#64748B;margin:16px 0">No sections yet.</p><button class="sp-btn save" onclick="openAddModal()">+ Add Section</button></div>';
  document.getElementById('previewInner').innerHTML = h;
}

// ═══ Side Panel ═══
function selectSection(id) {
  activeSecId = id;
  renderNav(); renderPreview(); openPanel(id);
}

function openPanel(id) {
  var s = secs.find(function(x){return x.id===id;});
  if (!s) return;
  var panel = document.getElementById('sidePanel');
  document.getElementById('spTitle').textContent = esc(s.title || 'Edit Section');
  document.getElementById('spBody').innerHTML = buildPanelContent(s);
  panel.classList.add('open');
  document.getElementById('editorPreview').classList.add('panel-open');
}

function closePanel() {
  activeSecId = null;
  document.getElementById('sidePanel').classList.remove('open');
  document.getElementById('editorPreview').classList.remove('panel-open');
  renderNav(); renderPreview();
}

function buildPanelContent(s) {
  var id = s.id, h = '';
  // Title
  h += '<div class="sp-section"><span class="sp-label">Section Title</span>';
  h += '<input class="sp-input" value="'+escA(s.title||'')+'" onchange="saveSTitle(\''+id+'\',this.value)" /></div>';
  // Type badge
  h += '<div class="sp-section"><span class="sp-label">Type</span><span style="color:#A78BFA;font-size:13px;text-transform:uppercase;letter-spacing:0.5px">'+esc(s.content_type)+'</span></div>';
  // Content editor
  h += '<div class="sp-section"><span class="sp-label">Content</span>';
  if (s.content_type==='text'||s.content_type==='callout') {
    h += '<textarea class="sp-textarea" id="spText-'+id+'" onblur="saveText(\''+id+'\')">'+esc(s.content||'')+'</textarea>';
  } else if (s.content_type==='table'||s.content_type==='pricing') {
    h += buildTableEditor(s);
  } else if (s.content_type==='image') {
    h += buildImageEditor(s);
  } else if (s.content_type==='cover'||s.content_type==='divider') {
    h += '<p style="color:#64748B;font-size:13px">Auto-generated from proposal metadata.</p>';
  } else {
    var data = s.metrics_data||s.timeline_data||s.table_data||s.content_json||{};
    h += '<textarea class="sp-json" id="spJson-'+id+'">'+esc(JSON.stringify(data,null,2))+'</textarea>';
    h += '<div class="sp-actions"><button class="sp-btn save" onclick="saveJson(\''+id+'\',\''+s.content_type+'\')">Apply Changes</button></div>';
  }
  h += '</div>';
  // Status actions
  h += '<div class="sp-divider"></div>';
  h += '<div class="sp-section"><span class="sp-label">Status</span><div class="sp-actions">';
  if (s.status!=='approved') h += '<button class="sp-btn approve" onclick="approveSec(\''+id+'\')">✅ Approve Section</button>';
  else h += '<span style="color:#4ECB71;font-size:13px">✅ Approved</span>';
  h += '</div></div>';
  // Chat
  h += '<div class="sp-divider"></div>';
  h += buildChatPanel(s);
  // Delete
  h += '<div class="sp-divider"></div>';
  h += '<div class="sp-section"><button class="sp-btn delete" onclick="delSec(\''+id+'\')">Delete Section</button></div>';
  return h;
}

function buildTableEditor(s) {
  var td = s.table_data||s.content_json||{}, headers=td.headers||[], rows=td.rows||[], rec=td.recommended||'';
  var recIdx = rec ? headers.indexOf(rec) : -1;
  var h = '<div style="overflow-x:auto"><table class="sp-table-edit" data-sid="'+s.id+'">';
  if (headers.length) { h+='<thead><tr>'; headers.forEach(function(c){h+='<th contenteditable="true">'+esc(c)+'</th>';}); h+='</tr></thead>'; }
  h+='<tbody>';
  rows.forEach(function(row){ h+='<tr>'; (Array.isArray(row)?row:[row]).forEach(function(c){h+='<td contenteditable="true">'+esc(c)+'</td>';}); h+='</tr>'; });
  h+='</tbody></table></div>';
  h+='<div class="sp-actions" style="margin-top:8px"><button class="sp-btn save" onclick="saveTable(\''+s.id+'\')">Save Table</button></div>';
  return h;
}

function buildImageEditor(s) {
  var h='';
  if (s.image_url) {
    h+='<img src="'+s.image_url+'" style="max-width:100%;border-radius:4px;margin-bottom:8px">';
    h+='<div class="sp-actions"><button class="sp-btn save" onclick="trigImg(\''+s.id+'\')">Replace</button><button class="sp-btn delete" onclick="rmImg(\''+s.id+'\')">Remove</button></div>';
  } else {
    h+='<div class="sp-img-zone" onclick="trigImg(\''+s.id+'\')">🖼️ Click to upload image</div>';
  }
  h+='<input type="file" accept="image/*" style="display:none" id="imgIn-'+s.id+'" onchange="doImg(\''+s.id+'\',this)">';
  return h;
}

function buildChatPanel(s) {
  var myCrs = crs.filter(function(c){return c.section_id===s.id;});
  var myComments = comments.filter(function(c){return c.section_id===s.id;});
  var h = '';

  // Change Requests (actionable by Gaby)
  h += '<div class="sp-section"><span class="sp-chat-title">⚡ Change Requests ('+myCrs.length+')</span>';
  if (myCrs.length) {
    h += '<div class="sp-chat-msgs">';
    myCrs.forEach(function(cr) {
      var isG = (cr.author||'').toLowerCase()==='gaby';
      var t = cr.created_at ? new Date(cr.created_at).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      h += '<div class="sp-msg'+(isG?' gaby':'')+'">';
      h += '<div class="sp-msg-author">'+esc(cr.author)+'<span class="sp-msg-time">'+t+'</span></div>';
      h += '<div class="sp-msg-text">'+esc(cr.message)+'</div>';
      if (cr.status==='resolved') { h+='<span class="sp-msg-resolved">Resolved</span>'; if(cr.response) h+='<div class="sp-msg-text" style="margin-top:4px;color:#4ECB71;font-size:12px">'+esc(cr.response)+'</div>'; }
      h += '</div>';
    });
    h += '</div>';
  } else {
    h += '<p style="font-size:12px;color:#64748B;margin-bottom:8px">No change requests yet.</p>';
  }
  h += '<div class="sp-chat-input"><input id="crIn-'+s.id+'" placeholder="Tell Gaby what to change..." onkeydown="if(event.key===\'Enter\')sendCR(\''+s.id+'\')" /><button onclick="sendCR(\''+s.id+'\')">Send</button></div>';
  h += '</div>';

  // Comments (non-actionable notes)
  h += '<div class="sp-divider"></div>';
  h += '<div class="sp-section"><span class="sp-chat-title">💬 Comments ('+myComments.length+')</span>';
  if (myComments.length) {
    h += '<div class="sp-chat-msgs">';
    myComments.forEach(function(c) {
      var t = c.created_at ? new Date(c.created_at).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      h += '<div class="sp-msg">';
      h += '<div class="sp-msg-author">'+esc(c.author)+'<span class="sp-msg-time">'+t+'</span></div>';
      h += '<div class="sp-msg-text" style="background:rgba(167,139,250,0.06);border-left:2px solid #A78BFA">'+esc(c.message)+'</div>';
      h += '</div>';
    });
    h += '</div>';
  } else {
    h += '<p style="font-size:12px;color:#64748B;margin-bottom:8px">No comments yet.</p>';
  }
  h += '<div class="sp-chat-input"><input id="cmtIn-'+s.id+'" placeholder="Add a note or comment..." onkeydown="if(event.key===\'Enter\')sendComment(\''+s.id+'\')" /><button style="background:#A78BFA" onclick="sendComment(\''+s.id+'\')">Note</button></div>';
  h += '</div>';

  return h;
}

// ═══ Save operations ═══
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';}
function escA(s){return s?String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'):'';}
function scrollToSection(id){ var el=document.querySelector('[data-id="'+id+'"]'); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); }

document.getElementById('topTitle').addEventListener('change',async function(){
  if(!P)return; try{await updateProposal(P.id,{title:this.value});P.title=this.value;saved();}catch(e){showToast('Failed','error');}
});

async function saveSTitle(id,v){
  try{await updateSection(id,{title:v});var s=secs.find(function(x){return x.id===id;});if(s)s.title=v;renderNav();renderPreview();saved();}catch(e){showToast('Failed','error');}
}

function saveText(id){
  var ta=document.getElementById('spText-'+id); if(!ta)return;
  var s=secs.find(function(x){return x.id===id;}); if(s)s.content=ta.value;
  qSave(id,{content:ta.value});
  renderPreview();
}

async function saveJson(id,type){
  var ta=document.getElementById('spJson-'+id); if(!ta)return;
  try{
    var data=JSON.parse(ta.value), fields={content_json:data};
    if(type==='metrics')fields.metrics_data=data;
    else if(type==='timeline')fields.timeline_data=data;
    else if(type==='table'||type==='pricing')fields.table_data=data;
    await updateSection(id,fields);
    var s=secs.find(function(x){return x.id===id;}); if(s)Object.assign(s,fields);
    renderPreview(); saved();
  }catch(e){showToast('Invalid JSON: '+e.message,'error');}
}

function saveTable(id){
  var tbl=document.querySelector('.sp-table-edit[data-sid="'+id+'"]'); if(!tbl)return;
  var headers=[],rows=[];
  tbl.querySelectorAll('thead th').forEach(function(th){headers.push(th.textContent.trim());});
  tbl.querySelectorAll('tbody tr').forEach(function(tr){var r=[];tr.querySelectorAll('td').forEach(function(td){r.push(td.textContent.trim());});rows.push(r);});
  var s=secs.find(function(x){return x.id===id;}); var old=s?(s.table_data||s.content_json||{}):{};
  var td={headers:headers,rows:rows,recommended:old.recommended||''};
  if(s){s.table_data=td;s.content_json=td;}
  qSave(id,{table_data:td,content_json:td});
  renderPreview(); saved();
}

function trigImg(id){document.getElementById('imgIn-'+id).click();}
function doImg(id,input){if(input.files[0]){var r=new FileReader();r.onload=function(e){var s=secs.find(function(x){return x.id===id;});if(s)s.image_url=e.target.result;qSave(id,{image_url:e.target.result});renderPreview();openPanel(id);};r.readAsDataURL(input.files[0]);}}
function rmImg(id){var s=secs.find(function(x){return x.id===id;});if(s)s.image_url=null;qSave(id,{image_url:null});renderPreview();openPanel(id);}

async function approveSec(id){
  try{await updateSection(id,{status:'approved'});var s=secs.find(function(x){return x.id===id;});if(s)s.status='approved';renderAll();openPanel(id);showToast('Approved','success');}catch(e){showToast('Failed','error');}
}

async function changeStatus(v){
  try{await updateProposal(P.id,{status:v});P.status=v;saved();}catch(e){showToast('Failed','error');}
}

async function sendCR(id){
  var input=document.getElementById('crIn-'+id);var msg=input.value.trim();if(!msg)return;
  try{var cr=await createChangeRequest(id,P.id,msg,'Yousra');crs.push(cr);var s=secs.find(function(x){return x.id===id;});if(s)s.status='change_requested';renderAll();openPanel(id);showToast('Sent to Gaby','success');}catch(e){showToast('Failed: '+e.message,'error');}
}

async function sendComment(id){
  var input=document.getElementById('cmtIn-'+id);var msg=input.value.trim();if(!msg)return;
  try{
    var rows=await createComment(P.id,id,msg,'Yousra');
    if(rows&&rows.length) comments.push(rows[0]);
    else if(rows) comments.push(rows);
    input.value='';
    openPanel(id);
    showToast('Comment added','success');
  }catch(e){showToast('Failed: '+e.message,'error');}
}

// Add/Delete — multi-select
var selectedTypes = [];

function openAddModal(){
  selectedTypes = [];
  document.getElementById('addGrid').innerHTML=SECTION_TYPES.map(function(t){
    return '<div class="add-sec-option" data-type="'+t.type+'" onclick="toggleAddType(this,\''+t.type+'\')">' +
      '<div class="add-sec-icon">'+t.icon+'</div><div class="add-sec-label">'+t.label+'</div><div class="add-sec-desc">'+t.desc+'</div></div>';
  }).join('');
  updateAddUI();
  document.getElementById('addModal').classList.add('open');
}
function closeAddModal(){document.getElementById('addModal').classList.remove('open');selectedTypes=[];}
document.getElementById('addModal').addEventListener('click',function(e){if(e.target.id==='addModal')closeAddModal();});

function toggleAddType(el, type) {
  var idx = selectedTypes.indexOf(type);
  if (idx === -1) { selectedTypes.push(type); el.classList.add('selected'); }
  else { selectedTypes.splice(idx, 1); el.classList.remove('selected'); }
  updateAddUI();
}

function updateAddUI() {
  var sel = document.getElementById('addSelected');
  var btn = document.getElementById('btnAddSecs');
  if (selectedTypes.length === 0) {
    sel.style.display = 'none'; btn.style.display = 'none';
  } else {
    var names = selectedTypes.map(function(t){ var info = SECTION_TYPES.find(function(x){return x.type===t;}); return info ? info.label : t; });
    sel.style.display = 'block'; btn.style.display = 'inline-flex';
    sel.textContent = selectedTypes.length + ' selected: ' + names.join(', ');
    btn.textContent = 'Add ' + selectedTypes.length + ' Section' + (selectedTypes.length > 1 ? 's' : '');
  }
}

async function addSelectedSections() {
  if (!selectedTypes.length) return;
  var btn = document.getElementById('btnAddSecs');
  btn.disabled = true; btn.textContent = 'Adding...';
  var added = [];
  try {
    for (var i = 0; i < selectedTypes.length; i++) {
      var type = selectedTypes[i];
      var info = SECTION_TYPES.find(function(t){return t.type===type;}) || {};
      var s = await createSection(P.id, {
        sort_order: secs.length + 1 + i,
        title: info.label || type,
        content_type: type,
        content: type==='text'||type==='callout' ? '' : null,
        content_json: {},
        status: 'pending'
      });
      if (s) { secs.push(s); added.push(s); }
    }
    closeAddModal(); renderAll();
    if (added.length) selectSection(added[0].id);
    showToast(added.length + ' section' + (added.length>1?'s':'') + ' added', 'success');
  } catch(e) { showToast('Failed: ' + e.message, 'error'); }
  finally { btn.disabled = false; }
}

async function delSec(id){
  if(!confirm('Delete this section?'))return;
  try{await deleteSection(id);secs=secs.filter(function(s){return s.id!==id;});crs=crs.filter(function(c){return c.section_id!==id;});closePanel();renderAll();showToast('Deleted','success');}catch(e){showToast('Failed','error');}
}

// ═══ Drag and drop reorder ═══
var draggedId = null;

function dragStart(e, id) {
  draggedId = id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
}

function dragEnd(e) {
  e.target.classList.remove('dragging');
  draggedId = null;
  document.querySelectorAll('.drop-indicator').forEach(function(el) { el.remove(); });
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var wrap = e.target.closest('.sec-wrap');
  if (!wrap || wrap.dataset.id === draggedId) return;
  // Remove old indicators
  document.querySelectorAll('.drop-indicator').forEach(function(el) { el.remove(); });
  // Add indicator above target
  var rect = wrap.getBoundingClientRect();
  var mid = rect.top + rect.height / 2;
  var indicator = document.createElement('div');
  indicator.className = 'drop-indicator';
  if (e.clientY < mid) {
    wrap.insertAdjacentElement('beforebegin', indicator);
  } else {
    wrap.insertAdjacentElement('afterend', indicator);
  }
}

async function dropSec(e, targetId) {
  e.preventDefault();
  document.querySelectorAll('.drop-indicator').forEach(function(el) { el.remove(); });
  if (!draggedId || draggedId === targetId) return;

  var fromIdx = secs.findIndex(function(s) { return s.id === draggedId; });
  var toIdx = secs.findIndex(function(s) { return s.id === targetId; });
  if (fromIdx === -1 || toIdx === -1) return;

  // Determine if dropping before or after target
  var wrap = document.querySelector('[data-id="' + targetId + '"]');
  if (wrap) {
    var rect = wrap.getBoundingClientRect();
    if (e.clientY > rect.top + rect.height / 2) toIdx++;
  }
  if (fromIdx < toIdx) toIdx--;

  // Reorder array
  var moved = secs.splice(fromIdx, 1)[0];
  secs.splice(toIdx, 0, moved);

  // Update sort_order and re-render
  renderAll();
  showToast('Section moved', 'success');

  // Persist to Supabase
  try {
    var ids = secs.map(function(s) { return s.id; });
    await reorderSections(P.id, ids);
    saved();
  } catch(err) {
    console.error('Reorder save failed:', err);
    showToast('Reorder save failed', 'error');
  }
}

// Auto-save queue
function qSave(id,fields){saveQ.set(id,Object.assign(saveQ.get(id)||{},fields));saving();clearTimeout(saveTmr);saveTmr=setTimeout(flushQ,2000);}
async function flushQ(){
  for(var pair of saveQ){try{await updateSection(pair[0],pair[1]);var s=secs.find(function(x){return x.id===pair[0];});if(s)Object.assign(s,pair[1]);}catch(e){offlineSaved();return;}}
  saveQ.clear();saved();
}
function saved(){var el=document.getElementById('saveInd');el.textContent='Saved ✓';el.className='save-ind show';setTimeout(function(){el.classList.remove('show');},2000);}
function saving(){var el=document.getElementById('saveInd');el.textContent='Saving...';el.className='save-ind show';}
function offlineSaved(){var el=document.getElementById('saveInd');el.textContent='Offline';el.className='save-ind show offline';}

// PDF — use the client view page which already renders perfectly
function exportPDF(){
  // Ensure share token exists so client view can load the proposal
  if (!P.share_token) {
    var token = crypto.randomUUID();
    updateProposal(P.id, {share_token: token}).then(function(){
      P.share_token = token;
      doExportPDF();
    }).catch(function(){ showToast('Failed to generate export link','error'); });
  } else {
    doExportPDF();
  }
}

function doExportPDF(){
  showToast('Opening proposal for PDF export...','success');
  // Open the client view with autoexport flag — it triggers PDF download automatically
  window.open('proposal-view.html?token=' + P.share_token + '&autoexport=1', '_blank');
}

async function generateShareLink(){
  try{var t=P.share_token;if(!t){t=crypto.randomUUID();await updateProposal(P.id,{share_token:t});P.share_token=t;}
  await navigator.clipboard.writeText(location.origin+'/proposal-view.html?token='+t);showToast('Share link copied!','success');}catch(e){showToast('Failed','error');}
}

function showToast(m,t){var el=document.getElementById('toast');el.textContent=m;el.className='toast '+(t||'success')+' show';setTimeout(function(){el.classList.remove('show');},3000);}

load();
</script>
