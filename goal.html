<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.fontshare.com; font-src https://fonts.gstatic.com https://cdn.fontshare.com; connect-src 'self' https://gxunrnyehltpbgdodkkm.supabase.co; img-src 'self' data: blob: https:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal — Safira</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/design-system.css">
<style>
a { text-decoration: none; color: inherit; }

/* ── BACK LINK ── */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--body);
  font-size: 13px;
  color: var(--n400);
  margin-bottom: 24px;
  transition: color 0.15s;
}
.back-link:hover { color: var(--n50); }
.back-link svg { width: 16px; height: 16px; }

/* ── GOAL HEADER ── */
.goal-header-area {
  display: flex;
  align-items: flex-start;
  gap: 32px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}
.goal-header-left { flex: 1; min-width: 300px; }
.goal-page-title {
  font-family: var(--display);
  font-weight: 700;
  font-size: 36px;
  color: var(--n50);
  line-height: 1.2;
  margin-bottom: 12px;
}
.goal-status-row {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.badge {
  font-family: var(--body);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 4px 12px;
  border-radius: 2px;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.badge::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
}
.badge-green { background: rgba(78,203,113,0.12); color: var(--green); }
.badge-amber { background: rgba(245,158,11,0.12); color: var(--amber); }
.badge-coral { background: rgba(239,68,68,0.12); color: var(--coral); }
.badge-gray  { background: rgba(148,163,184,0.1);  color: var(--n400); }
.goal-updated-text {
  font-family: var(--body);
  font-size: 13px;
  color: var(--n400);
}

/* ── PM CARD ── */
.pm-card {
  background: var(--n800);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 16px 20px;
  margin-top: 16px;
  display: inline-flex;
  align-items: center;
  gap: 12px;
}
.pm-card-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(78,203,113,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.pm-card-icon svg { width: 18px; height: 18px; color: var(--green); }
.pm-card-info { display: flex; flex-direction: column; }
.pm-card-label {
  font-family: var(--body);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--n400);
  margin-bottom: 2px;
}
.pm-card-name {
  font-family: var(--display);
  font-weight: 600;
  font-size: 15px;
  color: var(--n50);
}
.pm-card-role {
  font-family: var(--body);
  font-size: 12px;
  color: var(--n400);
  margin-top: 1px;
}

/* ── PROGRESS CARD ── */
.progress-card {
  background: var(--n800);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 180px;
}
.progress-ring-large {
  position: relative;
  width: 120px; height: 120px;
  margin-bottom: 12px;
}
.progress-ring-large svg {
  width: 120px; height: 120px;
  transform: rotate(-90deg);
}
.progress-ring-large .ring-bg {
  fill: none;
  stroke: rgba(255,255,255,0.06);
  stroke-width: 8;
}
.progress-ring-large .ring-fill {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  stroke-dasharray: 314.16;
  stroke-dashoffset: 314.16;
  transition: stroke-dashoffset 0.8s ease;
}
.progress-ring-large .ring-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--display);
  font-weight: 700;
  font-size: 28px;
  color: var(--n50);
}
.progress-card-text {
  font-family: var(--body);
  font-size: 12px;
  color: var(--n400);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── SECTION LABEL ── */
.section-label {
  font-family: var(--body);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--n400);
  margin-top: 40px;
  margin-bottom: 16px;
  font-weight: 600;
}

/* ── GLASS CARD ── */
.glass-card {
  background: var(--n800);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 28px 32px;
}
.glass-card p {
  font-family: var(--body);
  font-size: 15px;
  color: var(--n50);
  line-height: 1.7;
  opacity: 0.9;
}
.glass-card .empty-note {
  color: var(--n400);
  font-style: italic;
}

/* ── KEY RESULTS CARDS ── */
.kr-card {
  background: var(--n800);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 16px 20px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: border-color 0.2s ease, transform 0.15s ease;
}
.kr-card:hover {
  border-color: rgba(255,255,255,0.12);
  transform: translateX(4px);
}
.kr-card.completed {
  border-left: 3px solid var(--green);
}
.kr-card:not(.completed) {
  border-left: 3px solid var(--border);
}
.kr-checkbox {
  width: 20px; height: 20px;
  border-radius: 2px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}
.kr-card.completed .kr-checkbox {
  background: var(--green);
  border-color: var(--green);
}
.kr-checkbox svg { width: 12px; height: 12px; color: #0F1923; }
.kr-text {
  font-family: var(--body);
  font-size: 14px;
  color: var(--n50);
  line-height: 1.4;
  flex: 1;
}
.kr-card.completed .kr-text {
  color: var(--n400);
  text-decoration: line-through;
  text-decoration-color: rgba(148,163,184,0.3);
}

/* ── ACTION CARDS ── */
.action-card {
  background: var(--n800);
  border: 1px solid var(--border);
  border-left: 3px solid var(--teal);
  border-radius: 2px;
  padding: 16px 20px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color 0.2s ease;
}
.action-card:hover { border-color: rgba(255,255,255,0.12); }
.action-text {
  font-family: var(--body);
  font-size: 14px;
  color: var(--n50);
  line-height: 1.4;
}
.action-icon {
  color: var(--teal);
  font-size: 14px;
  flex-shrink: 0;
}

/* ── REC ACTION CARDS ── */
.rec-card {
  background: var(--n800);
  border: 1px solid var(--border);
  border-left: 3px solid var(--purple);
  border-radius: 2px;
  padding: 16px 20px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.rec-card:hover { border-color: rgba(255,255,255,0.12); }
.rec-icon {
  color: var(--purple);
  font-size: 10px;
  flex-shrink: 0;
}
.rec-text {
  font-family: var(--body);
  font-size: 14px;
  color: var(--n50);
  line-height: 1.4;
}

/* ── PEOPLE GRID ── */
.people-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.person-card {
  background: var(--n800);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 20px;
  transition: border-color 0.2s ease, transform 0.2s ease;
}
.person-card:hover {
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-2px);
}
.person-name {
  font-family: var(--display);
  font-weight: 600;
  font-size: 15px;
  color: var(--n50);
}
.person-role {
  font-family: var(--body);
  font-size: 13px;
  color: var(--n400);
  margin-top: 4px;
}

/* ── STAKEHOLDER CARDS ── */
.stakeholder-card {
  background: var(--n800);
  border: 1px solid rgba(167,139,250,0.15);
  border-left: 3px solid var(--purple);
  border-radius: 2px;
  padding: 20px;
  transition: border-color 0.2s ease, transform 0.2s ease;
}
.stakeholder-card:hover {
  border-color: rgba(167,139,250,0.3);
  transform: translateY(-2px);
}

/* ── ERROR CARD ── */
.error-card {
  background: var(--n800);
  border: 1px solid rgba(239,68,68,0.2);
  border-left: 3px solid var(--coral);
  border-radius: 2px;
  padding: 32px;
  margin-top: 48px;
  text-align: center;
}
.error-card h2 {
  font-family: var(--display);
  font-weight: 700;
  font-size: 24px;
  color: var(--coral);
  margin-bottom: 12px;
}
.error-card p {
  font-family: var(--body);
  font-size: 15px;
  color: var(--n400);
}
.error-card a { color: var(--teal); text-decoration: underline; }

/* ── FOLLOW UPS ── */
.followup-card {
  background: var(--n800);
  border: 1px solid var(--border);
  border-left: 3px solid var(--amber);
  border-radius: 2px;
  padding: 16px 20px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.followup-card:hover { border-color: rgba(255,255,255,0.12); }
.followup-icon { font-size: 14px; flex-shrink: 0; }
.followup-text {
  font-family: var(--body);
  font-size: 14px;
  color: var(--n50);
  line-height: 1.4;
  flex: 1;
}
.followup-owner {
  font-family: var(--body);
  font-size: 12px;
  font-weight: 600;
  color: var(--amber);
  white-space: nowrap;
}

/* ── NOTES ── */
.notes-card {
  background: var(--n800);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 20px 24px;
}
.notes-card p {
  font-family: var(--body);
  font-size: 14px;
  color: var(--n50);
  line-height: 1.6;
}
.notes-card .empty-note {
  color: var(--n400);
  font-style: italic;
}

/* ── INLINE ADD ── */
.inline-add-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--body);
  font-size: 12px;
  color: var(--teal);
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 0;
  margin-top: 8px;
  transition: color 0.15s;
}
.inline-add-btn:hover { color: var(--green); }
.inline-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 10px;
}
.inline-input-row input, .inline-notes-area textarea {
  flex: 1;
  padding: 8px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--n50);
  font-family: var(--body);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.inline-input-row input:focus, .inline-notes-area textarea:focus { border-color: var(--teal); }
.inline-input-row input::placeholder, .inline-notes-area textarea::placeholder { color: var(--n400); opacity: 0.5; }
.inline-notes-area textarea { width: 100%; resize: vertical; min-height: 60px; }
.inline-notes-area { margin-top: 10px; }
.inline-save-btn {
  padding: 8px 16px;
  background: var(--green);
  color: #0F1923;
  border: none;
  border-radius: 2px;
  font-family: var(--body);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.inline-save-btn:hover { background: #3fba62; }
.inline-cancel-btn {
  padding: 8px 10px;
  background: none;
  color: var(--n400);
  border: 1px solid var(--border);
  border-radius: 2px;
  font-size: 12px;
  cursor: pointer;
  transition: color 0.15s;
}
.inline-cancel-btn:hover { color: var(--n50); }

/* ── CONTACT AUTOCOMPLETE ── */
.contact-ac-wrap {
  position: relative;
  flex: 1;
}
.contact-ac-wrap input {
  width: 100%;
}
.contact-ac-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  z-index: 100;
  background: var(--n800);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 2px 2px;
  max-height: 220px;
  overflow-y: auto;
  display: none;
}
.contact-ac-dropdown.open { display: block; }
.contact-ac-option {
  padding: 8px 10px;
  font-family: var(--body);
  font-size: 12px;
  color: var(--n50);
  cursor: pointer;
  transition: background 0.12s;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.contact-ac-option:hover,
.contact-ac-option.active {
  background: rgba(255,255,255,0.06);
}
.contact-ac-option .ac-company {
  font-size: 10px;
  color: var(--n400);
}
.contact-ac-loading,
.contact-ac-empty {
  padding: 8px 10px;
  font-family: var(--body);
  font-size: 11px;
  color: var(--n400);
  font-style: italic;
}

/* ── DELETE BUTTON ── */
.item-delete-btn {
  width: 24px; height: 24px;
  border: none;
  background: none;
  color: var(--n400);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s;
  flex-shrink: 0;
  border-radius: 2px;
}
.kr-card:hover .item-delete-btn,
.action-card:hover .item-delete-btn,
.rec-card:hover .item-delete-btn,
.followup-card:hover .item-delete-btn,
.person-card:hover .item-delete-btn,
.stakeholder-card:hover .item-delete-btn { opacity: 1; }
.item-delete-btn:hover { color: var(--coral); background: rgba(239,68,68,0.1); }

/* ── PM ACTIONS ── */
.pm-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.pm-action-btn {
  font-family: var(--body);
  font-size: 11px;
  color: var(--n400);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 0;
  transition: color 0.15s;
}
.pm-action-btn:hover { color: var(--n50); }
.pm-action-btn.danger:hover { color: var(--coral); }

/* ── CARD POSITION FOR DELETE ── */
.person-card, .stakeholder-card { position: relative; }
.person-card .item-delete-btn,
.stakeholder-card .item-delete-btn {
  position: absolute;
  top: 8px;
  right: 8px;
}

/* ── INLINE ADD ALIGNMENT FIX ── */
.inline-add-btn { display: inline-flex; align-items: center; gap: 4px; margin-top: 16px; }

/* ── FOLLOW-UP OWNER EDIT ── */
.followup-owner-btn {
  font-family: var(--body);
  font-size: 12px;
  font-weight: 600;
  color: var(--amber);
  background: none;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  padding: 2px 6px;
  border-radius: 2px;
  transition: background 0.15s;
}
.followup-owner-btn:hover { background: rgba(245,158,11,0.12); }

/* ── LOADING ── */
.loading {
  font-family: var(--body);
  font-size: 14px;
  color: var(--n400);
  padding: 48px 0;
}

/* ── MOBILE ── */
@media (max-width: 767px) {
  .goal-page-title { font-size: 28px; }
  .goal-header-area { flex-direction: column; }
  .progress-card { min-width: 0; width: 100%; flex-direction: row; gap: 20px; padding: 20px; }
  .progress-ring-large { width: 80px; height: 80px; margin-bottom: 0; }
  .progress-ring-large svg { width: 80px; height: 80px; }
  .progress-ring-large .ring-bg, .progress-ring-large .ring-fill { stroke-width: 6; }
  .progress-ring-large .ring-fill { stroke-dasharray: 207.35; stroke-dashoffset: 207.35; }
  .progress-ring-large .ring-label { font-size: 20px; }
  .people-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Main Content -->
<main class="main" id="mainContent">
  <div class="loading" id="loading">Loading goal...</div>
</main>

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>initSidebar('goals');</script>
<script>
(function() {
  var GOALS_LS_KEY = 'vsdr-goals-data';
  var DATA_VERSION = 4;
  var params = new URLSearchParams(window.location.search);
  var goalId = params.get('id');

  // Supabase autocomplete state
  var _acSelectedContact = null;
  var _acDebounceTimer = null;

  if (!goalId) { showError(); return; }

  // ── FORCE clear any stale/corrupted localStorage ──
  // Always clear and re-fetch to ensure clean data
  localStorage.removeItem(GOALS_LS_KEY);

  fetch('goals-data.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      data.version = DATA_VERSION;
      localStorage.setItem(GOALS_LS_KEY, JSON.stringify(data));
      var goal = data.goals.find(function(g) { return g.id === goalId; });
      if (!goal) { showError(); return; }
      renderGoal(goal, data);
    })
    .catch(function() { showError(); });

  // ── Helpers ──

  function showError() {
    document.getElementById('mainContent').innerHTML =
      '<a href="goals.html" class="back-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Back to Goals</a>' +
      '<div class="error-card"><h2>Goal Not Found</h2><p>Check the URL or <a href="goals.html">go back to Goals</a>.</p></div>';
  }

  function esc(str) {
    if (str === null || str === undefined) return '';
    var d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  function calcProgress(g) {
    var krs = g.keyResults || [];
    if (krs.length === 0) return 0;
    var done = krs.filter(function(k) { return k.done; }).length;
    return Math.round((done / krs.length) * 100);
  }

  function badgeClass(status) {
    if (status === 'on-track') return 'badge-green';
    if (status === 'behind') return 'badge-coral';
    if (status === 'at-risk') return 'badge-amber';
    return 'badge-gray';
  }

  function statusLabel(s) {
    if (!s) return '';
    return s.split('-').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
  }

  var checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

  function saveData(data) {
    data.version = DATA_VERSION;
    localStorage.setItem(GOALS_LS_KEY, JSON.stringify(data));
  }

  function updateTimestamp(goal) {
    var now = new Date();
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    goal.lastUpdated = months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
  }

  // ── Supabase Contact Autocomplete ──

  function searchContacts(query) {
    var encoded = encodeURIComponent(query);
    return sbGet('contacts', 'select=id,first_name,last_name,company&or=(first_name.ilike.*' + encoded + '*,last_name.ilike.*' + encoded + '*,company.ilike.*' + encoded + '*)&limit=8');
  }

  function setupContactAutocomplete(inputEl, dropdownEl) {
    _acSelectedContact = null;

    inputEl.addEventListener('input', function() {
      var val = inputEl.value.trim();
      if (val.length < 2) {
        dropdownEl.classList.remove('open');
        dropdownEl.innerHTML = '';
        _acSelectedContact = null;
        return;
      }

      clearTimeout(_acDebounceTimer);
      _acDebounceTimer = setTimeout(function() {
        dropdownEl.innerHTML = '<div class="contact-ac-loading">Searching...</div>';
        dropdownEl.classList.add('open');

        searchContacts(val).then(function(results) {
          if (!results || results.length === 0) {
            dropdownEl.innerHTML = '<div class="contact-ac-empty">No matches. Name will be added as new contact.</div>';
            dropdownEl.classList.add('open');
            _acSelectedContact = null;
            return;
          }
          var html = '';
          results.forEach(function(c) {
            var displayName = ((c.first_name || '') + ' ' + (c.last_name || '')).trim();
            var companyStr = c.company ? c.company : '';
            html += '<div class="contact-ac-option" data-contact-id="' + c.id + '" data-name="' + esc(displayName) + '">';
            html += '<span>' + esc(displayName) + '</span>';
            if (companyStr) html += '<span class="ac-company">' + esc(companyStr) + '</span>';
            html += '</div>';
          });
          dropdownEl.innerHTML = html;
          dropdownEl.classList.add('open');

          dropdownEl.querySelectorAll('.contact-ac-option').forEach(function(opt) {
            opt.addEventListener('click', function(e) {
              e.stopPropagation();
              inputEl.value = opt.getAttribute('data-name');
              _acSelectedContact = { id: parseInt(opt.getAttribute('data-contact-id')), name: opt.getAttribute('data-name') };
              dropdownEl.classList.remove('open');
              dropdownEl.innerHTML = '';
            });
          });
        }).catch(function() {
          dropdownEl.innerHTML = '<div class="contact-ac-empty">Search failed. Type a name manually.</div>';
          dropdownEl.classList.add('open');
        });
      }, 300);
    });

    function closeAcDropdown(e) {
      if (!inputEl.contains(e.target) && !dropdownEl.contains(e.target)) {
        dropdownEl.classList.remove('open');
      }
    }
    document.addEventListener('click', closeAcDropdown);

    inputEl._acCleanup = function() {
      document.removeEventListener('click', closeAcDropdown);
    };
  }

  function autoInsertContact(ownerName) {
    var parts = ownerName.trim().split(/\s+/);
    var firstName = parts[0] || ownerName.trim();
    var lastName = parts.length > 1 ? parts.slice(1).join(' ') : '';

    return sbInsert('contacts', {
      first_name: firstName,
      last_name: lastName,
      notes: 'Added from Goals follow-up'
    }, { returnData: true }).then(function(result) {
      if (result && result.length > 0) return result[0];
      if (result && result.id) return result;
      return null;
    }).catch(function(err) {
      console.error('Failed to auto-insert contact:', err);
      return null;
    });
  }

  // ── Main Render ──

  function renderGoal(goal, fullData) {
    document.title = esc(goal.title) + ' — Safira';
    var pct = calcProgress(goal);

    var html = '';

    // Back link
    html += '<a href="goals.html" class="back-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Back to Goals</a>';

    // Header area
    html += '<div class="goal-header-area">';
    html += '<div class="goal-header-left">';
    html += '<h1 class="goal-page-title">' + esc(goal.title) + '</h1>';
    html += '<div class="goal-status-row">';
    html += '<span class="badge ' + badgeClass(goal.status) + '">' + statusLabel(goal.status) + '</span>';
    html += '<span class="goal-updated-text">Updated ' + esc(goal.lastUpdated) + '</span>';
    html += '</div>';

    // Project Manager card (in header left, below status row)
    if (goal.projectManager && goal.projectManager.name) {
      html += '<div class="pm-card">';
      html += '<div class="pm-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>';
      html += '<div class="pm-card-info">';
      html += '<div class="pm-card-label">Project Manager</div>';
      html += '<div class="pm-card-name">' + esc(goal.projectManager.name) + '</div>';
      if (goal.projectManager.role) {
        html += '<div class="pm-card-role">' + esc(goal.projectManager.role) + '</div>';
      }
      html += '<div class="pm-actions">';
      html += '<button class="pm-action-btn" onclick="showChangePM()">Change</button>';
      html += '<button class="pm-action-btn danger" onclick="removePM()">Remove</button>';
      html += '</div>';
      html += '</div></div>';
    } else {
      html += '<button class="inline-add-btn" onclick="showChangePM()" style="margin-top:12px;">+ Assign Project Manager</button>';
    }
    html += '<div id="inlinePM"></div>';

    html += '</div>'; // close goal-header-left

    // Progress card
    var ringColor = goal.status === 'on-track' ? 'var(--green)' : goal.status === 'behind' ? 'var(--coral)' : 'var(--amber)';
    var isMobile = window.innerWidth < 768;
    var circumference = isMobile ? 207.35 : 314.16;
    var offset = circumference - (pct / 100) * circumference;

    html += '<div class="progress-card">';
    html += '<div class="progress-ring-large">';
    html += '<svg viewBox="0 0 120 120"><circle class="ring-bg" cx="60" cy="60" r="50"/>';
    html += '<circle class="ring-fill" cx="60" cy="60" r="50" style="stroke:' + ringColor + '; stroke-dashoffset:' + offset + '"/>';
    html += '</svg>';
    html += '<div class="ring-label">' + pct + '%</div>';
    html += '</div>';
    html += '<div class="progress-card-text">Completion</div>';
    html += '</div>';
    html += '</div>'; // close goal-header-area

    // Description
    html += '<div class="section-label">Description</div>';
    html += '<div class="glass-card"><p>' + esc(goal.description) + '</p></div>';

    // Key Results
    var krDone = (goal.keyResults || []).filter(function(k) { return k.done; }).length;
    var krTotal = (goal.keyResults || []).length;
    html += '<div class="section-label">Key Results (' + krDone + '/' + krTotal + ')</div>';
    (goal.keyResults || []).forEach(function(kr, i) {
      html += '<div class="kr-card' + (kr.done ? ' completed' : '') + '" data-kr-index="' + i + '">';
      html += '<div class="kr-checkbox">' + (kr.done ? checkSvg : '') + '</div>';
      html += '<div class="kr-text">' + esc(kr.text) + '</div>';
      html += '<button class="item-delete-btn" onclick="event.stopPropagation(); deleteItem(\'kr\',' + i + ')" title="Delete">&times;</button>';
      html += '</div>';
    });
    html += '<div id="inlineKr"></div>';
    html += '<button class="inline-add-btn" onclick="showInlineAdd(\'kr\')">+ Add Key Result</button>';

    // Next Actions
    html += '<div class="section-label">Next Actions</div>';
    (goal.nextActions || []).forEach(function(a, i) {
      html += '<div class="action-card">';
      html += '<span class="action-icon">&rarr;</span>';
      html += '<div class="action-text">' + esc(a) + '</div>';
      html += '<button class="item-delete-btn" onclick="deleteItem(\'action\',' + i + ')" title="Delete">&times;</button>';
      html += '</div>';
    });
    html += '<div id="inlineAction"></div>';
    html += '<button class="inline-add-btn" onclick="showInlineAdd(\'action\')">+ Add Action</button>';

    // Recommended Actions
    html += '<div class="section-label">Recommended Actions</div>';
    (goal.recommendedActions || []).forEach(function(a, i) {
      html += '<div class="rec-card">';
      html += '<span class="rec-icon">&#9670;</span>';
      html += '<div class="rec-text">' + esc(a) + '</div>';
      html += '<button class="item-delete-btn" onclick="deleteItem(\'rec\',' + i + ')" title="Delete">&times;</button>';
      html += '</div>';
    });
    html += '<div id="inlineRec"></div>';
    html += '<button class="inline-add-btn" onclick="showInlineAdd(\'rec\')">+ Add Recommendation</button>';

    // Follow Ups / Waiting For
    html += '<div class="section-label">Follow Ups / Waiting For</div>';
    (goal.followUps || []).forEach(function(f, i) {
      html += '<div class="followup-card">';
      html += '<span class="followup-icon">&#9203;</span>';
      html += '<div class="followup-text">' + esc(f.text) + '</div>';
      html += '<button class="followup-owner-btn" onclick="event.stopPropagation(); editFollowUpOwner(' + i + ')" title="Click to change assignee">' + esc(f.owner || 'Assign') + '</button>';
      html += '<button class="item-delete-btn" onclick="deleteItem(\'followUp\',' + i + ')" title="Delete">&times;</button>';
      html += '</div>';
    });
    html += '<div id="inlineFollowUp"></div>';
    html += '<button class="inline-add-btn" onclick="showInlineAdd(\'followUp\')">+ Add Follow Up</button>';

    // Team Members
    html += '<div class="section-label">Team Members</div>';
    if (goal.teamMembers && goal.teamMembers.length > 0) {
      html += '<div class="people-grid">';
      goal.teamMembers.forEach(function(m, i) {
        html += '<div class="person-card">';
        html += '<button class="item-delete-btn" onclick="deleteItem(\'team\',' + i + ')" title="Remove">&times;</button>';
        html += '<div class="person-name">' + esc(m.name) + '</div>';
        html += '<div class="person-role">' + esc(m.role) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '<div id="inlineTeam"></div>';
    html += '<button class="inline-add-btn" onclick="showInlineAdd(\'team\')">+ Add Member</button>';

    // Stakeholders
    html += '<div class="section-label">Stakeholders</div>';
    if (goal.stakeholders && goal.stakeholders.length > 0) {
      html += '<div class="people-grid">';
      goal.stakeholders.forEach(function(s, i) {
        html += '<div class="stakeholder-card">';
        html += '<button class="item-delete-btn" onclick="deleteItem(\'stakeholder\',' + i + ')" title="Remove">&times;</button>';
        html += '<div class="person-name">' + esc(s.name) + '</div>';
        html += '<div class="person-role">' + esc(s.role) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '<div id="inlineStakeholder"></div>';
    html += '<button class="inline-add-btn" onclick="showInlineAdd(\'stakeholder\')">+ Add Stakeholder</button>';

    // Notes
    var noteText = (goal.notes && goal.notes.trim()) ? goal.notes : '';
    html += '<div class="section-label">Notes</div>';
    html += '<div class="notes-card" id="notesDisplay">';
    html += noteText ? '<p>' + esc(noteText) + '</p>' : '<p class="empty-note">No notes yet.</p>';
    html += '</div>';
    html += '<div id="inlineNotes"></div>';
    html += '<button class="inline-add-btn" onclick="showNotesEdit()">' + (noteText ? '+ Edit Notes' : '+ Add Notes') + '</button>';

    document.getElementById('mainContent').innerHTML = html;

    // ── Wire up KR checkboxes ──
    document.querySelectorAll('.kr-card').forEach(function(card) {
      card.addEventListener('click', function() {
        var idx = parseInt(card.getAttribute('data-kr-index'));
        var kr = goal.keyResults[idx];
        kr.done = !kr.done;
        updateTimestamp(goal);
        saveData(fullData);
        renderGoal(goal, fullData);
      });
    });

    // ── Inline add: show form ──
    window.showInlineAdd = function(type) {
      var container = document.getElementById('inline' + type.charAt(0).toUpperCase() + type.slice(1));
      if (!container || container.querySelector('.inline-input-row')) return;

      var formHtml = '<div class="inline-input-row">';
      if (type === 'team' || type === 'stakeholder') {
        formHtml += '<input type="text" placeholder="Name" id="inlineName"><input type="text" placeholder="Role" id="inlineRole">';
      } else if (type === 'followUp') {
        formHtml += '<input type="text" placeholder="Waiting for..." id="inlineText" style="flex:2">';
        formHtml += '<div class="contact-ac-wrap" style="flex:1">';
        formHtml += '<input type="text" placeholder="Owner" id="inlineOwner" autocomplete="off">';
        formHtml += '<div class="contact-ac-dropdown" id="acDropdownGoal"></div>';
        formHtml += '</div>';
      } else {
        var ph = { kr: 'New key result...', action: 'New action...', rec: 'New recommendation...' };
        formHtml += '<input type="text" placeholder="' + (ph[type] || 'Add...') + '" id="inlineText">';
      }
      formHtml += '<button class="inline-save-btn" onclick="saveInline(\'' + type + '\')">Add</button>';
      formHtml += '<button class="inline-cancel-btn" onclick="cancelInline(\'' + type + '\')">&times;</button>';
      formHtml += '</div>';
      container.innerHTML = formHtml;
      container.querySelector('input').focus();

      // Set up autocomplete for follow-up owner field
      if (type === 'followUp') {
        var ownerInput = document.getElementById('inlineOwner');
        var dropdown = document.getElementById('acDropdownGoal');
        if (ownerInput && dropdown) {
          setupContactAutocomplete(ownerInput, dropdown);
        }
      }

      container.querySelectorAll('input').forEach(function(inp) {
        inp.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') {
            var dd = container.querySelector('.contact-ac-dropdown.open');
            if (dd) { dd.classList.remove('open'); return; }
            e.preventDefault();
            saveInline(type);
          }
          if (e.key === 'Escape') { e.preventDefault(); cancelInline(type); }
        });
      });
    };

    // ── Inline add: cancel ──
    window.cancelInline = function(type) {
      var container = document.getElementById('inline' + type.charAt(0).toUpperCase() + type.slice(1));
      if (container) {
        var ownerInput = container.querySelector('input[id="inlineOwner"]');
        if (ownerInput && ownerInput._acCleanup) ownerInput._acCleanup();
        container.innerHTML = '';
      }
      _acSelectedContact = null;
    };

    // ── Inline add: save ──
    window.saveInline = function(type) {
      if (type === 'kr') {
        var t = document.getElementById('inlineText').value.trim();
        if (!t) return;
        if (!goal.keyResults) goal.keyResults = [];
        goal.keyResults.push({ text: t, done: false });
      } else if (type === 'action') {
        var t = document.getElementById('inlineText').value.trim();
        if (!t) return;
        if (!goal.nextActions) goal.nextActions = [];
        goal.nextActions.push(t);
      } else if (type === 'rec') {
        var t = document.getElementById('inlineText').value.trim();
        if (!t) return;
        if (!goal.recommendedActions) goal.recommendedActions = [];
        goal.recommendedActions.push(t);
      } else if (type === 'followUp') {
        var t = document.getElementById('inlineText').value.trim();
        var ownerInput = document.getElementById('inlineOwner');
        var ownerName = ownerInput ? ownerInput.value.trim() : '';
        if (!t) return;
        if (!goal.followUps) goal.followUps = [];

        var followUpEntry = { text: t, owner: ownerName };

        if (_acSelectedContact && _acSelectedContact.id) {
          followUpEntry.contactId = _acSelectedContact.id;
          goal.followUps.push(followUpEntry);
          _acSelectedContact = null;
        } else if (ownerName) {
          goal.followUps.push(followUpEntry);
          var fuIdx = goal.followUps.length - 1;
          autoInsertContact(ownerName).then(function(contact) {
            if (contact && contact.id) {
              goal.followUps[fuIdx].contactId = contact.id;
              saveData(fullData);
            }
          });
          _acSelectedContact = null;
        } else {
          goal.followUps.push(followUpEntry);
          _acSelectedContact = null;
        }

        updateTimestamp(goal);
        saveData(fullData);
        renderGoal(goal, fullData);
        return;
      } else if (type === 'team') {
        var n = document.getElementById('inlineName').value.trim();
        var r = document.getElementById('inlineRole').value.trim();
        if (!n) return;
        if (!goal.teamMembers) goal.teamMembers = [];
        goal.teamMembers.push({ name: n, role: r });
      } else if (type === 'stakeholder') {
        var n = document.getElementById('inlineName').value.trim();
        var r = document.getElementById('inlineRole').value.trim();
        if (!n) return;
        if (!goal.stakeholders) goal.stakeholders = [];
        goal.stakeholders.push({ name: n, role: r });
      }
      updateTimestamp(goal);
      saveData(fullData);
      renderGoal(goal, fullData);
    };

    // ── Notes editing ──
    window.showNotesEdit = function() {
      var container = document.getElementById('inlineNotes');
      if (!container || container.querySelector('.inline-notes-area')) return;
      var current = goal.notes || '';
      var notesHtml = '<div class="inline-notes-area">';
      notesHtml += '<textarea id="notesTextarea" placeholder="Add notes...">' + esc(current) + '</textarea>';
      notesHtml += '<div style="display:flex;gap:8px;margin-top:8px;">';
      notesHtml += '<button class="inline-save-btn" onclick="saveNotes()">Save</button>';
      notesHtml += '<button class="inline-cancel-btn" onclick="cancelNotes()">Cancel</button>';
      notesHtml += '</div></div>';
      container.innerHTML = notesHtml;
      document.getElementById('notesTextarea').focus();
    };

    window.cancelNotes = function() {
      var container = document.getElementById('inlineNotes');
      if (container) container.innerHTML = '';
    };

    window.saveNotes = function() {
      goal.notes = document.getElementById('notesTextarea').value.trim();
      updateTimestamp(goal);
      saveData(fullData);
      renderGoal(goal, fullData);
    };

    // ── Edit follow-up owner ──
    window.editFollowUpOwner = function(idx) {
      var fu = goal.followUps[idx];
      if (!fu) return;
      var card = document.querySelectorAll('.followup-card')[idx];
      if (!card || card.querySelector('.inline-input-row')) return;

      // Replace the owner button with an inline input
      var ownerBtn = card.querySelector('.followup-owner-btn');
      if (ownerBtn) ownerBtn.style.display = 'none';

      var editRow = document.createElement('div');
      editRow.className = 'inline-input-row';
      editRow.style.cssText = 'margin:0; flex-shrink:0;';
      editRow.onclick = function(e) { e.stopPropagation(); };
      editRow.innerHTML = '<div class="contact-ac-wrap" style="width:140px;">' +
        '<input type="text" placeholder="Owner" id="fuOwnerEdit" value="' + esc(fu.owner || '') + '" autocomplete="off" style="padding:4px 8px;font-size:11px;">' +
        '<div class="contact-ac-dropdown" id="fuOwnerDropdown"></div></div>' +
        '<button class="inline-save-btn" onclick="saveFollowUpOwner(' + idx + ')" style="padding:4px 10px;font-size:11px;">Save</button>' +
        '<button class="inline-cancel-btn" onclick="cancelFollowUpOwner(' + idx + ')" style="padding:4px 6px;font-size:11px;">&times;</button>';

      var deleteBtn = card.querySelector('.item-delete-btn');
      card.insertBefore(editRow, deleteBtn);

      var ownerInput = document.getElementById('fuOwnerEdit');
      var dropdown = document.getElementById('fuOwnerDropdown');
      ownerInput.focus();
      setupContactAutocomplete(ownerInput, dropdown);

      ownerInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); saveFollowUpOwner(idx); }
        if (e.key === 'Escape') { e.preventDefault(); cancelFollowUpOwner(idx); }
      });
    };

    window.saveFollowUpOwner = function(idx) {
      var input = document.getElementById('fuOwnerEdit');
      if (!input) return;
      var newOwner = input.value.trim();
      goal.followUps[idx].owner = newOwner;

      if (_acSelectedContact && _acSelectedContact.id) {
        goal.followUps[idx].contactId = _acSelectedContact.id;
        _acSelectedContact = null;
      } else if (newOwner && !goal.followUps[idx].contactId) {
        autoInsertContact(newOwner).then(function(contact) {
          if (contact && contact.id) {
            goal.followUps[idx].contactId = contact.id;
            saveData(fullData);
          }
        });
      }

      updateTimestamp(goal);
      saveData(fullData);
      renderGoal(goal, fullData);
    };

    window.cancelFollowUpOwner = function(idx) {
      renderGoal(goal, fullData);
    };

    // ── Delete items ──
    window.deleteItem = function(type, idx) {
      var arr;
      if (type === 'kr') arr = goal.keyResults;
      else if (type === 'action') arr = goal.nextActions;
      else if (type === 'rec') arr = goal.recommendedActions;
      else if (type === 'followUp') arr = goal.followUps;
      else if (type === 'team') arr = goal.teamMembers;
      else if (type === 'stakeholder') arr = goal.stakeholders;
      if (!arr || idx < 0 || idx >= arr.length) return;
      arr.splice(idx, 1);
      updateTimestamp(goal);
      saveData(fullData);
      renderGoal(goal, fullData);
    };

    // ── Project Manager management ──
    window.showChangePM = function() {
      var container = document.getElementById('inlinePM');
      if (!container || container.querySelector('.inline-input-row')) return;
      var current = goal.projectManager || {};
      var pmHtml = '<div class="inline-input-row">';
      pmHtml += '<input type="text" placeholder="Name" id="pmName" value="' + esc(current.name || '') + '">';
      pmHtml += '<input type="text" placeholder="Role" id="pmRole" value="' + esc(current.role || '') + '">';
      pmHtml += '<button class="inline-save-btn" onclick="savePM()">Save</button>';
      pmHtml += '<button class="inline-cancel-btn" onclick="cancelPM()">&times;</button>';
      pmHtml += '</div>';
      container.innerHTML = pmHtml;
      document.getElementById('pmName').focus();
      container.querySelectorAll('input').forEach(function(inp) {
        inp.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') { e.preventDefault(); savePM(); }
          if (e.key === 'Escape') { e.preventDefault(); cancelPM(); }
        });
      });
    };

    window.cancelPM = function() {
      var container = document.getElementById('inlinePM');
      if (container) container.innerHTML = '';
    };

    window.savePM = function() {
      var name = document.getElementById('pmName').value.trim();
      if (!name) return;
      goal.projectManager = { name: name, role: document.getElementById('pmRole').value.trim() };
      updateTimestamp(goal);
      saveData(fullData);
      renderGoal(goal, fullData);
    };

    window.removePM = function() {
      goal.projectManager = null;
      updateTimestamp(goal);
      saveData(fullData);
      renderGoal(goal, fullData);
    };

    runPageAnimation();
  }

  // ── GSAP Page Animation ──

  function runPageAnimation() {
    gsap.from('.back-link', { x: -20, opacity: 0, duration: 0.4, ease: 'power2.out' });
    gsap.from('.goal-page-title', { y: 30, opacity: 0, duration: 0.6, ease: 'power3.out', delay: 0.1 });
    gsap.from('.goal-status-row', { y: 20, opacity: 0, duration: 0.4, ease: 'power2.out', delay: 0.2 });
    gsap.from('.pm-card', { y: 20, opacity: 0, duration: 0.4, ease: 'power2.out', delay: 0.25 });
    gsap.from('.progress-card', { scale: 0.9, opacity: 0, duration: 0.5, ease: 'back.out(1.4)', delay: 0.3 });
    gsap.from('.glass-card', { y: 20, opacity: 0, duration: 0.4, ease: 'power2.out', delay: 0.35 });
    gsap.from('.kr-card', { x: -20, opacity: 0, stagger: 0.06, duration: 0.35, ease: 'power2.out', delay: 0.4 });
    gsap.from('.action-card', { x: -20, opacity: 0, stagger: 0.06, duration: 0.35, ease: 'power2.out', delay: 0.5 });
    gsap.from('.rec-card', { x: -20, opacity: 0, stagger: 0.06, duration: 0.35, ease: 'power2.out', delay: 0.55 });
    gsap.from('.followup-card', { x: -20, opacity: 0, stagger: 0.06, duration: 0.35, ease: 'power2.out', delay: 0.58 });
    gsap.from('.person-card, .stakeholder-card', { y: 20, opacity: 0, stagger: 0.06, duration: 0.35, ease: 'power2.out', delay: 0.6 });
    gsap.from('.notes-card', { y: 20, opacity: 0, duration: 0.4, ease: 'power2.out', delay: 0.65 });
  }
})();
</script>
</body>
</html>
